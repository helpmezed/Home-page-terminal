<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>matrix://yt.extract</title>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
    :root {
        --green: #00ff41; --green-mid: #00cc44; --green-dim: #007a22;
        --bg: #030303; --panel: #050a05; --font: 'IBM Plex Mono','Courier New',monospace;
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
        background: var(--bg); color: var(--green); font-family: var(--font);
        min-height: 100vh; display: flex; flex-direction: column;
        align-items: center; overflow-x: hidden;
    }
    body::after {
        content: ''; position: fixed; inset: 0; pointer-events: none; z-index: 9000;
        background:
            repeating-linear-gradient(to bottom,transparent 0px,transparent 2px,rgba(0,0,0,0.06) 2px,rgba(0,0,0,0.06) 4px),
            radial-gradient(ellipse at 50% 50%,transparent 45%,rgba(0,0,0,0.45) 100%);
    }
    #top-bar {
        position: sticky; top: 0; width: 100%; z-index: 300;
        height: 32px; display: flex; align-items: center; gap: 8px; padding: 0 12px;
        background: rgba(0,0,0,0.95); border-bottom: 1px solid rgba(0,255,65,0.18);
        backdrop-filter: blur(6px); font-size: 10px; letter-spacing: 0.4px;
    }
    .back-btn {
        color: #005c18; text-decoration: none; border: 1px solid rgba(0,255,65,0.18);
        padding: 2px 8px; border-radius: 3px; transition: all 0.2s; flex-shrink: 0;
    }
    .back-btn:hover { color: var(--green); border-color: rgba(0,255,65,0.6); background: rgba(0,255,65,0.05); }
    .top-sep { color: #001800; }
    #top-title { color: #004d14; }

    .main-wrap {
        width: 100%; max-width: 720px;
        padding: 36px 20px 60px;
        display: flex; flex-direction: column; gap: 16px;
    }

    .panel { border: 1px solid rgba(0,255,65,0.2); background: var(--panel); border-radius: 4px; overflow: hidden; }
    .panel-header {
        display: flex; align-items: center; gap: 8px;
        padding: 8px 14px; border-bottom: 1px dashed rgba(0,255,65,0.12);
        font-size: 10px; color: var(--green-dim); letter-spacing: 1.2px;
    }
    .ph-dot { color: var(--green); font-size: 9px; text-shadow: 0 0 8px rgba(0,255,65,0.9); }

    .input-row { display: flex; align-items: stretch; }
    .input-prefix {
        padding: 0 12px; border-right: 1px solid rgba(0,255,65,0.12);
        display: flex; align-items: center;
        font-size: 8px; color: var(--green-dim); letter-spacing: 1.5px;
        background: rgba(0,255,65,0.02); flex-shrink: 0;
    }
    #yt-url {
        flex: 1; background: transparent; border: none;
        color: var(--green); padding: 13px 14px;
        font-family: var(--font); font-size: 13px;
        outline: none; caret-color: var(--green);
    }
    #yt-url::placeholder { color: #002800; }
    #yt-url:focus { background: rgba(0,255,65,0.012); }

    #extract-btn {
        width: 100%; background: transparent; border: none;
        border-top: 1px solid rgba(0,255,65,0.15);
        color: var(--green-dim); font-family: var(--font);
        font-size: 11px; letter-spacing: 2.5px; padding: 12px;
        cursor: pointer; transition: all 0.2s;
        position: relative; overflow: hidden;
    }
    #extract-btn::before {
        content: ''; position: absolute; inset: 0;
        background: linear-gradient(90deg, transparent, rgba(0,255,65,0.06), transparent);
        transform: translateX(-100%); transition: transform 0.5s;
    }
    #extract-btn:hover:not(:disabled)::before { transform: translateX(100%); }
    #extract-btn:hover:not(:disabled) {
        color: var(--green); background: rgba(0,255,65,0.03);
        border-top-color: rgba(0,255,65,0.4);
    }
    #extract-btn:disabled { color: #002200; cursor: default; }

    .console {
        min-height: 160px; max-height: 280px; overflow-y: auto;
        padding: 14px; background: #000; font-size: 12px; line-height: 1.65;
        border-radius: 4px; border: 1px solid rgba(0,255,65,0.1);
    }
    .console::-webkit-scrollbar { width: 3px; }
    .console::-webkit-scrollbar-thumb { background: rgba(0,255,65,0.15); border-radius: 2px; }
    .log-dim  { color: var(--green-dim); }
    .log-ok   { color: var(--green); }
    .log-err  { color: #ff4444; }
    .log-done { color: #fff; text-shadow: 0 0 10px rgba(200,255,220,0.5); }

    /* Download options grid */
    #dl-options { display: none; flex-direction: column; gap: 8px; }
    #dl-title {
        font-size: 11px; color: var(--green-dim); letter-spacing: 0.5px;
        padding: 2px 0; border-bottom: 1px solid rgba(0,255,65,0.08); padding-bottom: 8px;
        margin-bottom: 4px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    }
    .dl-row { display: flex; gap: 8px; }
    .dl-link {
        flex: 1; display: block; text-align: center;
        background: rgba(0,255,65,0.04); border: 1px solid rgba(0,255,65,0.28);
        color: var(--green-dim); font-family: var(--font);
        font-size: 10px; letter-spacing: 1.5px;
        padding: 11px 8px; border-radius: 4px;
        cursor: pointer; text-decoration: none;
        transition: all 0.2s;
    }
    .dl-link:hover {
        color: var(--green); background: rgba(0,255,65,0.08);
        border-color: rgba(0,255,65,0.6);
        box-shadow: 0 0 14px rgba(0,255,65,0.12);
    }
    .dl-link .dl-fmt { display: block; font-size: 13px; font-weight: 600; margin-bottom: 3px; color: var(--green); }
    .dl-link .dl-desc { display: block; font-size: 8px; color: #005c18; letter-spacing: 1px; }
    .dl-link .dl-srv { display: block; font-size: 7px; color: #002800; letter-spacing: 0.5px; margin-top: 4px; }

    .srv-cycle {
        font-size: 8px; color: #003300; letter-spacing: 1px; text-align: center;
        padding: 4px 0; cursor: pointer; background: none; border: none;
        font-family: var(--font); width: 100%;
    }
    .srv-cycle:hover { color: var(--green-dim); }

    .note {
        font-size: 9px; color: #003300; letter-spacing: 0.6px; line-height: 1.6;
        text-align: center;
    }
    .note a { color: #005c18; text-decoration: none; }
    .note a:hover { color: var(--green-dim); }
</style>
</head>
<body>

<div id="top-bar">
    <a class="back-btn" href="index.html">← back</a>
    <span class="top-sep">|</span>
    <span id="top-title">matrix://yt.extract</span>
</div>

<div class="main-wrap">

    <div class="panel">
        <div class="panel-header">
            <span class="ph-dot">◈</span>
            YT-EXTRACT // MP4 · M4A DOWNLOADER
        </div>
        <div class="input-row">
            <span class="input-prefix">TARGET URL</span>
            <input type="text" id="yt-url"
                placeholder="https://youtube.com/watch?v=..."
                autocomplete="off" spellcheck="false">
        </div>
        <button id="extract-btn" onclick="initiateExtraction()">[ RESOLVE &amp; EXTRACT ]</button>
    </div>

    <div class="console" id="console">
        <div class="log-dim">> SYSTEM STANDBY. AWAITING TARGET URL...</div>
    </div>

    <div id="dl-options">
        <div id="dl-title"></div>
        <div class="dl-row" id="dl-row"></div>
    </div>

    <div class="note">
        EXTRACTION VIA <a href="https://invidious.io" target="_blank" rel="noopener">INVIDIOUS NETWORK</a>
        &nbsp;·&nbsp; MAX QUALITY: 720p &nbsp;·&nbsp; NO DATA STORED
    </div>

</div>

<script>
    function extractId(url) {
        const m = url.match(/(?:[?&]v=|youtu\.be\/|embed\/|\/v\/|shorts\/)([a-zA-Z0-9_-]{11})/);
        return m ? m[1] : null;
    }

    function log(msg, type = 'ok') {
        const out = document.getElementById('console');
        const d = document.createElement('div');
        d.className = 'log-' + type;
        d.textContent = '> ' + msg;
        out.appendChild(d);
        out.scrollTop = out.scrollHeight;
    }

    const EXT_MAP = { 'MP4': 'mp4', 'M4A': 'm4a' };

    async function initiateExtraction() {
        const urlRaw = document.getElementById('yt-url').value.trim();
        const btn    = document.getElementById('extract-btn');
        const opts   = document.getElementById('dl-options');

        opts.style.display = 'none';
        document.getElementById('dl-row').innerHTML = '';

        if (!urlRaw) { log('NO TARGET URL PROVIDED.', 'err'); return; }
        if (!urlRaw.includes('youtube.com') && !urlRaw.includes('youtu.be')) {
            log('INVALID TARGET: Must be a YouTube URL.', 'err'); return;
        }

        const videoId = extractId(urlRaw);
        if (!videoId) { log('COULD NOT PARSE VIDEO ID FROM URL.', 'err'); return; }

        btn.disabled = true;
        document.getElementById('console').innerHTML = '';

        log(`TARGET: ${urlRaw}`, 'dim');
        log(`VIDEO ID: ${videoId}`, 'dim');
        log('PROBING INVIDIOUS NETWORK...', 'dim');

        let data;
        try {
            const res = await fetch(`/api/yt?id=${encodeURIComponent(videoId)}`);
            data = await res.json();
            if (!res.ok || !data.ok) {
                const msg = data.error || 'API error';
                log('EXTRACTION FAILED: ' + msg, 'err');
                if (data.details) data.details.forEach(d => log(d, 'dim'));
                btn.disabled = false;
                return;
            }
        } catch (e) {
            log('EXTRACTION FAILED: ' + e.message, 'err');
            btn.disabled = false;
            return;
        }

        log(`TITLE: ${data.title}`, 'ok');
        log('BUILDING DOWNLOAD LINKS...', 'dim');

        const row = document.getElementById('dl-row');
        const safeName = data.title.replace(/[^a-z0-9 _-]/gi, '_').slice(0, 80);

        // Track which server index each format button is on
        const srvIndex = [];

        data.formats.forEach(({ label, desc, urls }, i) => {
            const ext = EXT_MAP[label] || 'mp4';
            srvIndex[i] = 0;

            const host = u => new URL(u).hostname;

            const a = document.createElement('a');
            a.className = 'dl-link';
            a.href = urls[0];
            a.target = '_blank';
            a.rel = 'noopener noreferrer';
            a.download = `${safeName}.${ext}`;
            a.innerHTML = `<span class="dl-fmt">${label}</span><span class="dl-desc">${desc}</span><span class="dl-srv">${host(urls[0])}</span>`;

            // Clicking the server label cycles to the next instance
            a.addEventListener('click', ev => {
                if (!ev.target.classList.contains('dl-srv')) return;
                ev.preventDefault();
                srvIndex[i] = (srvIndex[i] + 1) % urls.length;
                const nextUrl = urls[srvIndex[i]];
                a.href = nextUrl;
                a.querySelector('.dl-srv').textContent = host(nextUrl);
            });

            row.appendChild(a);
        });

        document.getElementById('dl-title').textContent = '▸ ' + data.title;
        opts.style.display = 'flex';
        log('EXTRACTION COMPLETE. SELECT FORMAT BELOW.', 'done');
        if (data.formats[0]?.urls?.length > 1)
            log('If a button shows a captcha, click the server name to switch.', 'dim');

        btn.disabled = false;
    }

    document.getElementById('yt-url').addEventListener('keydown', e => {
        if (e.key === 'Enter') initiateExtraction();
    });
</script>
</body>
</html>
