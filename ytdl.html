<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>matrix://yt.extract</title>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
    :root {
        --green: #00ff41; --green-mid: #00cc44; --green-dim: #007a22;
        --bg: #030303; --panel: #050a05; --font: 'IBM Plex Mono','Courier New',monospace;
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
        background: var(--bg); color: var(--green); font-family: var(--font); font-size: 16px;
        min-height: 100vh; display: flex; flex-direction: column;
        align-items: center; overflow-x: hidden;
    }
    .crt-overlay {
        content: ''; position: fixed; inset: 0; pointer-events: none; z-index: 9000;
        background:
            repeating-linear-gradient(to bottom,transparent 0px,transparent 2px,rgba(0,0,0,0.1) 2px,rgba(0,0,0,0.1) 4px),
            radial-gradient(ellipse at 50% 50%,transparent 45%,rgba(0,0,0,0.55) 100%);
    }
    #top-bar {
        position: sticky; top: 0; width: 100%; z-index: 300;
        height: 40px; display: flex; align-items: center; gap: 10px; padding: 0 16px;
        background: rgba(0,0,0,0.95); border-bottom: 1px solid rgba(0,255,65,0.18);
        backdrop-filter: blur(6px); font-size: 12px; letter-spacing: 0.5px;
    }
    .back-btn {
        color: #005c18; text-decoration: none; border: 1px solid rgba(0,255,65,0.18);
        padding: 4px 10px; border-radius: 3px; transition: all 0.2s; flex-shrink: 0;
    }
    .back-btn:hover { color: var(--green); border-color: rgba(0,255,65,0.6); background: rgba(0,255,65,0.05); }
    .top-sep { color: #001800; }
    #top-title { color: #004d14; }
    
    #node-status { 
        margin-left: auto; font-size: 9px; color: var(--green-dim); 
        display: flex; align-items: center; gap: 6px;
    }
    .status-pulse { 
        width: 6px; height: 6px; background: var(--green); 
        border-radius: 50%; box-shadow: 0 0 8px var(--green);
        animation: blink 2s infinite;
    }

    .main-wrap {
        width: 100%; max-width: 800px;
        padding: 48px 24px 72px;
        display: flex; flex-direction: column; gap: 16px;
    }

    .panel { 
        border: 1px solid rgba(0,255,65,0.2); background: var(--panel); 
        border-radius: 4px; overflow: hidden; position: relative;
    }
    .panel-header {
        display: flex; align-items: center; gap: 8px;
        padding: 8px 14px; border-bottom: 1px dashed rgba(0,255,65,0.12);
        font-size: 13px; color: var(--green-mid); letter-spacing: 1.5px;
    }
    .ph-dot { color: var(--green); font-size: 9px; text-shadow: 0 0 8px rgba(0,255,65,0.9); }

    .input-row { display: flex; align-items: stretch; }
    .input-prefix {
        padding: 0 16px; border-right: 1px solid rgba(0,255,65,0.12);
        display: flex; align-items: center;
        font-size: 11px; color: var(--green-dim); letter-spacing: 1.8px;
        background: rgba(0,255,65,0.02); flex-shrink: 0;
    }
    #yt-url {
        flex: 1; background: transparent; border: none;
        color: var(--green); padding: 16px 18px;
        font-family: var(--font); font-size: 16px;
        outline: none; caret-color: var(--green);
    }
    #yt-url::placeholder { color: #002800; }
    #yt-url:focus { background: rgba(0,255,65,0.012); }

    #extract-btn {
        width: 100%; background: transparent; border: none; font-size: 14px;
        border-top: 1px solid rgba(0,255,65,0.15);
        color: var(--green-dim); font-family: var(--font);
        letter-spacing: 2.8px; padding: 16px;
        cursor: pointer; transition: all 0.2s;
        position: relative; overflow: hidden;
    }
    #extract-btn::before {
        content: ''; position: absolute; inset: 0;
        background: linear-gradient(90deg, transparent, rgba(0,255,65,0.06), transparent);
        transform: translateX(-100%); transition: transform 0.5s;
    }
    #extract-btn:hover:not(:disabled)::before { transform: translateX(100%); }
    #extract-btn:hover:not(:disabled) {
        color: var(--green); background: rgba(0,255,65,0.03);
        border-top-color: rgba(0,255,65,0.4);
    }
    #extract-btn:disabled { color: #002200; cursor: default; }
    #extract-btn.extracting {
        animation: scan-btn 1.5s infinite linear;
        color: var(--green);
    }
    @keyframes scan-btn {
        0% { background: rgba(0,255,65,0.02); }
        50% { background: rgba(0,255,65,0.08); }
        100% { background: rgba(0,255,65,0.02); }
    }

    .console {
        min-height: 180px; max-height: 320px; overflow-y: auto;
        padding: 18px; background: #000; font-size: 14px; line-height: 1.7;
        border-radius: 4px; border: 1px solid rgba(0,255,65,0.15);
    }
    .console::-webkit-scrollbar { width: 4px; }
    .console::-webkit-scrollbar-thumb { background: rgba(0,255,65,0.15); border-radius: 2px; }
    .log-dim  { color: var(--green-dim); }
    .log-ok   { color: var(--green); }
    .log-err  { color: #ff4444; }
    .log-done { color: #fff; text-shadow: 0 0 10px rgba(200,255,220,0.5); }

    /* Download options grid */
    #dl-options { 
        display: none; flex-direction: column; gap: 12px; 
        animation: fadeIn 0.4s ease-out;
    }
    #dl-title {
        font-size: 14px; color: var(--green-dim); letter-spacing: 0.8px;
        padding: 2px 0; border-bottom: 1px solid rgba(0,255,65,0.08); padding-bottom: 8px;
        margin-bottom: 4px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    }
    .dl-link {
        flex: 1; display: block; text-align: center;
        background: rgba(0,255,65,0.04); border: 1px solid rgba(0,255,65,0.28); font-size: 12px;
        color: var(--green-dim); font-family: var(--font);
        letter-spacing: 1.8px; padding: 14px 10px; border-radius: 4px;
        cursor: pointer; text-decoration: none;
        transition: all 0.2s;
    }
    .dl-link:hover {
        color: var(--green); background: rgba(0,255,65,0.08);
        border-color: rgba(0,255,65,0.6);
        box-shadow: 0 0 14px rgba(0,255,65,0.12);
    }
    .dl-link .dl-fmt { display: block; font-size: 16px; font-weight: 600; margin-bottom: 4px; color: var(--green); }
    .dl-link .dl-desc { display: block; font-size: 10px; color: #005c18; letter-spacing: 1.2px; }
    .dl-link .dl-srv { display: block; font-size: 9px; color: #002800; letter-spacing: 0.8px; margin-top: 5px; }

    .note {
        font-size: 9px; color: #003300; letter-spacing: 0.6px; line-height: 1.6;
        text-align: center; margin-top: 10px;
    }
    .note a { color: #005c18; text-decoration: none; }
    .note a:hover { color: var(--green-dim); }
    
    @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    @keyframes blink { 0%, 100% { opacity: 1; } 50% { opacity: 0.3; } }

    .dl-row { 
        display: grid; 
        grid-template-columns: repeat(auto-fit, minmax(140px, 1fr)); 
        gap: 12px; 
    }
</style>
</head>
<body>

<div id="top-bar">
    <a class="back-btn" href="index.html">← back</a>
    <span class="top-sep">|</span>
    <span id="top-title">matrix://yt.extract</span>
    <div id="node-status">
        <div class="status-pulse"></div>
        UPLINK: ACTIVE
    </div>
</div>

<div class="main-wrap">

    <div class="panel">
        <div class="panel-header">
            <span class="ph-dot">◈</span>
            YT-EXTRACT // MP4 · M4A DOWNLOADER
        </div>
        <div class="input-row">
            <span class="input-prefix">TARGET URL</span>
            <input type="text" id="yt-url"
                placeholder="https://youtube.com/watch?v=..."
                autocomplete="off" spellcheck="false">
        </div>
        <button id="extract-btn" onclick="initiateExtraction()">[ RESOLVE &amp; EXTRACT ]</button>
    </div>

    <div class="console" id="console">
        <div class="log-dim">> SYSTEM STANDBY. AWAITING TARGET URL...</div>
    </div>

    <div id="dl-options">
        <div id="dl-title"></div>
        <div class="dl-row" id="dl-row"></div>
    </div>

    <div class="note">
        <span style="font-size:11px;">EXTRACTION VIA <a href="https://cobalt.tools" target="_blank" rel="noopener">COBALT.TOOLS</a>
        &nbsp;·&nbsp; MAX QUALITY: 720p &nbsp;·&nbsp; NO DATA STORED
    </div>

</div>

<div class="crt-overlay"></div>

<script>
    const sleep = ms => new Promise(r => setTimeout(r, ms));

    function extractId(url) {
        const m = url.match(/(?:[?&]v=|youtu\.be\/|embed\/|\/v\/|shorts\/)([a-zA-Z0-9_-]{11})/);
        return m ? m[1] : null;
    }

    async function log(msg, type = 'ok', delay = 0) {
        if (delay > 0) await sleep(delay);
        const out = document.getElementById('console');
        const d = document.createElement('div');
        d.className = 'log-' + type;
        d.textContent = '> ' + msg;
        out.appendChild(d);
        out.scrollTop = out.scrollHeight;
    }

    const EXT_MAP = { 'MP4': 'mp4', 'M4A': 'm4a' };

    async function initiateExtraction() {
        const urlRaw = document.getElementById('yt-url').value.trim();
        const btn    = document.getElementById('extract-btn');
        const opts   = document.getElementById('dl-options');

        opts.style.display = 'none';
        document.getElementById('dl-row').innerHTML = '';

        if (!urlRaw) { log('NO TARGET URL PROVIDED.', 'err'); return; }
        if (!urlRaw.includes('youtube.com') && !urlRaw.includes('youtu.be') && !urlRaw.includes('youtube-nocookie.com')) {
            log('INVALID TARGET: Must be a YouTube URL.', 'err'); return;
        }

        const videoId = extractId(urlRaw);
        if (!videoId) { log('COULD NOT PARSE VIDEO ID FROM URL.', 'err'); return; }

        btn.disabled = true; btn.classList.add('extracting'); btn.textContent = '[ EXTRACTING... ]';
        document.getElementById('console').innerHTML = '';

        await log(`TARGET: ${urlRaw.slice(0, 50)}...`, 'dim');
        await log(`VIDEO ID: ${videoId}`, 'dim', 150);
        await log('RESOLVING VIA EXTRACTION API...', 'dim', 200);

        let data;
        try {
            const res = await fetch(`/api/yt?id=${encodeURIComponent(videoId)}`);
            data = await res.json();
            if (!res.ok || !data.ok) {
                await log('EXTRACTION FAILED: ' + (data.error || 'Unknown error'), 'err', 100);
                if (data.details) data.details.forEach(d => log(d, 'dim'));
                btn.disabled = false; btn.classList.remove('extracting'); btn.textContent = '[ RESOLVE & EXTRACT ]';
                return;
            }
        } catch (e) {
            await log('EXTRACTION FAILED: ' + e.message, 'err', 100);
            btn.disabled = false; btn.classList.remove('extracting'); btn.textContent = '[ RESOLVE & EXTRACT ]';
            return;
        }

        if (data._client) await log(`CLIENT_NODE: ${data._client}`, 'dim', 100);
        await log('METADATA RECEIVED.', 'ok', 100);
        await log(`TITLE: ${data.title}`, 'ok', 50);
        await log('HANDSHAKE COMPLETE.', 'dim', 100);
        await log('BUILDING DOWNLOAD LINKS...', 'dim', 150);

        const row = document.getElementById('dl-row');
        const safeName = data.title.replace(/[^a-z0-9 _-]/gi, '_').slice(0, 80);

        // Track which server index each format button is on
        const srvIndex = [];

        (data.formats || []).forEach(({ label, desc, urls }, i) => {
            if (!urls || urls.length === 0) return;
            const ext = EXT_MAP[label] || 'mp4';
            srvIndex[i] = 0;

            const getHost = u => {
                try { return new URL(u).hostname; } catch { return 'unknown node'; }
            };

            const a = document.createElement('a');
            a.className = 'dl-link';
            a.href = urls[0];
            a.target = '_blank';
            a.rel = 'noopener noreferrer';
            a.download = `${safeName}.${ext}`;
            a.innerHTML = `<span class="dl-fmt">${label}</span><span class="dl-desc">${desc}</span><span class="dl-srv">${getHost(urls[0])}</span>`;

            // Clicking the server label cycles to the next instance
            a.addEventListener('click', ev => {
                if (!ev.target.classList.contains('dl-srv')) return;
                ev.preventDefault();
                srvIndex[i] = (srvIndex[i] + 1) % urls.length;
                const nextUrl = urls[srvIndex[i]];
                a.href = nextUrl;
                a.querySelector('.dl-srv').textContent = getHost(nextUrl);
            });

            row.appendChild(a);
        });

        document.getElementById('dl-title').textContent = '▸ ' + data.title;
        opts.style.display = 'flex';
        await log('EXTRACTION COMPLETE. SELECT FORMAT BELOW.', 'done', 200);
        if (data.formats[0]?.urls?.length > 1)
            await log('Hint: Click the server name to cycle nodes if one is slow.', 'dim', 100);

        btn.disabled = false; btn.classList.remove('extracting'); btn.textContent = '[ RESOLVE & EXTRACT ]';
    }

    document.getElementById('yt-url').addEventListener('keydown', e => {
        if (e.key === 'Enter') initiateExtraction();
    });
</script>
</body>
</html>
