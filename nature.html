<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>matrix://nature.scan</title>
    <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #000000; --green: #00ff41; --green-mid: #00cc44;
            --green-dim: #008800; --green-dark: #003300;
            --border: rgba(0,255,65,0.1); --font: 'IBM Plex Mono','Courier New',monospace;
        }
        * { margin:0; padding:0; box-sizing:border-box; }
        body, html { width:100vw; height:100vh; background:var(--bg); color:var(--green); font-family:var(--font); overflow:hidden; }

        /* CRT overlay */
        body::after {
            content:''; position:fixed; inset:0; z-index:9000; pointer-events:none;
            background:
                repeating-linear-gradient(to bottom, transparent 0px, transparent 2px, rgba(0,0,0,0.055) 2px, rgba(0,0,0,0.055) 4px),
                radial-gradient(ellipse at 50% 50%, transparent 48%, rgba(0,0,0,0.42) 100%);
        }

        /* Scan beam */
        #scan-beam {
            position:fixed; left:0; right:0; height:2px; z-index:8999; pointer-events:none;
            background:linear-gradient(to bottom, transparent, rgba(0,255,65,0.22), transparent);
            animation:sweepDown 6s linear infinite;
        }
        @keyframes sweepDown { 0%{top:-10px} 100%{top:100vh} }

        /* Top bar */
        #top-bar {
            position:fixed; top:0; left:0; right:0; z-index:300;
            height:32px; display:flex; align-items:center; gap:8px; padding:0 12px;
            background:rgba(0,0,0,0.96); border-bottom:1px solid var(--border); backdrop-filter:blur(6px);
            font-size:10px; letter-spacing:0.4px; overflow:hidden;
        }
        .back-btn {
            color:#005c18; text-decoration:none; border:1px solid rgba(0,255,65,0.18);
            padding:2px 8px; border-radius:3px; transition:all 0.2s; flex-shrink:0;
        }
        .back-btn:hover { color:var(--green); border-color:rgba(0,255,65,0.6); background:rgba(0,255,65,0.05); }
        .top-sep { color:#001800; flex-shrink:0; }
        #top-title { color:#004d14; flex-shrink:0; }
        #status-dot { font-size:9px; color:#005c18; transition:color 0.5s; flex-shrink:0; }
        #status-dot.live { color:var(--green); animation:blink 2s ease-in-out infinite; }
        @keyframes blink { 0%,100%{opacity:1} 50%{opacity:0.3} }
        #status-text { color:#005c18; font-size:9px; transition:color 0.5s; flex-shrink:0; }
        #status-text.live { color:var(--green-mid); }

        /* Source badges */
        .src-badge {
            font-size:8px; padding:1px 6px; border-radius:2px; flex-shrink:0;
            border:1px solid rgba(0,255,65,0.15); letter-spacing:0.8px;
        }
        .src-badge.online  { color:var(--green-mid); border-color:rgba(0,255,65,0.35); }
        .src-badge.offline { color:#440000; border-color:rgba(255,50,50,0.25); }

        /* Taxon filters */
        #filters { display:flex; gap:4px; margin-left:auto; flex-shrink:0; }
        .flt-btn {
            background:transparent; border:1px solid rgba(0,255,65,0.14); color:#005c18;
            font-family:var(--font); font-size:8px; padding:2px 7px; cursor:pointer;
            border-radius:2px; transition:all 0.15s; letter-spacing:0.8px;
        }
        .flt-btn:hover { color:var(--green-mid); border-color:rgba(0,255,65,0.4); }
        .flt-btn.active { color:var(--green); border-color:var(--green); background:rgba(0,255,65,0.06); }

        /* Main scroll area */
        #main { position:fixed; top:32px; bottom:28px; left:0; right:0; overflow-y:auto; padding:16px; }
        #main::-webkit-scrollbar { width:3px; }
        #main::-webkit-scrollbar-thumb { background:rgba(0,255,65,0.15); border-radius:2px; }

        /* Observation grid */
        #obs-grid {
            display:grid;
            grid-template-columns:repeat(auto-fill, minmax(210px, 1fr));
            gap:12px;
        }

        /* Observation card */
        .obs-card {
            background:rgba(0,4,0,0.92); border:1px solid rgba(0,255,65,0.18);
            border-radius:4px; overflow:hidden; cursor:pointer;
            transition:border-color 0.2s, box-shadow 0.2s, transform 0.15s;
            animation:cardIn 0.3s cubic-bezier(0.34,1.56,0.64,1);
        }
        @keyframes cardIn { from{opacity:0;transform:scale(0.9)} to{opacity:1;transform:scale(1)} }
        .obs-card:hover {
            border-color:rgba(0,255,65,0.65); transform:translateY(-2px);
            box-shadow:0 8px 28px rgba(0,0,0,0.8), 0 0 18px rgba(0,255,65,0.12);
        }

        /* Card photo */
        .obs-img-wrap {
            position:relative; height:138px; overflow:hidden; background:#000300;
            display:flex; align-items:center; justify-content:center;
        }
        .obs-img {
            width:100%; height:100%; object-fit:cover;
            filter:sepia(100%) hue-rotate(90deg) brightness(0.82) saturate(2.8) contrast(1.1);
            transition:transform 0.35s ease;
        }
        .obs-card:hover .obs-img { transform:scale(1.06); }
        .obs-no-img {
            color:#003300; font-size:9px; letter-spacing:2px; text-align:center;
            line-height:2; user-select:none;
        }
        .obs-taxon-tag {
            position:absolute; top:6px; left:7px;
            font-size:8px; letter-spacing:1.5px; color:#007a22;
            background:rgba(0,0,0,0.75); padding:1px 5px; border-radius:2px;
            border:1px solid rgba(0,255,65,0.15);
        }
        .obs-grade {
            position:absolute; top:6px; right:7px; font-size:9px;
            padding:1px 5px; border-radius:2px; background:rgba(0,0,0,0.75);
        }
        .obs-grade.research  { color:var(--green); border:1px solid rgba(0,255,65,0.3); }
        .obs-grade.needs_id  { color:#ccaa00;       border:1px solid rgba(200,170,0,0.3); }
        .obs-grade.casual    { color:#555;           border:1px solid rgba(100,100,100,0.2); }

        /* Card body */
        .obs-body { padding:10px 11px; }
        .obs-sci  { font-size:11px; font-weight:600; color:var(--green); line-height:1.3; font-style:italic; }
        .obs-common { font-size:9px; color:#007a22; letter-spacing:0.5px; margin-top:2px; }
        .obs-div  { height:1px; background:rgba(0,255,65,0.07); margin:7px 0; }
        .obs-meta { font-size:9px; color:#005c18; line-height:1.7; }
        .obs-place { display:block; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
        .obs-who  { display:block; color:#004400; }

        /* Loading skeletons */
        .obs-skeleton { background:rgba(0,4,0,0.92); border:1px solid rgba(0,255,65,0.07); border-radius:4px; overflow:hidden; }
        .skel-img  { height:138px; background:rgba(0,255,65,0.03); animation:skelPulse 1.4s ease-in-out infinite; }
        .skel-body { padding:10px 11px; display:flex; flex-direction:column; gap:6px; }
        .skel-line { height:10px; border-radius:2px; background:rgba(0,255,65,0.04); animation:skelPulse 1.4s ease-in-out infinite; }
        @keyframes skelPulse { 0%,100%{opacity:0.5} 50%{opacity:1} }

        /* Load more */
        #load-wrap { display:flex; justify-content:center; padding:20px 0 8px; }
        #load-more {
            background:transparent; border:1px solid rgba(0,255,65,0.2); color:#005c18;
            font-family:var(--font); font-size:10px; padding:6px 24px; cursor:pointer;
            border-radius:3px; letter-spacing:1px; transition:all 0.2s;
        }
        #load-more:hover { color:var(--green); border-color:rgba(0,255,65,0.6); }
        #load-more:disabled { color:#002200; border-color:rgba(0,255,65,0.08); cursor:default; }
        #obs-count { font-size:9px; color:#004400; text-align:center; margin-top:8px; }

        /* Bottom bar */
        #bottom-bar {
            position:fixed; bottom:0; left:0; right:0; z-index:300; height:28px;
            display:flex; align-items:center; gap:10px; padding:0 12px;
            background:rgba(0,1,0,0.97); border-top:1px solid var(--border); font-size:9px;
        }
        .bb-icon { color:var(--green); text-shadow:0 0 8px rgba(0,255,65,0.8); animation:blink 2s ease-in-out infinite; }
        .bb-label { color:var(--green-mid); letter-spacing:2px; font-weight:600; font-size:8px; }
        #bb-total { color:#005c18; }
        #bb-updated { color:#004400; margin-left:auto; }

        /* Detail modal */
        #detail-overlay {
            position:fixed; inset:0; z-index:600;
            background:rgba(0,0,0,0.85); backdrop-filter:blur(8px);
            display:flex; align-items:center; justify-content:center;
            opacity:0; visibility:hidden; transition:opacity 0.25s, visibility 0.25s;
        }
        #detail-overlay.show { opacity:1; visibility:visible; }
        #detail-modal {
            background:#020702; border:1px solid rgba(0,255,65,0.35); border-radius:8px;
            width:560px; max-width:92vw; max-height:90vh; overflow-y:auto;
            transform:scale(0.88) translateY(20px); opacity:0;
            transition:transform 0.35s cubic-bezier(0.34,1.56,0.64,1), opacity 0.25s;
        }
        #detail-modal::-webkit-scrollbar { width:3px; }
        #detail-overlay.show #detail-modal { transform:scale(1) translateY(0); opacity:1; }
        .dm-img-wrap { height:260px; overflow:hidden; position:relative; }
        .dm-img { width:100%; height:100%; object-fit:cover; filter:sepia(100%) hue-rotate(90deg) brightness(0.82) saturate(2.8) contrast(1.1); }
        .dm-no-img { height:100%; display:flex; align-items:center; justify-content:center; color:#003300; font-size:10px; letter-spacing:3px; background:#000300; }
        .dm-close { position:absolute; top:10px; right:12px; color:#005c18; cursor:pointer; font-size:18px; background:rgba(0,0,0,0.7); padding:2px 8px; border-radius:3px; transition:color 0.2s; }
        .dm-close:hover { color:var(--green); }
        .dm-body { padding:20px 22px; display:flex; flex-direction:column; gap:12px; }
        .dm-sci   { font-size:18px; font-weight:600; color:var(--green); font-style:italic; }
        .dm-common{ font-size:12px; color:var(--green-mid); letter-spacing:0.5px; }
        .dm-grid  { display:grid; grid-template-columns:1fr 1fr; gap:1px; background:rgba(0,255,65,0.06); border:1px solid rgba(0,255,65,0.1); border-radius:3px; overflow:hidden; }
        .dm-cell  { padding:9px 12px; background:#010501; }
        .dm-key   { font-size:8px; color:#004400; letter-spacing:1.5px; margin-bottom:4px; }
        .dm-val   { font-size:11px; color:var(--green-mid); }
        .dm-link  { color:#005c18; text-decoration:none; font-size:10px; letter-spacing:0.5px; border:1px solid rgba(0,255,65,0.15); padding:4px 12px; border-radius:3px; transition:all 0.2s; align-self:flex-start; }
        .dm-link:hover { color:var(--green); border-color:rgba(0,255,65,0.5); }
    </style>
</head>
<body>

<div id="scan-beam"></div>

<div id="top-bar">
    <a class="back-btn" href="index.html">← back</a>
    <span class="top-sep">|</span>
    <span id="top-title">matrix://nature.scan</span>
    <span class="top-sep">|</span>
    <span id="status-dot">●</span>
    <span id="status-text">CONNECTING</span>
    <span class="top-sep">|</span>
    <span class="src-badge online" id="src-inat">iNaturalist ●</span>
    <span class="src-badge offline" id="src-ant">AntAPI ✕</span>
    <div id="filters">
        <button class="flt-btn active" data-taxon="">ALL</button>
        <button class="flt-btn" data-taxon="Aves">AVES</button>
        <button class="flt-btn" data-taxon="Mammalia">MAMMALIA</button>
        <button class="flt-btn" data-taxon="Insecta">INSECTA</button>
        <button class="flt-btn" data-taxon="Plantae">PLANTAE</button>
        <button class="flt-btn" data-taxon="Fungi">FUNGI</button>
        <button class="flt-btn" data-taxon="Reptilia">REPTILIA</button>
        <button class="flt-btn" data-taxon="Arachnida">ARACHNIDA</button>
    </div>
</div>

<div id="main">
    <div id="obs-grid"></div>
    <div id="load-wrap">
        <button id="load-more">LOAD MORE</button>
    </div>
    <div id="obs-count"></div>
</div>

<div id="bottom-bar">
    <span class="bb-icon">◉</span>
    <span class="bb-label">BIOSCAN</span>
    <span class="top-sep">|</span>
    <span id="bb-total">— observations</span>
    <span id="bb-updated"></span>
</div>

<div id="detail-overlay" onclick="handleOverlayClick(event)">
    <div id="detail-modal">
        <div class="dm-img-wrap" id="dm-img-wrap"></div>
        <div class="dm-body">
            <div class="dm-sci" id="dm-sci"></div>
            <div class="dm-common" id="dm-common"></div>
            <div class="dm-grid">
                <div class="dm-cell"><div class="dm-key">TAXON</div><div class="dm-val" id="dm-taxon"></div></div>
                <div class="dm-cell"><div class="dm-key">QUALITY</div><div class="dm-val" id="dm-quality"></div></div>
                <div class="dm-cell"><div class="dm-key">LOCATION</div><div class="dm-val" id="dm-place"></div></div>
                <div class="dm-cell"><div class="dm-key">OBSERVED</div><div class="dm-val" id="dm-date"></div></div>
                <div class="dm-cell"><div class="dm-key">OBSERVER</div><div class="dm-val" id="dm-user"></div></div>
                <div class="dm-cell"><div class="dm-key">RANK</div><div class="dm-val" id="dm-rank"></div></div>
            </div>
            <a id="dm-link" class="dm-link" href="#" target="_blank" rel="noopener">VIEW ON INATURALIST ↗</a>
        </div>
    </div>
</div>

<script>
(function () {
    const INAT_BASE = 'https://api.inaturalist.org/v2/observations';
    const FIELDS    = 'taxon,observed_on,place_guess,photos,user,quality_grade,description,uri';
    const PER_PAGE  = 20;

    let currentTaxon = '';
    let currentPage  = 1;
    let totalResults = 0;
    let loading      = false;
    let obsCache     = {}; // uuid → observation

    const grid      = document.getElementById('obs-grid');
    const loadBtn   = document.getElementById('load-more');
    const obsCount  = document.getElementById('obs-count');
    const statusDot = document.getElementById('status-dot');
    const statusTxt = document.getElementById('status-text');
    const bbTotal   = document.getElementById('bb-total');
    const bbUpdated = document.getElementById('bb-updated');

    // ── iNaturalist fetch ──
    async function fetchObs(taxon, page) {
        const params = new URLSearchParams({
            per_page: PER_PAGE, page,
            order: 'created_at', order_by: 'desc',
            photos: 'true', quality_grade: 'research,needs_id',
            fields: FIELDS
        });
        if (taxon) params.set('iconic_taxa', taxon);
        const res = await fetch(`${INAT_BASE}?${params}`);
        if (!res.ok) throw new Error(res.status);
        return res.json();
    }

    // ── AntAPI probe (graceful) ──
    async function probeAntApi() {
        try {
            const res = await fetch('https://api.antapi.org/', { signal: AbortSignal.timeout(5000) });
            if (res.ok) {
                document.getElementById('src-ant').className = 'src-badge online';
                document.getElementById('src-ant').textContent = 'AntAPI ●';
            }
        } catch {}
    }

    // ── Time helper ──
    function relTime(dateStr) {
        if (!dateStr) return '—';
        const diff = Date.now() - new Date(dateStr).getTime();
        const h = Math.floor(diff / 3600000);
        if (h < 1) return '< 1h ago';
        if (h < 24) return h + 'h ago';
        const d = Math.floor(h / 24);
        return d + 'd ago';
    }

    // ── Photo URL ──
    function photoUrl(obs, size = 'small') {
        const p = obs.photos?.[0];
        if (!p?.url) return null;
        return p.url.replace('square', size);
    }

    // ── Taxon display ──
    const TAXON_SHORT = {
        Aves:'AVES', Mammalia:'MAMMALIA', Insecta:'INSECTA', Plantae:'PLANTAE',
        Fungi:'FUNGI', Reptilia:'REPTILIA', Amphibia:'AMPHIBIA', Arachnida:'ARACHNIDA',
        Actinopterygii:'FISH', Mollusca:'MOLLUSCA', Chromista:'CHROMISTA'
    };
    function taxonTag(obs) {
        return TAXON_SHORT[obs.taxon?.iconic_taxon_name] || (obs.taxon?.iconic_taxon_name?.toUpperCase() || 'UNKNOWN');
    }

    // ── Render skeletons ──
    function showSkeletons(n) {
        for (let i = 0; i < n; i++) {
            const el = document.createElement('div');
            el.className = 'obs-skeleton';
            el.innerHTML = `<div class="skel-img"></div><div class="skel-body"><div class="skel-line" style="width:80%"></div><div class="skel-line" style="width:55%"></div><div class="skel-line" style="width:70%;margin-top:4px"></div></div>`;
            grid.appendChild(el);
        }
    }
    function clearSkeletons() {
        grid.querySelectorAll('.obs-skeleton').forEach(el => el.remove());
    }

    // ── Render cards ──
    function renderCard(obs) {
        const url    = photoUrl(obs, 'small');
        const tag    = taxonTag(obs);
        const grade  = obs.quality_grade || 'casual';
        const gradeSymbol = grade === 'research' ? '● RG' : grade === 'needs_id' ? '○ ID?' : '· CAS';
        const sci    = obs.taxon?.name || '—';
        const common = obs.taxon?.preferred_common_name || '';
        const place  = obs.place_guess || '—';
        const user   = obs.user?.login || '—';

        const card = document.createElement('div');
        card.className = 'obs-card';
        card.dataset.uuid = obs.uuid;
        card.innerHTML = `
            <div class="obs-img-wrap">
                ${url
                    ? `<img class="obs-img" src="${url}" loading="lazy" alt="" onerror="this.style.display='none';this.parentElement.querySelector('.obs-no-img').style.display='flex'">`
                    : ''}
                <div class="obs-no-img" style="display:${url ? 'none' : 'flex'}; flex-direction:column; gap:4px;">
                    <span style="font-size:22px;color:#003300">◉</span>
                    <span style="font-size:8px;letter-spacing:2px;">NO VISUAL</span>
                </div>
                <span class="obs-taxon-tag">${tag}</span>
                <span class="obs-grade ${grade}">${gradeSymbol}</span>
            </div>
            <div class="obs-body">
                <div class="obs-sci">${sci}</div>
                ${common ? `<div class="obs-common">${common.toUpperCase()}</div>` : ''}
                <div class="obs-div"></div>
                <div class="obs-meta">
                    <span class="obs-place">▸ ${place}</span>
                    <span class="obs-who">${relTime(obs.observed_on)} · @${user}</span>
                </div>
            </div>
        `;
        card.addEventListener('click', () => openDetail(obs.uuid));
        obsCache[obs.uuid] = obs;
        return card;
    }

    // ── Load observations ──
    async function loadObs(reset = false) {
        if (loading) return;
        loading = true;
        loadBtn.disabled = true;
        statusDot.className = ''; statusTxt.className = '';
        statusTxt.textContent = 'SCANNING';

        if (reset) {
            grid.innerHTML = '';
            currentPage = 1;
        }

        showSkeletons(PER_PAGE);

        try {
            const data = await fetchObs(currentTaxon, currentPage);
            totalResults = data.total_results || 0;
            clearSkeletons();

            (data.results || []).forEach(obs => grid.appendChild(renderCard(obs)));

            currentPage++;
            const shown = grid.querySelectorAll('.obs-card').length;
            obsCount.textContent = `SHOWING ${shown} OF ${totalResults.toLocaleString()}`;
            bbTotal.textContent  = `${totalResults.toLocaleString()} TOTAL OBSERVATIONS`;
            bbUpdated.textContent = 'UPDATED ' + new Date().toLocaleTimeString();

            statusDot.className  = 'live'; statusTxt.className = 'live';
            statusTxt.textContent = 'LIVE';
            loadBtn.disabled = shown >= totalResults;
            loadBtn.textContent = shown >= totalResults ? 'ALL LOADED' : 'LOAD MORE';
        } catch (err) {
            clearSkeletons();
            statusTxt.textContent = 'ERROR';
            loadBtn.disabled = false;
        }
        loading = false;
    }

    // ── Detail modal ──
    function openDetail(uuid) {
        const obs = obsCache[uuid];
        if (!obs) return;

        const url  = photoUrl(obs, 'medium');
        const imgWrap = document.getElementById('dm-img-wrap');
        imgWrap.innerHTML = url
            ? `<img class="dm-img" src="${url}" alt=""><span class="dm-close" onclick="closeDetail()">✕</span>`
            : `<div class="dm-no-img">NO VISUAL DATA</div><span class="dm-close" onclick="closeDetail()">✕</span>`;

        document.getElementById('dm-sci').textContent    = obs.taxon?.name || '—';
        document.getElementById('dm-common').textContent = (obs.taxon?.preferred_common_name || '').toUpperCase() || '—';
        document.getElementById('dm-taxon').textContent  = obs.taxon?.iconic_taxon_name || '—';
        document.getElementById('dm-quality').textContent= obs.quality_grade || '—';
        document.getElementById('dm-place').textContent  = obs.place_guess || '—';
        document.getElementById('dm-date').textContent   = obs.observed_on || '—';
        document.getElementById('dm-user').textContent   = '@' + (obs.user?.login || '—');
        document.getElementById('dm-rank').textContent   = obs.taxon?.rank || '—';
        document.getElementById('dm-link').href          = obs.uri || '#';

        document.getElementById('detail-overlay').classList.add('show');
    }

    window.closeDetail = function () {
        document.getElementById('detail-overlay').classList.remove('show');
    };
    window.handleOverlayClick = function (e) {
        if (e.target === document.getElementById('detail-overlay')) closeDetail();
    };
    document.addEventListener('keydown', e => { if (e.key === 'Escape') closeDetail(); });

    // ── Filters ──
    document.querySelectorAll('.flt-btn').forEach(btn => {
        btn.addEventListener('click', () => {
            document.querySelectorAll('.flt-btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            currentTaxon = btn.dataset.taxon;
            loadObs(true);
        });
    });

    // ── Load more ──
    loadBtn.addEventListener('click', () => loadObs(false));

    // ── Init ──
    probeAntApi();
    loadObs(true);
    setInterval(() => { if (currentPage === 2) loadObs(true); }, 120000);
})();
</script>
</body>
</html>
