<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>matrix://nature.scan</title>
    <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg:#000000; --green:#00ff41; --green-mid:#00cc44;
            --green-dim:#008800; --green-dark:#003300;
            --border:rgba(0,255,65,0.1); --font:'IBM Plex Mono','Courier New',monospace;
        }
        *{margin:0;padding:0;box-sizing:border-box;}
        body,html{width:100vw;height:100vh;background:var(--bg);color:var(--green);font-family:var(--font);overflow:hidden;}

        #bg-canvas{position:fixed;inset:0;z-index:0;pointer-events:none;}

        body::after{
            content:'';position:fixed;inset:0;z-index:9000;pointer-events:none;
            background:
                repeating-linear-gradient(to bottom,transparent 0px,transparent 2px,rgba(0,0,0,0.06) 2px,rgba(0,0,0,0.06) 4px),
                radial-gradient(ellipse at 50% 50%,transparent 45%,rgba(0,0,0,0.5) 100%);
        }

        #scan-beam{
            position:fixed;left:0;right:0;height:70px;z-index:8999;pointer-events:none;
            background:linear-gradient(to bottom,transparent 0%,rgba(0,255,65,0.02) 25%,rgba(0,255,65,0.14) 48%,rgba(0,255,65,0.2) 50%,rgba(0,255,65,0.14) 52%,rgba(0,255,65,0.02) 75%,transparent 100%);
            animation:sweepDown 5s linear infinite;
        }
        #scan-beam::after{
            content:'';position:absolute;left:0;right:0;height:1px;top:50%;
            background:linear-gradient(to right,transparent 0%,rgba(0,255,65,0.0) 5%,rgba(0,255,65,1) 20%,rgba(0,255,65,1) 80%,rgba(0,255,65,0.0) 95%,transparent 100%);
            box-shadow:0 0 14px rgba(0,255,65,0.9),0 0 35px rgba(0,255,65,0.5),0 0 60px rgba(0,255,65,0.2);
        }
        @keyframes sweepDown{0%{top:-70px}100%{top:calc(100vh + 70px)}}

        #top-bar{
            position:fixed;top:0;left:0;right:0;z-index:300;
            height:32px;display:flex;align-items:center;gap:8px;padding:0 12px;
            background:rgba(0,0,0,0.92);border-bottom:1px solid var(--border);backdrop-filter:blur(6px);
            font-size:10px;letter-spacing:0.4px;overflow:hidden;
        }
        .back-btn{
            color:#005c18;text-decoration:none;border:1px solid rgba(0,255,65,0.18);
            padding:2px 8px;border-radius:3px;transition:all 0.2s;flex-shrink:0;
        }
        .back-btn:hover{color:var(--green);border-color:rgba(0,255,65,0.6);background:rgba(0,255,65,0.05);}
        .top-sep{color:#001800;flex-shrink:0;}
        #top-title{color:#004d14;flex-shrink:0;}
        #status-dot{font-size:9px;color:#005c18;transition:color 0.5s;flex-shrink:0;}
        #status-dot.live{color:var(--green);animation:blink 2s ease-in-out infinite;}
        @keyframes blink{0%,100%{opacity:1}50%{opacity:0.3}}
        #status-text{color:#005c18;font-size:9px;transition:color 0.5s;flex-shrink:0;}
        #status-text.live{color:var(--green-mid);}
        .src-badge{font-size:8px;padding:1px 6px;border-radius:2px;flex-shrink:0;border:1px solid rgba(0,255,65,0.15);letter-spacing:0.8px;}
        .src-badge.online{color:var(--green-mid);border-color:rgba(0,255,65,0.35);}
        .src-badge.offline{color:#440000;border-color:rgba(255,50,50,0.25);}

        #filters{display:flex;gap:4px;margin-left:auto;flex-shrink:0;}
        .flt-btn{
            background:transparent;border:1px solid rgba(0,255,65,0.14);color:#005c18;
            font-family:var(--font);font-size:8px;padding:2px 7px;cursor:pointer;
            border-radius:2px;transition:all 0.15s;letter-spacing:0.8px;
        }
        .flt-btn:hover{color:var(--green-mid);border-color:rgba(0,255,65,0.4);}
        .flt-btn.active{color:var(--green);border-color:var(--green);background:rgba(0,255,65,0.06);}

        #main{
            position:fixed;top:32px;bottom:28px;left:0;right:0;
            overflow-y:auto;padding:20px;
        }
        #main::-webkit-scrollbar{width:3px;}
        #main::-webkit-scrollbar-thumb{background:rgba(0,255,65,0.15);border-radius:2px;}

        #obs-grid{
            display:grid;
            grid-template-columns:repeat(auto-fill,minmax(220px,1fr));
            gap:16px;
            transform-style:preserve-3d;
            will-change:transform;
        }

        .obs-card{
            background:rgba(0,5,0,0.93);
            border:1px solid rgba(0,255,65,0.22);
            border-radius:6px;overflow:hidden;cursor:pointer;
            will-change:transform;
            transition:border-color 0.25s, box-shadow 0.25s;
        }
        .obs-card:hover{border-color:rgba(0,255,65,0.8);}

        @keyframes flyIn{
            from{opacity:0;transform:perspective(800px) rotateX(18deg) translateZ(-350px) scale(0.82);}
            to  {opacity:1;transform:perspective(800px) rotateX(0deg)  translateZ(0px)   scale(1);}
        }
        .obs-card.fly{animation:flyIn 0.6s cubic-bezier(0.22,1,0.36,1) both;}

        .obs-img-wrap{
            position:relative;height:148px;overflow:hidden;background:#000300;
            display:flex;align-items:center;justify-content:center;
        }
        .obs-img-wrap::after{
            content:'';position:absolute;inset:0;pointer-events:none;
            background:linear-gradient(135deg,transparent 35%,rgba(0,255,65,0.05) 50%,transparent 65%);
            opacity:0;transition:opacity 0.3s;transform:translateX(-100%);
        }
        .obs-card:hover .obs-img-wrap::after{opacity:1;transform:translateX(100%);transition:opacity 0.3s,transform 0.6s ease;}
        .obs-img{
            width:100%;height:100%;object-fit:cover;
            filter:sepia(100%) hue-rotate(90deg) brightness(0.82) saturate(2.8) contrast(1.1);
            transition:transform 0.4s ease,filter 0.3s;
        }
        .obs-card:hover .obs-img{transform:scale(1.09);filter:sepia(100%) hue-rotate(90deg) brightness(0.9) saturate(3.3) contrast(1.15);}
        .obs-no-img{color:#003300;font-size:9px;letter-spacing:2px;text-align:center;line-height:2;user-select:none;}
        .obs-taxon-tag{
            position:absolute;top:6px;left:7px;font-size:8px;letter-spacing:1.5px;color:#00aa33;
            background:rgba(0,0,0,0.82);padding:1px 6px;border-radius:2px;border:1px solid rgba(0,255,65,0.2);
            text-shadow:0 0 8px rgba(0,255,65,0.6);
        }
        .obs-grade{position:absolute;top:6px;right:7px;font-size:9px;padding:1px 5px;border-radius:2px;background:rgba(0,0,0,0.82);}
        .obs-grade.research{color:var(--green);border:1px solid rgba(0,255,65,0.35);text-shadow:0 0 8px rgba(0,255,65,0.7);}
        .obs-grade.needs_id{color:#ccaa00;border:1px solid rgba(200,170,0,0.3);}
        .obs-grade.casual{color:#555;border:1px solid rgba(100,100,100,0.2);}

        .obs-body{padding:10px 12px;}
        .obs-sci{font-size:11px;font-weight:600;color:var(--green);line-height:1.3;font-style:italic;text-shadow:0 0 14px rgba(0,255,65,0.25);}
        .obs-common{font-size:9px;color:#007a22;letter-spacing:0.5px;margin-top:2px;}
        .obs-div{height:1px;background:rgba(0,255,65,0.08);margin:7px 0;}
        .obs-meta{font-size:9px;color:#005c18;line-height:1.7;}
        .obs-place{display:block;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
        .obs-who{display:block;color:#004400;}

        .obs-skeleton{background:rgba(0,4,0,0.92);border:1px solid rgba(0,255,65,0.07);border-radius:6px;overflow:hidden;}
        .skel-img{height:148px;background:rgba(0,255,65,0.03);animation:skelPulse 1.4s ease-in-out infinite;}
        .skel-body{padding:10px 12px;display:flex;flex-direction:column;gap:6px;}
        .skel-line{height:10px;border-radius:2px;background:rgba(0,255,65,0.04);animation:skelPulse 1.4s ease-in-out infinite;}
        @keyframes skelPulse{0%,100%{opacity:0.4}50%{opacity:1}}

        #load-wrap{display:flex;justify-content:center;padding:24px 0 10px;}
        #load-more{
            background:transparent;border:1px solid rgba(0,255,65,0.22);color:#005c18;
            font-family:var(--font);font-size:10px;padding:7px 30px;cursor:pointer;
            border-radius:3px;letter-spacing:1.5px;transition:all 0.2s;overflow:hidden;position:relative;
        }
        #load-more::before{
            content:'';position:absolute;inset:0;
            background:linear-gradient(90deg,transparent,rgba(0,255,65,0.07),transparent);
            transform:translateX(-100%);transition:transform 0.5s;
        }
        #load-more:hover::before{transform:translateX(100%);}
        #load-more:hover{color:var(--green);border-color:rgba(0,255,65,0.65);box-shadow:0 0 20px rgba(0,255,65,0.12);}
        #load-more:disabled{color:#002200;border-color:rgba(0,255,65,0.08);cursor:default;}
        #obs-count{font-size:9px;color:#004400;text-align:center;margin-top:10px;letter-spacing:1px;}

        #bottom-bar{
            position:fixed;bottom:0;left:0;right:0;z-index:300;height:28px;
            display:flex;align-items:center;gap:10px;padding:0 12px;
            background:rgba(0,1,0,0.97);border-top:1px solid var(--border);font-size:9px;
        }
        .bb-icon{color:var(--green);text-shadow:0 0 8px rgba(0,255,65,0.8);animation:blink 2s ease-in-out infinite;}
        .bb-label{color:var(--green-mid);letter-spacing:2px;font-weight:600;font-size:8px;}
        #bb-total{color:#005c18;}
        #bb-updated{color:#004400;margin-left:auto;}

        #detail-overlay{
            position:fixed;inset:0;z-index:600;
            background:rgba(0,0,0,0.9);backdrop-filter:blur(12px);
            display:flex;align-items:center;justify-content:center;
            opacity:0;visibility:hidden;transition:opacity 0.25s,visibility 0.25s;
        }
        #detail-overlay.show{opacity:1;visibility:visible;}
        #detail-modal{
            background:#010901;border:1px solid rgba(0,255,65,0.4);border-radius:8px;
            width:580px;max-width:93vw;max-height:90vh;overflow-y:auto;
            transform:perspective(1000px) rotateX(14deg) scale(0.88) translateY(28px);opacity:0;
            transition:transform 0.42s cubic-bezier(0.34,1.56,0.64,1),opacity 0.3s;
            box-shadow:0 0 70px rgba(0,255,65,0.1),0 40px 90px rgba(0,0,0,0.95);
        }
        #detail-modal::-webkit-scrollbar{width:3px;}
        #detail-overlay.show #detail-modal{transform:perspective(1000px) rotateX(0deg) scale(1) translateY(0);opacity:1;}
        .dm-img-wrap{height:280px;overflow:hidden;position:relative;}
        .dm-img{width:100%;height:100%;object-fit:cover;filter:sepia(100%) hue-rotate(90deg) brightness(0.85) saturate(3) contrast(1.1);}
        .dm-no-img{height:100%;display:flex;align-items:center;justify-content:center;color:#003300;font-size:10px;letter-spacing:3px;background:#000300;}
        .dm-close{position:absolute;top:10px;right:12px;color:#005c18;cursor:pointer;font-size:18px;background:rgba(0,0,0,0.75);padding:2px 8px;border-radius:3px;transition:color 0.2s;}
        .dm-close:hover{color:var(--green);}
        .dm-body{padding:22px 24px;display:flex;flex-direction:column;gap:14px;}
        .dm-sci{font-size:20px;font-weight:600;color:var(--green);font-style:italic;text-shadow:0 0 22px rgba(0,255,65,0.45);}
        .dm-common{font-size:12px;color:var(--green-mid);letter-spacing:0.5px;}
        .dm-grid{display:grid;grid-template-columns:1fr 1fr;gap:1px;background:rgba(0,255,65,0.06);border:1px solid rgba(0,255,65,0.12);border-radius:3px;overflow:hidden;}
        .dm-cell{padding:10px 13px;background:#010501;}
        .dm-key{font-size:8px;color:#004400;letter-spacing:1.5px;margin-bottom:4px;}
        .dm-val{font-size:11px;color:var(--green-mid);}
        .dm-link{color:#005c18;text-decoration:none;font-size:10px;letter-spacing:0.5px;border:1px solid rgba(0,255,65,0.18);padding:5px 14px;border-radius:3px;transition:all 0.2s;align-self:flex-start;}
        .dm-link:hover{color:var(--green);border-color:rgba(0,255,65,0.5);box-shadow:0 0 16px rgba(0,255,65,0.1);}
    </style>
</head>
<body>

<canvas id="bg-canvas"></canvas>
<div id="scan-beam"></div>

</div>

<div id="bottom-bar">

                <div class="dm-cell"><div class="dm-key">LOCATION</div><div class="dm-val" id="dm-place"></div></div>
                <div class="dm-cell"><div class="dm-key">OBSERVED</div><div class="dm-val" id="dm-date"></div></div>
                <div class="dm-cell"><div class="dm-key">OBSERVER</div><div class="dm-val" id="dm-user"></div></div>
                <div class="dm-cell"><div class="dm-key">RANK</div>    <div class="dm-val" id="dm-rank"></div></div>
            </div>
            <a id="dm-link" class="dm-link" href="#" target="_blank" rel="noopener">VIEW ON INATURALIST ↗</a>
        </div>
    </div>
</div>

<script>
/* ═══════════════════════════════════════════
   3D CANVAS: starfield + tron perspective grid
   ═══════════════════════════════════════════ */
(function () {
    const canvas = document.getElementById('bg-canvas');
    const ctx    = canvas.getContext('2d');

    // Stars flying toward viewer
    const STAR_COUNT = 200;
    const stars = Array.from({ length: STAR_COUNT }, () => mkStar(true));

    function mkStar(randomZ) {
        return {
            x: (Math.random() - 0.5) * 3200,
            y: (Math.random() - 0.5) * 2400,
            z: randomZ ? Math.random() * 1600 + 50 : 1600,
            r: Math.random() * 1.4 + 0.3,
            spd: Math.random() * 1.8 + 0.5,
        };
    }

    // Horizontal tron lines (each has a z depth that decreases)
    const H_LINES = 14;
    const hLines  = Array.from({ length: H_LINES }, (_, i) => ({
        z: 10 + i * (160 / H_LINES),
    }));
    const FOV       = 520;
    const GRID_SPAN = 85; // half-width in world units
    const EYE_H     = 22; // viewer height above grid plane

    function screenPos(wx, wz, W, H) {
        const vx = W / 2, vy = H * 0.54;
        const s  = FOV / (wz + 0.001);
        return { x: vx + wx * s, y: vy + EYE_H * s };
    }

    function resize() {
        canvas.width  = window.innerWidth;
        canvas.height = window.innerHeight;
    }
    window.addEventListener('resize', resize);
    resize();

    function drawScene() {
        const W = canvas.width, H = canvas.height;
        ctx.clearRect(0, 0, W, H);

        // ── Tron grid ──
        const vx = W / 2, vy = H * 0.54;
        ctx.save();
        ctx.lineWidth = 0.6;

        // Vertical lines (static)
        const VCOLS = 14;
        for (let c = 0; c <= VCOLS; c++) {
            const wx   = -GRID_SPAN + (c / VCOLS) * GRID_SPAN * 2;
            const far  = screenPos(wx, 180, W, H);
            const near = screenPos(wx,   3, W, H);
            const dist = Math.abs(wx / GRID_SPAN);
            const alpha = (1 - dist * 0.65) * 0.055;
            ctx.strokeStyle = `rgba(0,255,65,${alpha})`;
            ctx.beginPath();
            ctx.moveTo(far.x,  Math.max(vy - 2, far.y));
            ctx.lineTo(near.x, Math.min(H * 1.08, near.y));
            ctx.stroke();
        }

        // Horizontal lines (moving toward viewer)
        for (const l of hLines) {
            l.z -= 0.28;
            if (l.z < 2) l.z += 160;

            const lp = screenPos(-GRID_SPAN, l.z, W, H);
            const rp = screenPos( GRID_SPAN, l.z, W, H);
            const sy = lp.y;
            if (sy < vy - 1 || sy > H * 1.05) continue;

            const progress = Math.min(1, (sy - vy) / (H - vy));
            const alpha    = progress * 0.085;
            ctx.strokeStyle = `rgba(0,255,65,${alpha})`;
            ctx.beginPath();
            ctx.moveTo(lp.x, sy);
            ctx.lineTo(rp.x, sy);
            ctx.stroke();
        }

        ctx.restore();

        // ── Stars ──
        const cx = W / 2, cy = H / 2;
        for (const s of stars) {
            s.z -= s.spd;
            if (s.z < 1) Object.assign(s, mkStar(false));

            const sc = FOV / s.z;
            const sx = cx + s.x * sc;
            const sy = cy + s.y * sc;
            if (sx < -5 || sx > W + 5 || sy < -5 || sy > H + 5) continue;

            const alpha = Math.min(0.75, (1600 - s.z) / 900);
            const size  = Math.max(0.3, s.r * sc * 0.75);

            ctx.beginPath();
            ctx.arc(sx, sy, size, 0, Math.PI * 2);
            if (size > 1.6) {
                ctx.shadowColor = 'rgba(0,255,65,0.9)';
                ctx.shadowBlur  = 7;
            }
            ctx.fillStyle = `rgba(0,255,65,${alpha * 0.7})`;
            ctx.fill();
            ctx.shadowBlur = 0;
        }

        requestAnimationFrame(drawScene);
    }
    drawScene();
})();

/* ═══════════════════════════════════════════
   MOUSE PARALLAX ON CARD GRID
   ═══════════════════════════════════════════ */
(function () {
    const grid = document.getElementById('obs-grid');
    let tx = 0, ty = 0, cx = 0, cy = 0;

    document.addEventListener('mousemove', e => {
        tx = (e.clientX / window.innerWidth  - 0.5) *  8;
        ty = (e.clientY / window.innerHeight - 0.5) * -5;
    });

    (function tick() {
        cx += (tx - cx) * 0.04;
        cy += (ty - cy) * 0.04;
        grid.style.transform = `perspective(1500px) rotateY(${cx}deg) rotateX(${cy}deg)`;
        requestAnimationFrame(tick);
    })();
})();

/* ═══════════════════════════════════════════
   DATA, CARDS, AND 3D TILT
   ═══════════════════════════════════════════ */
(function () {
    const INAT_BASE = 'https://api.inaturalist.org/v2/observations';
    const PER_PAGE  = 20;

    let currentTaxon = '';
    let currentPage  = 1;
    let totalResults = 0;
    let loading      = false;
    let obsCache     = {};
    let cardIndex    = 0;

    const grid      = document.getElementById('obs-grid');
    const loadBtn   = document.getElementById('load-more');
    const obsCount  = document.getElementById('obs-count');
    const statusDot = document.getElementById('status-dot');
    const statusTxt = document.getElementById('status-text');
    const bbTotal   = document.getElementById('bb-total');
    const bbUpdated = document.getElementById('bb-updated');

    async function fetchObs(taxon, page) {
        const params = new URLSearchParams({
            per_page: PER_PAGE, page,
            order_by: 'created_at', order: 'desc',
            photos: 'true', quality_grade: 'research,needs_id',
            fields: 'all'
        });
        if (taxon) params.set('iconic_taxa', taxon);
        const res = await fetch(`${INAT_BASE}?${params}`);
        if (!res.ok) throw new Error(res.status);
        return res.json();
    }

    async function probeAntApi() {
        const ctrl = new AbortController();
        const t = setTimeout(() => ctrl.abort(), 5000);
        try {
            const res = await fetch('https://api.antapi.org/', { signal: ctrl.signal });
            clearTimeout(t);
            if (res.ok) {
                const el = document.getElementById('src-ant');
                el.className = 'src-badge online';
                el.textContent = 'AntAPI ●';
            }
        } catch { clearTimeout(t); }
    }

    function relTime(dateStr) {
        if (!dateStr) return '—';
        const diff = Date.now() - new Date(dateStr).getTime();
        const h = Math.floor(diff / 3600000);
        if (h < 1) return '< 1h ago';
        if (h < 24) return h + 'h ago';
        return Math.floor(h / 24) + 'd ago';
    }

    function photoUrl(obs, size = 'small') {
        const p = obs.photos?.[0];
        if (!p?.url) return null;
        return p.url.replace('square', size);
    }

    const TAXON_SHORT = {
        Aves:'AVES', Mammalia:'MAMMALIA', Insecta:'INSECTA', Plantae:'PLANTAE',
        Fungi:'FUNGI', Reptilia:'REPTILIA', Amphibia:'AMPHIBIA', Arachnida:'ARACHNIDA',
        Actinopterygii:'FISH', Mollusca:'MOLLUSCA', Chromista:'CHROMISTA'
    };
    function taxonTag(obs) {
        return TAXON_SHORT[obs.taxon?.iconic_taxon_name] || (obs.taxon?.iconic_taxon_name?.toUpperCase() || 'UNKNOWN');
    }

    function showSkeletons(n) {
        for (let i = 0; i < n; i++) {
            const el = document.createElement('div');
            el.className = 'obs-skeleton';
            el.innerHTML = `<div class="skel-img"></div><div class="skel-body"><div class="skel-line" style="width:80%"></div><div class="skel-line" style="width:55%"></div><div class="skel-line" style="width:70%;margin-top:4px"></div></div>`;
            grid.appendChild(el);
        }
    }
    function clearSkeletons() {
        grid.querySelectorAll('.obs-skeleton').forEach(el => el.remove());
    }

    function add3dTilt(card) {
        card.addEventListener('mouseenter', () => {
            card.style.transition = 'border-color 0.2s, box-shadow 0.2s';
        });
        card.addEventListener('mousemove', e => {
            const r  = card.getBoundingClientRect();
            const nx = (e.clientX - r.left)  / r.width  - 0.5;
            const ny = (e.clientY - r.top)   / r.height - 0.5;
            card.style.transform    = `perspective(700px) rotateX(${-ny * 20}deg) rotateY(${nx * 20}deg) translateZ(50px) scale(1.03)`;
            card.style.boxShadow    = `${-nx * 22}px ${-ny * 22}px 45px rgba(0,0,0,0.85), 0 0 35px rgba(0,255,65,0.22), inset 0 0 20px rgba(0,255,65,0.04)`;
            card.style.borderColor  = 'rgba(0,255,65,0.85)';
        });
        card.addEventListener('mouseleave', () => {
            card.style.transition  = 'transform 0.5s cubic-bezier(0.25,0.46,0.45,0.94), box-shadow 0.5s, border-color 0.25s';
            card.style.transform   = '';
            card.style.boxShadow   = '';
            card.style.borderColor = '';
        });
    }

    function renderCard(obs, idx) {
        const url   = photoUrl(obs, 'small');
        const tag   = taxonTag(obs);
        const grade = obs.quality_grade || 'casual';
        const gradeSymbol = grade === 'research' ? '● RG' : grade === 'needs_id' ? '○ ID?' : '· CAS';
        const sci    = obs.taxon?.name || '—';
        const common = obs.taxon?.preferred_common_name || '';
        const place  = obs.place_guess || '—';
        const user   = obs.user?.login || '—';

        const card = document.createElement('div');
        card.className = 'obs-card fly';
        card.style.animationDelay = `${idx * 0.055}s`;
        card.dataset.uuid = obs.uuid;
        card.innerHTML = `
            <div class="obs-img-wrap">
                ${url ? `<img class="obs-img" src="${url}" loading="lazy" alt="" onerror="this.style.display='none';this.parentElement.querySelector('.obs-no-img').style.display='flex'">` : ''}
                <div class="obs-no-img" style="display:${url ? 'none' : 'flex'};flex-direction:column;gap:4px;">
                    <span style="font-size:22px;color:#003300">◉</span>
                    <span style="font-size:8px;letter-spacing:2px;">NO VISUAL</span>
                </div>
                <span class="obs-taxon-tag">${tag}</span>
                <span class="obs-grade ${grade}">${gradeSymbol}</span>
            </div>
            <div class="obs-body">
                <div class="obs-sci">${sci}</div>
                ${common ? `<div class="obs-common">${common.toUpperCase()}</div>` : ''}
                <div class="obs-div"></div>
                <div class="obs-meta">
                    <span class="obs-place">▸ ${place}</span>
                    <span class="obs-who">${relTime(obs.observed_on)} · @${user}</span>
                </div>
            </div>`;

        add3dTilt(card);
        card.addEventListener('click', () => openDetail(obs.uuid));
        obsCache[obs.uuid] = obs;
        return card;
    }

    async function loadObs(reset = false) {
        if (loading) return;
        loading = true;
        loadBtn.disabled = true;
        statusDot.className = ''; statusTxt.className = '';
        statusTxt.textContent = 'SCANNING';

        if (reset) { grid.innerHTML = ''; currentPage = 1; cardIndex = 0; }

        showSkeletons(PER_PAGE);
        try {
            const data = await fetchObs(currentTaxon, currentPage);
            totalResults = data.total_results || 0;
            clearSkeletons();

            (data.results || []).forEach((obs, i) => {
                grid.appendChild(renderCard(obs, cardIndex++));
            });

            currentPage++;
            const shown = grid.querySelectorAll('.obs-card').length;
            obsCount.textContent = `SHOWING ${shown} OF ${totalResults.toLocaleString()}`;
            bbTotal.textContent  = `${totalResults.toLocaleString()} TOTAL OBSERVATIONS`;
            bbUpdated.textContent = 'UPDATED ' + new Date().toLocaleTimeString();

            statusDot.className = 'live'; statusTxt.className = 'live';
            statusTxt.textContent = 'LIVE';
            loadBtn.disabled    = shown >= totalResults;
            loadBtn.textContent = shown >= totalResults ? 'ALL LOADED' : 'LOAD MORE';
        } catch {
            clearSkeletons();
            statusTxt.textContent = 'ERROR';
            loadBtn.disabled = false;
        }
        loading = false;
    }

    function openDetail(uuid) {
        const obs = obsCache[uuid];
        if (!obs) return;
        const url = photoUrl(obs, 'medium');
        const imgWrap = document.getElementById('dm-img-wrap');
        imgWrap.innerHTML = url
            ? `<img class="dm-img" src="${url}" alt=""><span class="dm-close" onclick="closeDetail()">✕</span>`
            : `<div class="dm-no-img">NO VISUAL DATA</div><span class="dm-close" onclick="closeDetail()">✕</span>`;

        document.getElementById('dm-sci').textContent     = obs.taxon?.name || '—';
        document.getElementById('dm-common').textContent  = (obs.taxon?.preferred_common_name || '').toUpperCase() || '—';
        document.getElementById('dm-taxon').textContent   = obs.taxon?.iconic_taxon_name || '—';
        document.getElementById('dm-quality').textContent = obs.quality_grade || '—';
        document.getElementById('dm-place').textContent   = obs.place_guess || '—';
        document.getElementById('dm-date').textContent    = obs.observed_on || '—';
        document.getElementById('dm-user').textContent    = '@' + (obs.user?.login || '—');
        document.getElementById('dm-rank').textContent    = obs.taxon?.rank || '—';
        document.getElementById('dm-link').href           = obs.uri || '#';

        document.getElementById('detail-overlay').classList.add('show');
    }

    window.closeDetail = function () {
        document.getElementById('detail-overlay').classList.remove('show');
    };
    window.handleOverlayClick = function (e) {
        if (e.target === document.getElementById('detail-overlay')) closeDetail();
    };
    document.addEventListener('keydown', e => { if (e.key === 'Escape') closeDetail(); });

    document.querySelectorAll('.flt-btn').forEach(btn => {
        btn.addEventListener('click', () => {
            document.querySelectorAll('.flt-btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            currentTaxon = btn.dataset.taxon;
            loadObs(true);
        });
    });

    loadBtn.addEventListener('click', () => loadObs(false));

    probeAntApi();
    loadObs(true);
    setInterval(() => { if (currentPage === 2) loadObs(true); }, 120000);
})();
</script>
</body>
</html>
