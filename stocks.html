<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>matrix://stock.feed</title>
    <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #000000;
            --green: #00ff41;
            --green-mid: #00cc44;
            --green-dim: #008800;
            --green-dark: #003300;
            --red: #ff4444;
            --red-dim: #cc2222;
            --border: rgba(0,255,65,0.1);
            --font: 'IBM Plex Mono', 'Courier New', monospace;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body, html { width: 100vw; height: 100vh; background: var(--bg); color: var(--green); font-family: var(--font); overflow: hidden; }

        /* CRT scanline + vignette overlay */
        body::after {
            content: ''; position: fixed; inset: 0; z-index: 9000; pointer-events: none;
            background:
                repeating-linear-gradient(to bottom, transparent 0px, transparent 2px, rgba(0,0,0,0.055) 2px, rgba(0,0,0,0.055) 4px),
                radial-gradient(ellipse at 50% 50%, transparent 48%, rgba(0,0,0,0.45) 100%);
        }

        /* ── Top bar ── */
        #top-bar {
            position: fixed; top: 0; left: 0; right: 0; z-index: 200;
            height: 32px; display: flex; align-items: center; gap: 8px;
            padding: 0 12px; background: rgba(0,0,0,0.96);
            border-bottom: 1px solid var(--border); backdrop-filter: blur(6px);
            font-size: 10px; letter-spacing: 0.4px;
        }
        .back-btn {
            color: #005c18; text-decoration: none; border: 1px solid rgba(0,255,65,0.18);
            padding: 2px 8px; border-radius: 3px; transition: all 0.2s; flex-shrink: 0;
        }
        .back-btn:hover { color: var(--green); border-color: rgba(0,255,65,0.6); background: rgba(0,255,65,0.05); }
        .top-sep { color: #001800; }
        #top-title { color: #004d14; letter-spacing: 0.5px; }
        #status-dot { font-size: 9px; color: #005c18; transition: color 0.5s; }
        #status-dot.live { color: var(--green); animation: blink 2s ease-in-out infinite; }
        @keyframes blink { 0%,100%{opacity:1} 50%{opacity:0.3} }
        #status-text { color: #005c18; font-size: 9px; transition: color 0.5s; }
        #status-text.live { color: var(--green-mid); }

        #mkt-status { font-size: 9px; letter-spacing: 0.5px; padding: 1px 6px; border-radius: 2px; }
        #mkt-status.open   { color: var(--green); border: 1px solid rgba(0,255,65,0.3); }
        #mkt-status.closed { color: #004400; border: 1px solid rgba(0,255,65,0.08); }

        #clock { color: #005c18; font-size: 9px; font-variant-numeric: tabular-nums; }

        #sym-search-wrap { margin-left: auto; display: flex; align-items: center; gap: 6px; }
        #sym-input {
            background: transparent; border: 1px solid rgba(0,255,65,0.18);
            color: var(--green); font-family: var(--font); font-size: 10px;
            padding: 2px 8px; outline: none; border-radius: 3px; width: 120px;
            letter-spacing: 1px; text-transform: uppercase; transition: border-color 0.2s;
        }
        #sym-input::placeholder { color: #003300; text-transform: none; letter-spacing: 0; }
        #sym-input:focus { border-color: var(--green-mid); }
        .sym-btn {
            background: transparent; border: 1px solid rgba(0,255,65,0.18); color: #005c18;
            font-family: var(--font); font-size: 10px; padding: 2px 8px; cursor: pointer;
            border-radius: 3px; transition: all 0.2s;
        }
        .sym-btn:hover { color: var(--green); border-color: var(--green-mid); }
        #refresh-btn {
            background: transparent; border: none; color: #004400; font-family: var(--font);
            font-size: 13px; cursor: pointer; padding: 0 2px; transition: color 0.2s; line-height: 1;
        }
        #refresh-btn:hover { color: var(--green-mid); }
        #refresh-btn.spinning { animation: spin 1s linear infinite; }
        @keyframes spin { to { transform: rotate(360deg); } }

        /* ── Layout ── */
        #main { position: fixed; top: 32px; bottom: 28px; left: 0; right: 0; display: flex; }

        /* ── Watchlist ── */
        #watchlist { width: 210px; flex-shrink: 0; border-right: 1px solid var(--border); display: flex; flex-direction: column; overflow: hidden; }
        .wl-header {
            padding: 7px 12px; border-bottom: 1px solid var(--border);
            font-size: 8px; letter-spacing: 2px; color: #005c18;
            display: flex; justify-content: space-between; align-items: center;
        }
        .wl-count { color: #004400; }
        #wl-list { flex: 1; overflow-y: auto; }
        #wl-list::-webkit-scrollbar { width: 2px; }
        #wl-list::-webkit-scrollbar-thumb { background: rgba(0,255,65,0.12); border-radius: 2px; }

        .wl-item {
            padding: 7px 10px 5px 12px; cursor: pointer;
            border-bottom: 1px solid rgba(0,255,65,0.03);
            transition: background 0.15s;
            display: flex; flex-direction: column; gap: 3px;
            border-left: 2px solid transparent;
        }
        .wl-item:hover { background: rgba(0,255,65,0.035); }
        .wl-item.active { background: rgba(0,255,65,0.055); }
        .wl-item[data-trend="up"]    { border-left-color: rgba(0,255,65,0.25); }
        .wl-item[data-trend="up-hi"] { border-left-color: rgba(0,255,65,0.75); }
        .wl-item[data-trend="dn"]    { border-left-color: rgba(255,68,68,0.3); }
        .wl-item[data-trend="dn-hi"] { border-left-color: rgba(255,68,68,0.75); }

        .wl-row1 { display: flex; align-items: center; gap: 5px; }
        .wl-row2 { display: flex; align-items: center; }
        .wl-sym   { flex: 1; font-size: 11px; font-weight: 600; color: var(--green); }
        .wl-pct   { font-size: 9px; font-weight: 600; }
        .wl-pct.up { color: var(--green); } .wl-pct.dn { color: var(--red); } .wl-pct.nt { color: #004d14; }
        .wl-price { font-size: 10px; color: #007a22; }
        .wl-remove { color: #002800; cursor: pointer; font-size: 9px; transition: color 0.15s; padding: 0 1px; line-height: 1; }
        .wl-remove:hover { color: var(--red); }
        .wl-spark { display: block; width: 100%; height: 22px; opacity: 0.85; }
        .wl-loading { font-size: 9px; color: #004400; animation: loadFlicker 1.2s ease-in-out infinite; }
        @keyframes loadFlicker { 0%,100%{opacity:1} 50%{opacity:0.25} }

        /* ── Detail ── */
        #detail { flex: 1; overflow-y: auto; padding: 20px 24px 20px 26px; display: flex; flex-direction: column; gap: 16px; min-width: 0; }
        #detail::-webkit-scrollbar { width: 2px; }
        #detail::-webkit-scrollbar-thumb { background: rgba(0,255,65,0.1); }
        #detail-placeholder { color: #002800; font-size: 11px; letter-spacing: 1px; padding-top: 80px; }

        /* ── Detail header ── */
        #detail-header { display: none; flex-direction: column; gap: 4px; }
        .dh-meta { display: flex; align-items: center; gap: 10px; }
        .dh-sym  { font-size: 9px; color: #005c18; letter-spacing: 2.5px; }
        .dh-exchange { font-size: 9px; color: #004400; padding: 0 5px; border: 1px solid rgba(0,255,65,0.1); border-radius: 2px; }
        .dh-name { font-size: 17px; font-weight: 600; color: var(--green-mid); line-height: 1.2; margin-top: 2px; }
        .dh-price-row { display: flex; align-items: baseline; gap: 14px; margin-top: 8px; flex-wrap: wrap; }
        .dh-price { font-size: 44px; font-weight: 600; line-height: 1; letter-spacing: -1px; transition: text-shadow 0.4s; }
        .dh-price.up { color: var(--green); text-shadow: 0 0 30px rgba(0,255,65,0.5), 0 0 60px rgba(0,255,65,0.2); }
        .dh-price.dn { color: var(--red);   text-shadow: 0 0 30px rgba(255,68,68,0.4), 0 0 60px rgba(255,68,68,0.15); }
        @keyframes priceFlash { 0%{opacity:0.2} 60%{opacity:1} 100%{opacity:1} }
        .dh-price.flash { animation: priceFlash 0.5s ease; }
        .dh-change-col { display: flex; flex-direction: column; gap: 2px; justify-content: flex-end; padding-bottom: 6px; }
        .dh-change { font-size: 13px; font-weight: 600; }
        .dh-change.up { color: var(--green-mid); } .dh-change.dn { color: var(--red-dim); }
        .dh-currency { font-size: 9px; color: #005c18; letter-spacing: 1px; }
        .dh-updated  { font-size: 9px; color: #003300; }

        /* ── Chart ── */
        #chart-wrap { display: none; border: 1px solid var(--border); border-radius: 4px; overflow: hidden; position: relative; background: rgba(0,3,0,0.6); cursor: crosshair; }
        #chart-canvas { display: block; width: 100%; height: 170px; }
        #chart-label  { position: absolute; top: 7px; left: 10px; font-size: 8px; color: #004400; letter-spacing: 1.5px; pointer-events: none; }
        #chart-hover  {
            position: absolute; top: 7px; right: 10px; font-size: 10px; color: var(--green-mid);
            pointer-events: none; opacity: 0; transition: opacity 0.1s;
        }

        /* ── 52-week range bar ── */
        #range-bar-wrap { display: none; }
        .rb-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 6px; font-size: 9px; }
        .rb-lo, .rb-hi { color: #005c18; }
        .rb-title { color: #004400; letter-spacing: 1.5px; }
        .rb-track { height: 3px; background: rgba(0,255,65,0.07); border-radius: 2px; position: relative; margin: 0 4px; }
        .rb-fill  { position: absolute; left: 0; top: 0; bottom: 0; background: rgba(0,255,65,0.12); border-radius: 2px; }
        .rb-dot   { position: absolute; top: 50%; width: 9px; height: 9px; border-radius: 50%; background: var(--green); transform: translate(-50%, -50%); box-shadow: 0 0 8px rgba(0,255,65,0.9); }
        .rb-dot.dn { background: var(--red); box-shadow: 0 0 8px rgba(255,68,68,0.8); }
        .rb-pct-label { font-size: 9px; color: #005c18; text-align: center; margin-top: 8px; }

        /* ── Stats grid ── */
        #stats-grid { display: none; grid-template-columns: repeat(3, 1fr); gap: 1px; background: rgba(0,255,65,0.05); border: 1px solid var(--border); border-radius: 4px; overflow: hidden; }
        .stat-cell { padding: 10px 14px; background: #000200; }
        .stat-label { font-size: 8px; color: #004400; letter-spacing: 1.5px; margin-bottom: 6px; }
        .stat-value { font-size: 13px; color: var(--green-mid); font-variant-numeric: tabular-nums; }
        .stat-value.dim { color: #006620; }

        /* ── Ticker ── */
        #ticker-bar {
            position: fixed; bottom: 0; left: 0; right: 0; z-index: 200;
            height: 28px; display: flex; align-items: center;
            background: rgba(0,1,0,0.97); border-top: 1px solid var(--border); overflow: hidden;
        }
        .ticker-label {
            flex-shrink: 0; padding: 0 10px; border-right: 1px solid var(--border);
            height: 100%; display: flex; align-items: center; gap: 5px;
            background: rgba(0,255,65,0.015);
        }
        .ticker-icon { color: var(--green); font-size: 10px; text-shadow: 0 0 8px rgba(0,255,65,0.8); animation: blink 2s ease-in-out infinite; }
        .ticker-tag  { color: var(--green-mid); font-size: 8px; letter-spacing: 2px; font-weight: 600; }
        .ticker-viewport { flex: 1; overflow: hidden; position: relative; height: 100%; }
        .ticker-track { display: flex; align-items: center; white-space: nowrap; position: absolute; top: 0; bottom: 0; left: 0; }
        .ti-item  { display: inline-flex; align-items: center; gap: 5px; padding: 0 14px; }
        .ti-sym   { font-size: 9px; color: #005c18; font-weight: 600; letter-spacing: 1px; }
        .ti-price { font-size: 10px; }
        .ti-price.up { color: var(--green); } .ti-price.dn { color: var(--red); } .ti-price.nt { color: #004400; }
        .ti-pct   { font-size: 9px; }
        .ti-pct.up { color: #007a22; } .ti-pct.dn { color: #882222; } .ti-pct.nt { color: #003300; }
        .ti-sep   { color: rgba(0,255,65,0.08); padding: 0 2px; font-size: 16px; }
    </style>
</head>
<body>

    <div id="top-bar">
        <a class="back-btn" href="index.html">← back</a>
        <span class="top-sep">|</span>
        <span id="top-title">matrix://stock.feed</span>
        <span class="top-sep">|</span>
        <span id="status-dot">●</span>
        <span id="status-text">CONNECTING</span>
        <span class="top-sep">|</span>
        <span id="mkt-status" class="closed">○ MKT CLOSED</span>
        <span class="top-sep">|</span>
        <span id="clock">--:--:-- EST</span>
        <div id="sym-search-wrap">
            <button id="refresh-btn" title="refresh">↻</button>
            <input type="text" id="sym-input" placeholder="add symbol…" maxlength="12" autocomplete="off" spellcheck="false">
            <button class="sym-btn" id="sym-add-btn">+ ADD</button>
        </div>
    </div>

    <div id="main">
        <div id="watchlist">
            <div class="wl-header">
                <span>WATCHLIST</span>
                <span class="wl-count" id="wl-count">0</span>
            </div>
            <div id="wl-list"></div>
        </div>

        <div id="detail">
            <div id="detail-placeholder">// select a symbol to view details</div>

            <div id="detail-header">
                <div class="dh-meta">
                    <span class="dh-sym" id="dh-sym"></span>
                    <span class="dh-exchange" id="dh-exchange"></span>
                </div>
                <div class="dh-name" id="dh-name"></div>
                <div class="dh-price-row">
                    <span class="dh-price" id="dh-price">—</span>
                    <div class="dh-change-col">
                        <span class="dh-change" id="dh-change"></span>
                        <span class="dh-currency" id="dh-currency">USD</span>
                        <span class="dh-updated" id="dh-updated"></span>
                    </div>
                </div>
            </div>

            <div id="chart-wrap">
                <canvas id="chart-canvas"></canvas>
                <span id="chart-label">30D PRICE HISTORY</span>
                <span id="chart-hover"></span>
            </div>

            <div id="range-bar-wrap">
                <div class="rb-header">
                    <span class="rb-lo" id="rb-lo">—</span>
                    <span class="rb-title">52W RANGE</span>
                    <span class="rb-hi" id="rb-hi">—</span>
                </div>
                <div class="rb-track">
                    <div class="rb-fill" id="rb-fill"></div>
                    <div class="rb-dot"  id="rb-dot"></div>
                </div>
                <div class="rb-pct-label" id="rb-pct"></div>
            </div>

            <div id="stats-grid">
                <div class="stat-cell"><div class="stat-label">VOLUME</div><div class="stat-value" id="s-vol">—</div></div>
                <div class="stat-cell"><div class="stat-label">MKT CAP</div><div class="stat-value" id="s-cap">—</div></div>
                <div class="stat-cell"><div class="stat-label">DAY HIGH</div><div class="stat-value" id="s-hi">—</div></div>
                <div class="stat-cell"><div class="stat-label">DAY LOW</div><div class="stat-value" id="s-lo">—</div></div>
                <div class="stat-cell"><div class="stat-label">PREV CLOSE</div><div class="stat-value" id="s-pc">—</div></div>
                <div class="stat-cell"><div class="stat-label">OPEN</div><div class="stat-value" id="s-op">—</div></div>
            </div>
        </div>
    </div>

    <div id="ticker-bar">
        <div class="ticker-label">
            <span class="ticker-icon">▶</span>
            <span class="ticker-tag">FEED</span>
        </div>
        <div class="ticker-viewport">
            <div class="ticker-track" id="ticker-track"></div>
        </div>
    </div>

    <script>
    (function () {
        const YF_BASE = 'https://query1.finance.yahoo.com/v8/finance/chart/';
        const DEFAULT_WL = ['AAPL','MSFT','GOOGL','AMZN','META','TSLA','NVDA','BTC-USD','ETH-USD'];
        const REFRESH_MS = 90000;

        // Multiple CORS proxies tried in order — first success wins
        const PROXIES = [
            u => `https://api.allorigins.win/raw?url=${encodeURIComponent(u)}`,
            u => `https://corsproxy.io/?${encodeURIComponent(u)}`,
            u => `https://thingproxy.freeboard.io/fetch/${u}`,
        ];
        async function proxyFetch(targetUrl) {
            for (const make of PROXIES) {
                try {
                    const ctrl = new AbortController();
                    const t = setTimeout(() => ctrl.abort(), 7000);
                    const res = await fetch(make(targetUrl), { cache: 'no-store', signal: ctrl.signal });
                    clearTimeout(t);
                    if (res.ok) return res.json();
                } catch {}
            }
            throw new Error('all proxies failed');
        }

        let watchlist    = JSON.parse(localStorage.getItem('stock_watchlist') || 'null') || DEFAULT_WL.slice();
        let quoteCache   = {};
        let activeSymbol = null;
        let tickerRaf    = null;
        let tickerPos    = 0;
        let chartData    = null; // { prices, isUp, pts, PL, PT, cW, cH, dpr }

        // DOM
        const wlList         = document.getElementById('wl-list');
        const wlCount        = document.getElementById('wl-count');
        const statusDot      = document.getElementById('status-dot');
        const statusText     = document.getElementById('status-text');
        const symInput       = document.getElementById('sym-input');
        const symAddBtn      = document.getElementById('sym-add-btn');
        const refreshBtn     = document.getElementById('refresh-btn');
        const tickerTrack    = document.getElementById('ticker-track');
        const detailPh       = document.getElementById('detail-placeholder');
        const detailHeader   = document.getElementById('detail-header');
        const chartWrap      = document.getElementById('chart-wrap');
        const chartCanvas    = document.getElementById('chart-canvas');
        const chartHoverEl   = document.getElementById('chart-hover');
        const statsGrid      = document.getElementById('stats-grid');
        const rangeWrap      = document.getElementById('range-bar-wrap');

        // ── Clock + market status ──
        const clockEl    = document.getElementById('clock');
        const mktStatus  = document.getElementById('mkt-status');

        function updateClock() {
            const now = new Date();
            const est = new Date(now.toLocaleString('en-US', { timeZone: 'America/New_York' }));
            const hh  = est.getHours(), mm = est.getMinutes(), ss = est.getSeconds();
            clockEl.textContent = [hh, mm, ss].map(n => String(n).padStart(2, '0')).join(':') + ' EST';
            const day = est.getDay();
            const open = day > 0 && day < 6 && (hh > 9 || (hh === 9 && mm >= 30)) && hh < 16;
            mktStatus.textContent = open ? '● MKT OPEN' : '○ MKT CLOSED';
            mktStatus.className   = open ? 'open' : 'closed';
        }
        setInterval(updateClock, 1000);
        updateClock();

        // ── Format helpers ──
        function fmtPrice(n) {
            if (n == null) return '—';
            return n >= 1000
                ? n.toLocaleString('en-US', { minimumFractionDigits: 2, maximumFractionDigits: 2 })
                : n.toFixed(2);
        }
        function fmtLarge(n) {
            if (!n) return '—';
            if (n >= 1e12) return (n / 1e12).toFixed(2) + 'T';
            if (n >= 1e9)  return (n / 1e9).toFixed(2)  + 'B';
            if (n >= 1e6)  return (n / 1e6).toFixed(2)  + 'M';
            return n.toLocaleString();
        }
        function fmtPct(n) {
            if (n == null) return '—';
            return (n >= 0 ? '+' : '') + n.toFixed(2) + '%';
        }

        // ── Fetch ──
        async function fetchQuote(sym) {
            const url = `${YF_BASE}${encodeURIComponent(sym)}?interval=1d&range=1mo`;
            const json = await proxyFetch(url);
            const r = json.chart?.result?.[0];
            if (!r) throw new Error('no data');
            const m = r.meta || {};
            const q = r.indicators?.quote?.[0] || {};
            const closes = (q.close || []).filter(p => p != null);
            const price  = m.regularMarketPrice ?? m.previousClose ?? 0;
            const prev   = m.previousClose ?? price;
            return {
                symbol: m.symbol || sym, name: m.longName || m.shortName || sym,
                exchange: m.fullExchangeName || m.exchangeName || '',
                price, prevClose: prev,
                pctChange: prev ? ((price - prev) / prev) * 100 : 0,
                change: price - prev,
                dayHigh: m.regularMarketDayHigh, dayLow: m.regularMarketDayLow,
                open: m.regularMarketOpen,
                volume: m.regularMarketVolume, marketCap: m.marketCap,
                high52w: m.fiftyTwoWeekHigh, low52w: m.fiftyTwoWeekLow,
                currency: m.currency || 'USD', prices: closes,
                fetchedAt: Date.now()
            };
        }

        // ── Refresh all ──
        async function refreshAll() {
            statusDot.className = ''; statusText.className = '';
            statusText.textContent = 'SYNCING';
            refreshBtn.classList.add('spinning');
            let ok = 0;
            for (const sym of [...watchlist]) {
                try {
                    quoteCache[sym] = await fetchQuote(sym);
                    ok++;
                } catch {}
                fillWlItem(wlList.querySelector(`[data-sym="${sym}"]`), sym);
            }
            statusDot.className  = ok ? 'live' : '';
            statusText.className = ok ? 'live' : '';
            statusText.textContent = ok ? 'LIVE' : 'ERROR';
            refreshBtn.classList.remove('spinning');
            buildTicker();
            if (activeSymbol && quoteCache[activeSymbol]) renderDetail(activeSymbol, false);
        }

        // ── Watchlist ──
        function renderWatchlist() {
            wlList.innerHTML = '';
            watchlist.forEach(sym => wlList.appendChild(makeWlEl(sym)));
            wlCount.textContent = watchlist.length;
        }

        function makeWlEl(sym) {
            const el = document.createElement('div');
            el.className = 'wl-item'; el.dataset.sym = sym;
            fillWlItem(el, sym);
            return el;
        }

        function fillWlItem(el, sym) {
            if (!el) return;
            const d   = quoteCache[sym];
            const pct = d?.pctChange;
            const cls = pct == null ? 'nt' : pct >= 0 ? 'up' : 'dn';
            const trend = pct == null ? '' : (Math.abs(pct) > 2 ? (pct > 0 ? 'up-hi' : 'dn-hi') : (pct >= 0 ? 'up' : 'dn'));
            el.dataset.trend = trend;
            el.classList.toggle('active', sym === activeSymbol);
            el.innerHTML = d ? `
                <div class="wl-row1">
                    <span class="wl-sym">${sym}</span>
                    <span class="wl-pct ${cls}">${fmtPct(pct)}</span>
                    <span class="wl-remove" title="remove">✕</span>
                </div>
                <div class="wl-row2">
                    <span class="wl-price">$${fmtPrice(d.price)}</span>
                </div>
                <canvas class="wl-spark"></canvas>
            ` : `
                <div class="wl-row1">
                    <span class="wl-sym">${sym}</span>
                    <span class="wl-remove" title="remove">✕</span>
                </div>
                <span class="wl-loading">loading…</span>
            `;
            if (d?.prices?.length > 1) {
                const spark = el.querySelector('.wl-spark');
                // defer until after browser reflow so clientWidth is available
                if (spark) requestAnimationFrame(() => drawSparkline(spark, d.prices, pct >= 0));
            }
        }

        wlList.addEventListener('click', e => {
            const item = e.target.closest('.wl-item');
            if (!item) return;
            const sym = item.dataset.sym;
            if (e.target.classList.contains('wl-remove')) { removeSymbol(sym); return; }
            selectSymbol(sym);
        });

        // ── Sparkline ──
        function drawSparkline(canvas, prices, isUp) {
            const W = canvas.getBoundingClientRect().width || canvas.closest('.wl-item')?.clientWidth || 186;
            const H = 22;
            canvas.width  = W * 2; canvas.height = H * 2;
            canvas.style.width = '100%'; canvas.style.height = H + 'px';
            const ctx = canvas.getContext('2d');
            ctx.scale(2, 2);
            const min = Math.min(...prices), max = Math.max(...prices);
            const range = max - min || 0.01;
            const pts = prices.map((p, i) => ({
                x: (i / (prices.length - 1)) * W,
                y: 2 + (1 - (p - min) / range) * (H - 4)
            }));
            // area
            ctx.beginPath();
            pts.forEach((p, i) => i === 0 ? ctx.moveTo(p.x, p.y) : ctx.lineTo(p.x, p.y));
            ctx.lineTo(pts[pts.length - 1].x, H); ctx.lineTo(0, H); ctx.closePath();
            const g = ctx.createLinearGradient(0, 0, 0, H);
            g.addColorStop(0, isUp ? 'rgba(0,255,65,0.2)' : 'rgba(255,68,68,0.2)');
            g.addColorStop(1, 'rgba(0,0,0,0)');
            ctx.fillStyle = g; ctx.fill();
            // line
            ctx.beginPath();
            pts.forEach((p, i) => i === 0 ? ctx.moveTo(p.x, p.y) : ctx.lineTo(p.x, p.y));
            ctx.strokeStyle = isUp ? 'rgba(0,255,65,0.75)' : 'rgba(255,68,68,0.75)';
            ctx.lineWidth = 1; ctx.stroke();
        }

        // ── Select ──
        function selectSymbol(sym) {
            activeSymbol = sym;
            wlList.querySelectorAll('.wl-item').forEach(el =>
                el.classList.toggle('active', el.dataset.sym === sym));
            renderDetail(sym, true);
            if (!quoteCache[sym]) {
                fetchQuote(sym).then(d => {
                    quoteCache[sym] = d;
                    fillWlItem(wlList.querySelector(`[data-sym="${sym}"]`), sym);
                    renderDetail(sym, true);
                    buildTicker();
                }).catch(() => {});
            }
        }

        // ── Detail ──
        function renderDetail(sym, flash) {
            const d = quoteCache[sym];
            detailPh.style.display = 'none';
            detailHeader.style.display = 'flex';
            chartWrap.style.display    = 'block';
            statsGrid.style.display    = 'grid';
            rangeWrap.style.display    = 'block';

            document.getElementById('dh-sym').textContent      = sym;
            document.getElementById('dh-exchange').textContent = d?.exchange || '';
            document.getElementById('dh-name').textContent     = d ? (d.name || sym) : '…';

            if (!d) { document.getElementById('dh-price').textContent = '—'; return; }

            const up = d.pctChange >= 0;
            const priceEl = document.getElementById('dh-price');
            priceEl.textContent = '$' + fmtPrice(d.price);
            priceEl.className   = 'dh-price ' + (up ? 'up' : 'dn');
            if (flash) {
                priceEl.classList.remove('flash');
                requestAnimationFrame(() => priceEl.classList.add('flash'));
            }

            const changeEl = document.getElementById('dh-change');
            changeEl.textContent = `${up ? '▲' : '▼'} ${d.change >= 0 ? '+' : ''}${fmtPrice(d.change)} (${fmtPct(d.pctChange)})`;
            changeEl.className   = 'dh-change ' + (up ? 'up' : 'dn');

            document.getElementById('dh-currency').textContent = d.currency;
            const t = new Date(d.fetchedAt);
            document.getElementById('dh-updated').textContent  = 'updated ' + t.toLocaleTimeString();

            document.getElementById('s-vol').textContent = fmtLarge(d.volume);
            document.getElementById('s-cap').textContent = fmtLarge(d.marketCap);
            document.getElementById('s-hi').textContent  = '$' + fmtPrice(d.dayHigh);
            document.getElementById('s-lo').textContent  = '$' + fmtPrice(d.dayLow);
            document.getElementById('s-pc').textContent  = '$' + fmtPrice(d.prevClose);
            document.getElementById('s-op').textContent  = '$' + fmtPrice(d.open);

            // 52-week range bar
            if (d.low52w && d.high52w) {
                const range52 = d.high52w - d.low52w;
                const pos = range52 ? ((d.price - d.low52w) / range52) * 100 : 50;
                const pct  = Math.max(0, Math.min(100, pos));
                document.getElementById('rb-lo').textContent  = '$' + fmtPrice(d.low52w);
                document.getElementById('rb-hi').textContent  = '$' + fmtPrice(d.high52w);
                document.getElementById('rb-fill').style.width = pct + '%';
                const dot = document.getElementById('rb-dot');
                dot.style.left = pct + '%'; dot.className = 'rb-dot ' + (up ? 'up' : 'dn');
                document.getElementById('rb-pct').textContent = pct.toFixed(1) + '% from 52W low';
                rangeWrap.style.display = 'block';
            } else {
                rangeWrap.style.display = 'none';
            }

            if (d.prices.length > 1) drawChart(d.prices, up, -1);
        }

        // ── Main chart ──
        function drawChart(prices, isUp, hoverIdx) {
            const dpr = window.devicePixelRatio || 1;
            const W   = chartCanvas.parentElement.clientWidth;
            const H   = 170;
            chartCanvas.width  = W * dpr; chartCanvas.height = H * dpr;
            chartCanvas.style.width = W + 'px'; chartCanvas.style.height = H + 'px';

            const ctx = chartCanvas.getContext('2d');
            ctx.scale(dpr, dpr);

            const PL = 5, PR = 5, PT = 22, PB = 14;
            const cW = W - PL - PR, cH = H - PT - PB;
            const min = Math.min(...prices), max = Math.max(...prices);
            const range = max - min || 0.01;

            const pts = prices.map((p, i) => ({
                x: PL + (i / (prices.length - 1)) * cW,
                y: PT + (1 - (p - min) / range) * cH
            }));

            chartData = { prices, isUp, pts, PL, PR, PT, PB, cW, cH, W, H };

            ctx.clearRect(0, 0, W, H);

            // Subtle grid
            ctx.strokeStyle = 'rgba(0,255,65,0.04)'; ctx.lineWidth = 1;
            for (let i = 0; i <= 5; i++) {
                const y = PT + (i / 5) * cH;
                ctx.beginPath(); ctx.moveTo(PL, y); ctx.lineTo(W - PR, y); ctx.stroke();
                // price label on grid
                const p = max - (i / 5) * range;
                ctx.fillStyle = 'rgba(0,80,20,0.5)'; ctx.font = `${8}px IBM Plex Mono, monospace`;
                ctx.textAlign = 'right';
                ctx.fillText('$' + fmtPrice(p), W - PR - 2, y - 2);
            }

            const color = isUp ? '#00ff41' : '#ff4444';
            const colorDim = isUp ? 'rgba(0,255,65,0.15)' : 'rgba(255,68,68,0.15)';

            // Area fill
            ctx.beginPath();
            pts.forEach((p, i) => i === 0 ? ctx.moveTo(p.x, p.y) : ctx.lineTo(p.x, p.y));
            ctx.lineTo(pts[pts.length - 1].x, PT + cH);
            ctx.lineTo(pts[0].x, PT + cH); ctx.closePath();
            const grad = ctx.createLinearGradient(0, PT, 0, PT + cH);
            grad.addColorStop(0, isUp ? 'rgba(0,255,65,0.18)' : 'rgba(255,68,68,0.18)');
            grad.addColorStop(0.7, 'rgba(0,0,0,0)');
            ctx.fillStyle = grad; ctx.fill();

            // Line with glow
            ctx.shadowColor   = color;
            ctx.shadowBlur    = 6;
            ctx.beginPath();
            pts.forEach((p, i) => i === 0 ? ctx.moveTo(p.x, p.y) : ctx.lineTo(p.x, p.y));
            ctx.strokeStyle = color; ctx.lineWidth = 1.5; ctx.stroke();
            ctx.shadowBlur = 0;

            // Current price end dot
            const last = pts[pts.length - 1];
            ctx.beginPath(); ctx.arc(last.x, last.y, 3.5, 0, Math.PI * 2);
            ctx.fillStyle = color; ctx.shadowColor = color; ctx.shadowBlur = 10; ctx.fill();
            ctx.shadowBlur = 0;

            // Hover crosshair
            if (hoverIdx >= 0 && hoverIdx < pts.length) {
                const hp = pts[hoverIdx];
                ctx.setLineDash([3, 4]);
                ctx.strokeStyle = 'rgba(0,255,65,0.22)'; ctx.lineWidth = 1;
                ctx.beginPath(); ctx.moveTo(hp.x, PT); ctx.lineTo(hp.x, PT + cH); ctx.stroke();
                ctx.beginPath(); ctx.moveTo(PL, hp.y); ctx.lineTo(W - PR, hp.y); ctx.stroke();
                ctx.setLineDash([]);
                ctx.beginPath(); ctx.arc(hp.x, hp.y, 4, 0, Math.PI * 2);
                ctx.fillStyle = color; ctx.shadowColor = color; ctx.shadowBlur = 8; ctx.fill();
                ctx.shadowBlur = 0;
            }
        }

        // Chart hover events
        chartCanvas.addEventListener('mousemove', e => {
            if (!chartData) return;
            const rect = chartCanvas.getBoundingClientRect();
            const xPct = (e.clientX - rect.left) / rect.width;
            const idx = Math.round(xPct * (chartData.prices.length - 1));
            if (idx >= 0 && idx < chartData.prices.length) {
                drawChart(chartData.prices, chartData.isUp, idx);
                const p = chartData.prices[idx];
                chartHoverEl.textContent = `$${fmtPrice(p)}`;
                chartHoverEl.style.opacity = '1';
            }
        });
        chartCanvas.addEventListener('mouseleave', () => {
            if (!chartData) return;
            drawChart(chartData.prices, chartData.isUp, -1);
            chartHoverEl.style.opacity = '0';
        });

        // ── Ticker ──
        function buildTicker() {
            if (tickerRaf) { cancelAnimationFrame(tickerRaf); tickerRaf = null; }
            if (!watchlist.length) return;
            const html = watchlist.map(sym => {
                const d = quoteCache[sym];
                if (!d) return `<span class="ti-item"><span class="ti-sym">${sym}</span><span class="ti-price nt">—</span></span><span class="ti-sep">|</span>`;
                const cls = d.pctChange >= 0 ? 'up' : 'dn';
                const arr = d.pctChange >= 0 ? '▲' : '▼';
                return `<span class="ti-item"><span class="ti-sym">${sym}</span><span class="ti-price ${cls}">${arr} $${fmtPrice(d.price)}</span><span class="ti-pct ${cls}">${fmtPct(d.pctChange)}</span></span><span class="ti-sep">|</span>`;
            }).join('');
            tickerTrack.innerHTML = html + html;
            tickerPos = 0;
            animateTicker();
        }
        function animateTicker() {
            const half = tickerTrack.scrollWidth / 2;
            tickerPos += 0.45;
            if (tickerPos >= half) tickerPos = 0;
            tickerTrack.style.transform = `translateX(${-tickerPos}px)`;
            tickerRaf = requestAnimationFrame(animateTicker);
        }

        // ── Add / remove ──
        function addSymbol(raw) {
            const sym = raw.trim().toUpperCase().replace(/[^A-Z0-9.\-]/g, '');
            if (!sym || watchlist.includes(sym)) return;
            watchlist.push(sym);
            saveWatchlist();
            wlList.appendChild(makeWlEl(sym));
            wlCount.textContent = watchlist.length;
            selectSymbol(sym);
        }
        function removeSymbol(sym) {
            watchlist = watchlist.filter(s => s !== sym);
            delete quoteCache[sym];
            saveWatchlist();
            renderWatchlist();
            buildTicker();
            if (activeSymbol === sym) {
                activeSymbol = watchlist[0] || null;
                if (activeSymbol) selectSymbol(activeSymbol);
                else {
                    detailPh.style.display = '';
                    detailHeader.style.display = chartWrap.style.display =
                    statsGrid.style.display = rangeWrap.style.display = 'none';
                }
            }
        }
        function saveWatchlist() { localStorage.setItem('stock_watchlist', JSON.stringify(watchlist)); }

        // ── Input handlers ──
        symInput.addEventListener('input', () => { symInput.value = symInput.value.toUpperCase(); });
        symInput.addEventListener('keydown', e => { if (e.key === 'Enter') { addSymbol(symInput.value); symInput.value = ''; } });
        symAddBtn.addEventListener('click', () => { addSymbol(symInput.value); symInput.value = ''; symInput.focus(); });
        refreshBtn.addEventListener('click', refreshAll);

        window.addEventListener('resize', () => {
            if (activeSymbol && chartData) drawChart(chartData.prices, chartData.isUp, -1);
            wlList.querySelectorAll('.wl-spark').forEach(c => {
                const sym = c.closest('.wl-item')?.dataset.sym;
                const d = quoteCache[sym];
                if (d?.prices?.length > 1) drawSparkline(c, d.prices, d.pctChange >= 0);
            });
        });

        // ── Init ──
        renderWatchlist();
        let refreshing = false;
        async function guardedRefresh() {
            if (refreshing) return;
            refreshing = true;
            try { await refreshAll(); } finally { refreshing = false; }
        }
        guardedRefresh().then(() => { if (watchlist.length) selectSymbol(watchlist[0]); });
        setInterval(guardedRefresh, REFRESH_MS);
    })();
    </script>
</body>
