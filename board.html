<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>matrix://bulletin.board</title>
    <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #000000;
            --card-bg: rgba(0,5,0,0.93);
            --green: #00ff41;
            --green-mid: #00cc44;
            --green-dim: #008800;
            --green-dark: #003300;
            --border: #00ff41;
            --border-dim: #003300;
            --font: 'IBM Plex Mono', 'Courier New', monospace;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body, html {
            width: 100vw; height: 100vh;
            background: var(--bg); color: var(--green);
            font-family: var(--font);
            overflow: hidden; cursor: crosshair;
        }

        #canvas-board {
            width: 100vw; height: 100vh;
            position: relative; background: var(--bg);
            transform-origin: center center;
            padding-top: 32px;
        }

        /* ── Top bar ── */
        #top-bar {
            position: fixed; top: 0; left: 0; right: 0; z-index: 900;
            height: 32px; display: flex; align-items: center; gap: 10px;
            padding: 0 12px;
            background: rgba(0,0,0,0.92);
            border-bottom: 1px solid rgba(0,255,65,0.12);
            backdrop-filter: blur(4px);
            font-size: 10px; letter-spacing: 0.5px;
        }
        .back-btn {
            color: #005c18; text-decoration: none;
            border: 1px solid rgba(0,255,65,0.2);
            padding: 2px 8px; border-radius: 3px;
            transition: all 0.2s; flex-shrink: 0;
        }
        .back-btn:hover { color: var(--green); border-color: rgba(0,255,65,0.6); background: rgba(0,255,65,0.05); box-shadow: 0 0 8px rgba(0,255,65,0.25); }
        .top-sep { color: #002200; }

        #status-dot { font-size: 9px; color: #005c18; transition: color 0.5s; }
        #status-dot.live { color: var(--green); animation: blink 2s ease-in-out infinite; }
        @keyframes blink { 0%,100%{opacity:1} 50%{opacity:0.35} }
        #status-text { color: #005c18; transition: color 0.5s; }
        #status-text.live { color: var(--green-mid); }

        #user-badge {
            color: var(--green-mid); background: rgba(0,255,65,0.06);
            border: 1px solid rgba(0,255,65,0.2); border-radius: 3px;
            padding: 1px 7px; cursor: pointer; transition: all 0.2s;
        }
        #user-badge:hover { border-color: rgba(0,255,65,0.5); color: var(--green); }
        #user-badge.unset { color: #005c18; border-color: rgba(0,255,65,0.1); border-style: dashed; }

        #pin-count { color: var(--green-dim); }
        #help-bar { margin-left: auto; display: flex; gap: 14px; color: #003300; }

        /* ── Username prompt overlay ── */
        #user-prompt {
            position: fixed; inset: 0; z-index: 800;
            background: rgba(0,0,0,0.85); backdrop-filter: blur(6px);
            display: flex; align-items: center; justify-content: center;
        }
        #user-prompt.hidden { display: none; }
        .user-prompt-box {
            background: #050505; border: 1px solid rgba(0,255,65,0.35);
            border-radius: 10px; padding: 28px 24px; width: 320px;
            display: flex; flex-direction: column; gap: 14px;
            box-shadow: 0 24px 60px rgba(0,0,0,0.9), 0 0 30px rgba(0,255,65,0.07);
        }
        .up-title { color: var(--green); font-size: 13px; font-weight: 600; }
        .up-sub   { color: #005c18; font-size: 11px; }
        .up-input {
            background: transparent; border: 1px solid rgba(0,255,65,0.25);
            color: var(--green); font-family: var(--font); font-size: 13px;
            padding: 8px 10px; outline: none; border-radius: 4px;
            transition: border-color 0.2s;
        }
        .up-input:focus { border-color: var(--green-mid); }
        .up-input::placeholder { color: #004400; }
        .up-btn {
            background: rgba(0,255,65,0.06); border: 1px solid rgba(0,255,65,0.35);
            color: var(--green); font-family: var(--font); font-size: 12px;
            padding: 8px; cursor: pointer; border-radius: 4px;
            transition: all 0.2s;
        }
        .up-btn:hover { background: rgba(0,255,65,0.12); border-color: var(--green); }

        /* ── Node cards ── */
        .node-card {
            position: absolute;
            background: var(--card-bg);
            border: 1px solid var(--border);
            padding: 10px 12px;
            min-width: 170px; max-width: 300px;
            backdrop-filter: blur(4px);
            transform: translate(-50%, -50%);
            transition: border-color 0.2s, box-shadow 0.2s;
            box-shadow: 0 0 16px 1px rgba(0,255,65,0.25), inset 0 0 8px rgba(0,255,65,0.07);
            cursor: move;
            animation: nodeIn 0.22s cubic-bezier(0.34,1.56,0.64,1);
        }
        @keyframes nodeIn {
            from { transform: translate(-50%,-50%) scale(0.65); opacity:0; }
            to   { transform: translate(-50%,-50%) scale(1);    opacity:1; }
        }
        .node-card:hover {
            border-color: #fff;
            box-shadow: 0 0 26px 3px rgba(0,255,65,0.6), inset 0 0 12px rgba(0,255,65,0.2);
            z-index: 100 !important;
        }
        .node-card.urgent-pin { animation: urgentFlicker 2.5s ease-in-out infinite; }
        @keyframes urgentFlicker {
            0%,100% { border-color: var(--border); }
            50%     { border-color: #ff8800; box-shadow: 0 0 16px 1px rgba(255,136,0,0.4); }
        }

        .node-header {
            display: flex; align-items: center; gap: 5px;
            font-size: 0.68rem; color: var(--green-dim);
            margin-bottom: 6px;
            border-bottom: 1px dashed var(--border-dim);
            padding-bottom: 4px;
        }
        .node-author {
            font-weight: 600; font-size: 0.65rem; flex-shrink: 0;
            color: var(--green-mid); letter-spacing: 0.3px;
        }
        .node-author.mine { color: var(--green); }
        .node-id   { color: #004400; flex-shrink: 0; font-size: 0.62rem; }
        .node-timer {
            flex: 1; text-align: right;
            cursor: pointer; border-radius: 2px; padding: 0 3px;
            transition: color 0.3s, background 0.2s; user-select: none;
            font-size: 0.65rem;
        }
        .node-timer:hover { background: rgba(0,255,65,0.08); }
        .node-timer.t-ok     { color: #005c18; }
        .node-timer.t-warn   { color: #ccaa00; }
        .node-timer.t-urgent { color: #ff8800; font-weight: 600; }
        .node-timer.t-maxed  { color: #004400; cursor: default; }
        .delete-btn { color: #004400; cursor: pointer; transition: color 0.15s; flex-shrink: 0; font-size: 0.85rem; }
        .delete-btn:hover { color: #ff4444; }

        .node-body {
            font-size: 0.85rem; word-break: break-word;
            white-space: pre-wrap; line-height: 1.45; color: var(--green);
        }
        .node-image {
            width: 100%; height: auto; max-height: 200px; object-fit: contain;
            margin-bottom: 8px; border: 1px solid var(--border-dim);
            filter: grayscale(100%) sepia(100%) hue-rotate(70deg) brightness(1.2) contrast(1.1);
        }

        /* ── Composer ── */
        #composer {
            position: fixed;
            background: rgba(0,0,0,0.97);
            border: 1px solid var(--green);
            padding: 13px; width: 295px;
            display: none; flex-direction: column; gap: 9px;
            box-shadow: 0 0 28px rgba(0,255,65,0.18);
            z-index: 1000; cursor: default;
        }
        .composer-header { font-size: 0.75rem; color: var(--green); font-weight: 600; }
        .composer-coords { color: var(--green-dim); font-weight: normal; }
        .composer-input {
            background: transparent; border: 1px solid var(--border-dim);
            color: var(--green); font-family: var(--font); font-size: 0.85rem;
            padding: 6px; outline: none; resize: none; transition: border-color 0.15s;
        }
        .composer-input:focus { border-color: var(--green-dim); }
        .composer-input::placeholder { color: #004400; }
        .composer-meta {
            font-size: 0.68rem; color: var(--green-dim);
            display: flex; justify-content: space-between;
        }
        #attachBtn { cursor: pointer; text-decoration: underline; }
        #attachBtn:hover { color: var(--green); }
        .composer-dur { display: flex; align-items: center; gap: 6px; font-size: 0.68rem; color: #005c18; }
        .dur-btn {
            background: transparent; border: 1px solid var(--border-dim);
            color: #005c18; padding: 2px 8px; cursor: pointer;
            font-family: var(--font); font-size: 0.68rem; border-radius: 3px; transition: all 0.15s;
        }
        .dur-btn:hover { color: var(--green-mid); border-color: var(--green-mid); }
        .dur-btn.active { color: var(--green); border-color: var(--green-dim); background: rgba(0,255,65,0.06); }
        .composer-actions { display: flex; gap: 8px; }
        .btn {
            background: transparent; border: 1px solid var(--border-dim);
            color: var(--green-dim); padding: 4px 10px; cursor: pointer;
            font-family: var(--font); font-size: 0.78rem; flex: 1; transition: all 0.15s;
        }
        .btn:hover { color: var(--green); border-color: var(--green); }
        .btn-primary { color: var(--green); border-color: var(--green-dim); }
        .btn-primary:hover { background: rgba(0,255,65,0.08); }
    </style>
</head>
<body>

    <!-- Username prompt (shown if no username set) -->
    <div id="user-prompt" class="hidden">
        <div class="user-prompt-box">
            <div class="up-title">▶ IDENTIFY USER</div>
            <div class="up-sub">Enter your matrix username to pin on the board.</div>
            <input type="text" class="up-input" id="up-input" placeholder="e.g. Zed" maxlength="20" autocomplete="off" spellcheck="false">
            <button class="up-btn" id="up-confirm">AUTHENTICATE →</button>
        </div>
    </div>

    <div id="top-bar">
        <a class="back-btn" href="index.html">← back</a>
        <span class="top-sep">|</span>
        <span id="status-dot">●</span>
        <span id="status-text">CONNECTING</span>
        <span class="top-sep">|</span>
        <span id="user-badge" class="unset" title="click to change username">—</span>
        <span class="top-sep">|</span>
        <span id="pin-count">0 PINS</span>
        <div id="help-bar">
            <span>CLICK·PIN</span>
            <span>DRAG·MOVE</span>
            <span>SCROLL·ZOOM</span>
            <span>BADGE·EXTEND</span>
        </div>
    </div>

    <div id="canvas-board"></div>

    <div id="composer">
        <div class="composer-header">
            ▶ NEW PIN &nbsp;<span class="composer-coords">[<span id="compX">0</span>, <span id="compY">0</span>]</span>
        </div>
        <textarea id="nodeInput" class="composer-input" rows="3" placeholder="type your message..."></textarea>
        <div class="composer-meta">
            <span id="uploadStatus">no media</span>
            <span id="attachBtn">[attach image]</span>
        </div>
        <input type="file" id="fileInput" accept="image/*" style="display:none;">
        <div class="composer-dur">
            <span>expires:</span>
            <button class="dur-btn active" data-h="1">1h</button>
            <button class="dur-btn" data-h="2">2h</button>
            <button class="dur-btn" data-h="3">3h</button>
        </div>
        <div class="composer-actions">
            <button class="btn btn-primary" id="saveBtn">PIN IT</button>
            <button class="btn" id="cancelBtn">cancel</button>
        </div>
    </div>

    <!-- MQTT.js — real-time sync via HiveMQ public broker, no setup required -->
    <script src="https://unpkg.com/mqtt/dist/mqtt.min.js"></script>

    <script>
    (function () {
        const board        = document.getElementById('canvas-board');
        const composer     = document.getElementById('composer');
        const nodeInput    = document.getElementById('nodeInput');
        const saveBtn      = document.getElementById('saveBtn');
        const cancelBtn    = document.getElementById('cancelBtn');
        const attachBtn    = document.getElementById('attachBtn');
        const fileInput    = document.getElementById('fileInput');
        const uploadStatus = document.getElementById('uploadStatus');
        const compX        = document.getElementById('compX');
        const compY        = document.getElementById('compY');
        const statusDot    = document.getElementById('status-dot');
        const statusText   = document.getElementById('status-text');
        const pinCountEl   = document.getElementById('pin-count');
        const userBadge    = document.getElementById('user-badge');
        const userPrompt   = document.getElementById('user-prompt');
        const upInput      = document.getElementById('up-input');
        const upConfirm    = document.getElementById('up-confirm');

        // ── Username ──
        let currentUser = localStorage.getItem('startpage_username') || '';
        function applyUser(name) {
            currentUser = name.trim();
            localStorage.setItem('startpage_username', currentUser);
            userBadge.textContent = currentUser + '@matrix';
            userBadge.classList.remove('unset');
            userPrompt.classList.add('hidden');
        }

        if (currentUser) {
            applyUser(currentUser);
        } else {
            userPrompt.classList.remove('hidden');
            setTimeout(() => upInput.focus(), 100);
        }

        userBadge.addEventListener('click', () => {
            upInput.value = currentUser;
            userPrompt.classList.remove('hidden');
            setTimeout(() => { upInput.focus(); upInput.select(); }, 60);
        });
        upConfirm.addEventListener('click', () => {
            if (upInput.value.trim()) applyUser(upInput.value);
        });
        upInput.addEventListener('keydown', e => {
            if (e.key === 'Enter' && upInput.value.trim()) applyUser(upInput.value);
        });

        // ── Status ──
        function setStatus(live) {
            statusDot.className  = live ? 'live' : '';
            statusText.className = live ? 'live' : '';
            statusText.textContent = live ? 'LIVE' : 'ERROR';
        }

        // ── App state ──
        let posts   = {};
        let nodeEls = {};
        let scale   = 1;
        let isDragging    = false;
        let dragTarget    = null;
        let currentSpawn  = { x: 50, y: 50 };
        let pendingImageData = null;
        let selectedDuration = 1;
        let moveSaveTimers   = {};


        function removePin(id) {
            if (nodeEls[id]) { nodeEls[id].remove(); delete nodeEls[id]; }
            delete posts[id];
            updatePinCount();
        }

        function updatePinCount() {
            const n = Object.keys(nodeEls).length;
            pinCountEl.textContent = n + (n === 1 ? ' PIN' : ' PINS');
        }

        // ── Time helpers ──
        function formatRemaining(expiresAt) {
            const ms = expiresAt - Date.now();
            if (ms <= 0) return 'EXPIRED';
            const s = Math.floor(ms / 1000);
            const h = Math.floor(s / 3600);
            const m = Math.floor((s % 3600) / 60);
            if (h > 0) return h + 'h ' + m + 'm';
            return m > 0 ? m + 'm' : '<1m';
        }

        function timerClass(expiresAt) {
            const ms = expiresAt - Date.now();
            if (ms < 10 * 60000) return 't-urgent';
            if (ms < 30 * 60000) return 't-warn';
            return 't-ok';
        }

        function getDurationHours(post) {
            if (!post.createdAt || !post.expiresAt) return 1;
            return Math.round((post.expiresAt - post.createdAt) / 3600000);
        }

        function refreshTimer(id) {
            const post = posts[id];
            const el   = nodeEls[id];
            if (!post || !el) return;
            const t   = el.querySelector('.node-timer');
            if (!t) return;
            const cls = timerClass(post.expiresAt);
            const maxed = getDurationHours(post) >= 3;
            t.textContent = formatRemaining(post.expiresAt) + (maxed ? '' : ' ▲');
            t.className   = 'node-timer ' + cls + (maxed ? ' t-maxed' : '');
            el.classList.toggle('urgent-pin', cls === 't-urgent');
        }

        // Periodic expiry check
        setInterval(() => {
            const now = Date.now();
            Object.entries(posts).forEach(([id, post]) => {
                if (post.expiresAt && now > post.expiresAt) {
                    deletePin(id);
                } else {
                    refreshTimer(id);
                }
            });
        }, 20000);

        // ── Create node DOM element ──
        function createNodeEl(post) {
            const div = document.createElement('div');
            div.className = 'node-card';
            div.style.left   = post.x + '%';
            div.style.top    = post.y + '%';
            div.style.zIndex = (Date.now() % 800) + 10;
            div.dataset.id   = post.id;

            const remaining = post.expiresAt ? formatRemaining(post.expiresAt) : '—';
            const tCls      = post.expiresAt ? timerClass(post.expiresAt) : 't-ok';
            const maxed     = getDurationHours(post) >= 3;
            const isMine    = post.author && post.author.toLowerCase() === currentUser.toLowerCase();
            const author    = post.author || '?';

            let mediaHtml = '';
            if (post.type === 'image' && (post.imageData || post.imageUrl)) {
                mediaHtml = `<img src="${esc(post.imageData || post.imageUrl)}" class="node-image" draggable="false">`;
            }

            div.innerHTML = `
                <div class="node-header">
                    <span class="node-author${isMine ? ' mine' : ''}">${esc(author)}</span>
                    <span class="node-id">#${post.id.slice(-4)}</span>
                    <span class="node-timer ${tCls}${maxed ? ' t-maxed' : ''}" title="${maxed ? 'max 3h reached' : 'click to extend +1h'}">${remaining}${maxed ? '' : ' ▲'}</span>
                    <span class="delete-btn" title="remove">✕</span>
                </div>
                ${mediaHtml}
                <div class="node-body">${esc(post.body || '')}</div>
            `;

            if (tCls === 't-urgent') div.classList.add('urgent-pin');

            // Extend timer on badge click
            div.querySelector('.node-timer').addEventListener('click', e => {
                e.stopPropagation();
                if (getDurationHours(post) >= 3) return;
                const nextH    = Math.min(getDurationHours(post) + 1, 3);
                const newExpiry = (post.createdAt || Date.now()) + nextH * 3600000;
                updatePin(post.id, { expiresAt: newExpiry });
                refreshTimer(post.id);
            });

            // Delete
            div.querySelector('.delete-btn').addEventListener('click', e => {
                e.stopPropagation();
                deletePin(post.id);
            });

            // Drag start
            div.addEventListener('mousedown', e => {
                if (e.target.classList.contains('delete-btn') ||
                    e.target.classList.contains('node-timer')) return;
                isDragging = true;
                const rect = board.getBoundingClientRect();
                const bw = board.offsetWidth, bh = board.offsetHeight;
                const mx = (e.clientX - rect.left) / scale;
                const my = (e.clientY - rect.top)  / scale;
                dragTarget = {
                    id: post.id, element: div, post: post,
                    offX: mx - (post.x / 100) * bw,
                    offY: my - (post.y / 100) * bh
                };
                div.style.zIndex = 990;
            });

            return div;
        }

        function esc(s) {
            const d = document.createElement('div');
            d.textContent = s;
            return d.innerHTML;
        }

        // ── Zoom ──
        window.addEventListener('wheel', e => {
            if (e.target.tagName === 'TEXTAREA') return;
            e.preventDefault();
            if (composer.style.display === 'flex') closeComposer();
            scale += e.deltaY * -0.001;
            scale = Math.min(Math.max(0.2, scale), 4);
            board.style.transform = `scale(${scale})`;
        }, { passive: false });

        // ── Click canvas → open composer ──
        board.addEventListener('mousedown', e => {
            if (e.target.closest('.node-card') || e.target.closest('#composer')) return;
            if (!currentUser) { userPrompt.classList.remove('hidden'); return; }
            const rect = board.getBoundingClientRect();
            const trueX = (e.clientX - rect.left) / scale;
            const trueY = (e.clientY - rect.top)  / scale;
            currentSpawn.x = Math.max(5, Math.min(95, (trueX / board.offsetWidth)  * 100));
            currentSpawn.y = Math.max(5, Math.min(95, (trueY / board.offsetHeight) * 100));
            composer.style.left    = e.clientX + 'px';
            composer.style.top     = e.clientY + 'px';
            composer.style.display = 'flex';
            compX.textContent = Math.round(currentSpawn.x);
            compY.textContent = Math.round(currentSpawn.y);
            nodeInput.value  = '';
            pendingImageData = null;
            uploadStatus.textContent = 'no media';
            setTimeout(() => nodeInput.focus(), 40);
        });

        // ── Drag move ──
        window.addEventListener('mousemove', e => {
            if (!isDragging || !dragTarget) return;
            const rect = board.getBoundingClientRect();
            const bw = board.offsetWidth, bh = board.offsetHeight;
            const mx = (e.clientX - rect.left) / scale;
            const my = (e.clientY - rect.top)  / scale;
            const px = ((mx - dragTarget.offX) / bw) * 100;
            const py = ((my - dragTarget.offY) / bh) * 100;
            dragTarget.element.style.left = px + '%';
            dragTarget.element.style.top  = py + '%';
            dragTarget.post.x = px;
            dragTarget.post.y = py;
        });

        // ── Drag end ──
        window.addEventListener('mouseup', () => {
            if (isDragging && dragTarget) {
                const { id, post } = dragTarget;
                dragTarget.element.style.zIndex = '';
                clearTimeout(moveSaveTimers[id]);
                moveSaveTimers[id] = setTimeout(() => {
                    updatePin(id, { x: post.x, y: post.y });
                }, 80);
            }
            isDragging = false;
            dragTarget = null;
        });

        // ── Duration selector ──
        document.querySelectorAll('.dur-btn').forEach(btn => {
            btn.addEventListener('click', () => {
                document.querySelectorAll('.dur-btn').forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
                selectedDuration = parseInt(btn.dataset.h, 10);
            });
        });

        // ── Composer ──
        function closeComposer() {
            composer.style.display = 'none';
            nodeInput.value  = '';
            pendingImageData = null;
        }

        function handleSave() {
            const body = nodeInput.value.trim();
            if (!body && !pendingImageData) { closeComposer(); return; }
            const now = Date.now();
            const id  = now.toString(36) + Math.random().toString(36).slice(2, 6);
            publishPin({
                id, body,
                type: pendingImageData ? 'image' : 'text',
                imageData: pendingImageData || null,
                x: currentSpawn.x, y: currentSpawn.y,
                author: currentUser,
                createdAt: now,
                timestamp: new Date(now).toISOString(),
                expiresAt: now + selectedDuration * 3600000,
                _deleted: false
            });
            closeComposer();
        }

        saveBtn.addEventListener('click', handleSave);
        cancelBtn.addEventListener('click', closeComposer);
        nodeInput.addEventListener('keydown', e => {
            if (e.key === 'Escape') closeComposer();
            if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); handleSave(); }
        });
        document.addEventListener('keydown', e => {
            if (e.key === 'Escape' && composer.style.display === 'flex') closeComposer();
        });

        // ── Image attach ──
        attachBtn.addEventListener('click', () => fileInput.click());
        fileInput.addEventListener('change', async function () {
            const file = this.files[0];
            if (!file || !file.type.startsWith('image/')) return;
            try {
                uploadStatus.textContent = 'processing...';
                pendingImageData = await resizeImage(file);
                uploadStatus.textContent = '[image ready]';
            } catch { uploadStatus.textContent = 'error'; }
            this.value = '';
        });
        nodeInput.addEventListener('paste', e => {
            const item = Array.from(e.clipboardData.items).find(i => i.type.startsWith('image/'));
            if (item) {
                e.preventDefault();
                resizeImage(item.getAsFile()).then(url => {
                    pendingImageData = url;
                    uploadStatus.textContent = '[image pasted]';
                });
            }
        });

        function resizeImage(file) {
            return new Promise((resolve, reject) => {
                const reader = new FileReader();
                reader.onload = e => {
                    const img = new Image();
                    img.onload = () => {
                        const c = document.createElement('canvas');
                        const r = Math.min(350 / img.width, 350 / img.height, 1);
                        c.width = img.width * r; c.height = img.height * r;
                        c.getContext('2d').drawImage(img, 0, 0, c.width, c.height);
                        resolve(c.toDataURL('image/jpeg', 0.6));
                    };
                    img.onerror = reject;
                    img.src = e.target.result;
                };
                reader.onerror = reject;
                reader.readAsDataURL(file);
            });
        }

        // ── MQTT real-time sync ───────────────────────────────────────────────
        const TOPIC_PREFIX = 'matrix-nexus-b3f7a2c9d1e8/pin/';
        const mqttClient = mqtt.connect('wss://broker.hivemq.com:8884/mqtt', {
            clientId:        'board-' + Math.random().toString(36).slice(2, 10),
            clean:           true,
            reconnectPeriod: 3000,
            connectTimeout:  10000,
            keepalive:       60
        });

        function publishPin(pinData) {
            mqttClient.publish(TOPIC_PREFIX + pinData.id, JSON.stringify(pinData), { retain: true, qos: 1 });
        }
        function deletePin(id) {
            mqttClient.publish(TOPIC_PREFIX + id, '', { retain: true, qos: 1 });
            removePin(id);
        }
        function updatePin(id, changes) {
            if (!posts[id]) return;
            Object.assign(posts[id], changes);
            publishPin(posts[id]);
        }

        mqttClient.on('connect', () => {
            setStatus(true);
            mqttClient.subscribe(TOPIC_PREFIX + '#', { qos: 1 });
        });
        mqttClient.on('error',     () => setStatus(false));
        mqttClient.on('offline',   () => setStatus(false));
        mqttClient.on('reconnect', () => {
            statusDot.className = ''; statusText.className = '';
            statusText.textContent = 'RECONNECTING';
        });

        mqttClient.on('message', (topic, payload) => {
            const id = topic.slice(TOPIC_PREFIX.length);
            if (!payload || payload.length === 0) { removePin(id); return; }
            let data;
            try { data = JSON.parse(payload.toString()); } catch { return; }
            if (!data || data._deleted) { removePin(id); return; }
            if (data.expiresAt && Date.now() > data.expiresAt) {
                mqttClient.publish(TOPIC_PREFIX + id, '', { retain: true, qos: 1 });
                removePin(id);
                return;
            }
            posts[data.id] = data;
            if (!nodeEls[data.id]) {
                const el = createNodeEl(data);
                board.appendChild(el);
                nodeEls[data.id] = el;
                updatePinCount();
            } else {
                const el = nodeEls[data.id];
                if (!dragTarget || dragTarget.id !== data.id) {
                    el.style.left = data.x + '%';
                    el.style.top  = data.y + '%';
                }
                refreshTimer(data.id);
            }
        });
        // ─────────────────────────────────────────────────────────────────────

    })();
    </script>
<script>
(function(){const _i=Math.random().toString(36).slice(2,9),_c=('BroadcastChannel'in window)?new BroadcastChannel('hp_tabs'):null,_d={id:_i,name:'Bulletin Board',icon:'◈',href:location.pathname};if(!_c)return;_c.postMessage({type:'open',..._d});_c.addEventListener('message',e=>{if(e.data.type==='ping')_c.postMessage({type:'pong',..._d});});addEventListener('beforeunload',()=>_c.postMessage({type:'close',id:_i}));})();
</script>
