<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>matrix://hn.nexus</title>
    <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body, html { width: 100vw; height: 100vh; background: #000; overflow: hidden;
            font-family: 'IBM Plex Mono', 'Courier New', monospace; color: #00ff41; }

        body::after {
            content: ''; position: fixed; inset: 0; z-index: 9000; pointer-events: none;
            background:
                repeating-linear-gradient(to bottom, transparent 0px, transparent 2px, rgba(0,0,0,0.06) 2px, rgba(0,0,0,0.06) 4px),
                radial-gradient(ellipse at 50% 50%, transparent 45%, rgba(0,0,0,0.5) 100%);
        }

        #top-bar {
            position: fixed; top: 0; left: 0; right: 0; z-index: 300;
            height: 32px; display: flex; align-items: center; gap: 8px; padding: 0 12px;
            background: rgba(0,0,0,0.92); border-bottom: 1px solid rgba(0,255,65,0.18);
            backdrop-filter: blur(6px); font-size: 10px; letter-spacing: 0.4px;
        }
        .back-btn {
            color: #005c18; text-decoration: none; border: 1px solid rgba(0,255,65,0.18);
            padding: 2px 8px; border-radius: 3px; transition: all 0.2s; flex-shrink: 0;
        }
        .back-btn:hover { color: #00ff41; border-color: rgba(0,255,65,0.6); background: rgba(0,255,65,0.05); }
        .top-sep { color: #001800; flex-shrink: 0; }
        #top-title { color: #004d14; flex-shrink: 0; }
        #status-dot { font-size: 9px; color: #005c18; transition: color 0.5s; flex-shrink: 0; }
        #status-dot.live { color: #00ff41; animation: blink 2s ease-in-out infinite; }
        @keyframes blink { 0%, 100% { opacity: 1; } 50% { opacity: 0.3; } }
        #status-text { color: #005c18; font-size: 9px; transition: color 0.5s; flex-shrink: 0; }
        #status-text.live { color: #00cc44; }
        #story-count { margin-left: auto; color: #003b00; font-size: 8px; letter-spacing: 1px; }

        #hn-canvas {
            position: fixed; top: 32px; left: 0; right: 0; bottom: 0;
            width: 100%; height: calc(100vh - 32px);
            cursor: crosshair; display: block;
        }

        #hn-tooltip {
            position: fixed; z-index: 400; pointer-events: none;
            background: rgba(0,3,0,0.96); border: 1px solid rgba(0,255,65,0.28);
            padding: 12px 16px; font-size: 14px; color: #00cc44;
            max-width: 420px; border-radius: 4px; opacity: 0; transition: opacity 0.12s;
            box-shadow: 0 0 18px rgba(0,255,65,0.12);
            font-family: 'IBM Plex Mono', monospace;
            line-height: 1.4;
        }
        #hint {
            position: fixed; bottom: 14px; left: 50%; transform: translateX(-50%);
            font-size: 8px; color: #003b00; letter-spacing: 2px;
            pointer-events: none; z-index: 300;
        }
    </style>
</head>
<body>

<div id="top-bar">
    <a class="back-btn" href="index.html">← back</a>
    <span class="top-sep">|</span>
    <span id="top-title">matrix://hn.nexus</span>
    <span class="top-sep">|</span>
    <span id="status-dot">●</span>
    <span id="status-text">CONNECTING</span>
    <span id="story-count"></span>
</div>

<canvas id="hn-canvas"></canvas>
<div id="hn-tooltip"></div>
<div id="hint">HOVER TO INSPECT · CLICK TO OPEN</div>

<script>
(async function () {
    const canvas   = document.getElementById('hn-canvas');
    const ctx      = canvas.getContext('2d');
    const tooltip  = document.getElementById('hn-tooltip');
    const statusDot = document.getElementById('status-dot');
    const statusTxt = document.getElementById('status-text');
    const storyCount = document.getElementById('story-count');

    let W, H, dpr, particles = [], mouse = { x: -9999, y: -9999 };
    let hovered = null, frameCount = 0;

    function resize() {
        dpr = Math.min(window.devicePixelRatio || 1, 2);
        W = canvas.offsetWidth  || window.innerWidth;
        H = canvas.offsetHeight || (window.innerHeight - 40);
        canvas.width  = W * dpr;
        canvas.height = H * dpr;
        ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
    }
    window.addEventListener('resize', () => { resize(); });

    async function fetchStories() {
        try {
            const ctrl = new AbortController();
            const t = setTimeout(() => ctrl.abort(), 7000);
            const res = await fetch('https://hn.algolia.com/api/v1/search?tags=front_page&hitsPerPage=28', { signal: ctrl.signal });
            clearTimeout(t);
            if (res.ok) {
                const data = await res.json();
                const hits = (data.hits || []).filter(h => h.title).map(h => ({
                    ...h,
                    preview: h.story_text ? h.story_text.replace(/<[^>]+>/g, '').trim().slice(0, 260) : '',
                    type: h.title.startsWith('Ask HN:') ? 'ASK' :
                          h.title.startsWith('Show HN:') ? 'SHOW' :
                          h.title.startsWith('Tell HN:') ? 'TELL' :
                          h.type === 'job' ? 'JOB' : 'LINK',
                }));
                if (hits.length) return hits;
            }
        } catch {}
        try {
            const topRes = await fetch('https://hacker-news.firebaseio.com/v0/topstories.json');
            if (!topRes.ok) return [];
            const ids = await topRes.json();
            const items = await Promise.all(ids.slice(0, 28).map(id =>
                fetch(`https://hacker-news.firebaseio.com/v0/item/${id}.json`).then(r => r.json()).catch(() => null)
            ));
            return items.filter(s => s && s.title).map(s => ({
                title: s.title,
                url: s.url || `https://news.ycombinator.com/item?id=${s.id}`,
                objectID: String(s.id),
                points: s.score || 0,
                num_comments: s.descendants || 0,
                author: s.by,
                preview: s.text ? s.text.replace(/<[^>]+>/g, '').trim().slice(0, 260) : '',
                type: s.title.startsWith('Ask HN:') ? 'ASK' :
                      s.title.startsWith('Show HN:') ? 'SHOW' :
                      s.title.startsWith('Tell HN:') ? 'TELL' :
                      s.type === 'job' ? 'JOB' : 'LINK',
            }));
        } catch { return []; }
    }

    function esc(s) { return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

    const RANK_COLORS = [
        '#00ff41','#00ff41','#00ff41',
        '#00cc44','#00cc44','#00cc44','#00cc44','#00cc44',
        '#007a22','#007a22','#007a22','#007a22',
        '#005c18','#005c18','#005c18','#005c18',
        '#004d10','#004d10','#004d10','#004d10',
        '#003b00','#003b00','#003b00','#003b00',
        '#002800','#002800','#002800','#002800'
    ];

    class StoryNode {
        constructor(story, rank) {
            this.story = story;
            this.rank = rank;
            this.pts = story.points || 0;
            this.cmt = story.num_comments || 0;
            this.author = story.author || 'anon';
            this.preview = story.preview || '';
            this.type = story.type || 'LINK';
            try {
                this.domain = story.url ? new URL(story.url).hostname.replace('www.', '') : 'news.ycombinator.com';
            } catch {
                this.domain = 'news.ycombinator.com';
            }
            this.url = story.url || ('https://news.ycombinator.com/item?id=' + story.objectID);
            this.title = story.title || 'Untitled';
            this.x = 40 + Math.random() * (W - 80);
            this.y = 40 + Math.random() * (H - 80);
            const a = Math.random() * Math.PI * 2, spd = 0.10 + Math.random() * 0.28;
            this.vx = Math.cos(a) * spd;
            this.vy = Math.sin(a) * spd;
            this.baseSize = 3 + Math.min(this.pts / 38, 7);
            this.size = this.baseSize;
            this.color = RANK_COLORS[Math.min(rank - 1, RANK_COLORS.length - 1)];
            this.glow = 0;
            this.phase = Math.random() * Math.PI * 2;
            this.freq = 0.006 + Math.random() * 0.006;
            this.orbitAngle = Math.random() * Math.PI * 2;
        }
        update() {
            this.phase += this.freq;
            this.orbitAngle += 0.015;

            // Repulsion logic to prevent bunching
            for (let i = 0; i < particles.length; i++) {
                const other = particles[i];
                if (other === this) continue;
                const dx = other.x - this.x, dy = other.y - this.y;
                const dist = Math.sqrt(dx*dx + dy*dy) || 1;
                const minDist = (this.size + other.size) * 2.2;
                if (dist < minDist) { this.vx -= dx/dist * 0.01; this.vy -= dy/dist * 0.01; }
            }

            this.x += this.vx + Math.sin(this.phase * 1.2) * 0.12;
            this.y += this.vy + Math.cos(this.phase * 0.85) * 0.12;
            this.vx *= 0.9994; this.vy *= 0.9994;
            const ddx = W/2 - this.x, ddy = H/2 - this.y;
            if (Math.sqrt(ddx*ddx+ddy*ddy) > Math.min(W,H)*0.46) {
                this.vx += ddx * 0.00012; this.vy += ddy * 0.00012;
            }
            const spd = Math.sqrt(this.vx*this.vx+this.vy*this.vy);
            if (spd > 0.7) { this.vx = (this.vx/spd)*0.7; this.vy = (this.vy/spd)*0.7; }
            if (this.x < 18) this.vx += 0.025; if (this.x > W-18) this.vx -= 0.025;
            if (this.y < 12) this.vy += 0.025; if (this.y > H-12) this.vy -= 0.025;
            const mdx = mouse.x - this.x, mdy = mouse.y - this.y;
            const md = Math.sqrt(mdx*mdx+mdy*mdy);
            if (this.hitTest(mouse.x, mouse.y)) {
                this.glow = Math.min(1, this.glow + 0.12);
            } else if (md < 100) {
                this.vx -= mdx * (1-md/100) * 0.035 * 0.22;
                this.vy -= mdy * (1-md/100) * 0.035 * 0.22;
                this.glow = Math.min(0.5, this.glow + 0.04);
            } else {
                this.glow = Math.max(0, this.glow - 0.035);
            }
            this.size = this.baseSize * (1 + Math.sin(this.phase*2.1+frameCount*0.008)*0.22) * (1 + this.glow * 1.4);
        }
        draw() {
            const g = this.glow, s = this.size;
            if (g > 0.04) {
                const gr = ctx.createRadialGradient(this.x,this.y,s*0.3,this.x,this.y,s*5+g*18);
                gr.addColorStop(0, `rgba(0,255,65,${0.4*g})`);
                gr.addColorStop(0.5, `rgba(0,180,50,${0.1*g})`);
                gr.addColorStop(1, 'rgba(0,255,65,0)');
                ctx.fillStyle = gr;
                ctx.beginPath(); ctx.arc(this.x,this.y,s*5+g*18,0,Math.PI*2); ctx.fill();
            }
            if (this.rank <= 3) {
                const orR = s * 2.8 + 5;
                ctx.strokeStyle = `rgba(0,255,65,${0.18+g*0.25})`;
                ctx.lineWidth = 0.6;
                ctx.setLineDash([3,7]);
                ctx.beginPath(); ctx.ellipse(this.x,this.y,orR*0.95,orR*0.5,0,0,Math.PI*2); ctx.stroke();
                ctx.setLineDash([]);
                const ox = this.x + Math.cos(this.orbitAngle)*orR*0.95;
                const oy = this.y + Math.sin(this.orbitAngle)*orR*0.5;
                ctx.fillStyle = `rgba(0,255,65,${0.7+g*0.3})`;
                ctx.beginPath(); ctx.arc(ox,oy,1.5,0,Math.PI*2); ctx.fill();
            }
            const bg = ctx.createRadialGradient(this.x-s*.25,this.y-s*.25,0,this.x,this.y,s);
            bg.addColorStop(0,'rgba(200,255,220,0.95)');
            bg.addColorStop(0.35,this.color);
            bg.addColorStop(1,'rgba(0,18,5,0.3)');
            ctx.fillStyle = bg;
            ctx.beginPath(); ctx.arc(this.x,this.y,s,0,Math.PI*2); ctx.fill();
            if (g > 0.18) {
                ctx.fillStyle = `rgba(220,255,235,${0.55*g})`;
                ctx.beginPath(); ctx.arc(this.x,this.y,s*0.3,0,Math.PI*2); ctx.fill();
            }
            if (this.rank <= 6 || g > 0.35) {
                ctx.fillStyle = `rgba(0,255,65,${0.38+g*0.55})`;
                ctx.font = 'bold 8px monospace';
                ctx.textAlign = 'center'; ctx.textBaseline = 'bottom';
                ctx.fillText(String(this.rank).padStart(2,'0'), this.x, this.y - s - 3);
                ctx.textBaseline = 'alphabetic';
            }
        }
        hitTest(mx, my) {
            if (mx < -100) return false;
            const dx = mx-this.x, dy = my-this.y;
            return Math.sqrt(dx*dx+dy*dy) < Math.max(this.size+12, 18);
        }
    }

    function buildParticles(stories) {
        particles = stories.map((s, i) => new StoryNode(s, i + 1));
    }

    function draw() {
        ctx.clearRect(0, 0, W, H);
        ctx.fillStyle = 'rgba(0,2,0,0.98)';
        ctx.fillRect(0, 0, W, H);
        ctx.strokeStyle = 'rgba(0,255,65,0.025)'; ctx.lineWidth = 0.5;
        for (let x = 0; x < W; x += 40) { ctx.beginPath(); ctx.moveTo(x,0); ctx.lineTo(x,H); ctx.stroke(); }
        for (let y = 0; y < H; y += 28) { ctx.beginPath(); ctx.moveTo(0,y); ctx.lineTo(W,y); ctx.stroke(); }
        for (let y = 0; y < H; y += 3) { ctx.fillStyle='rgba(0,0,0,0.055)'; ctx.fillRect(0,y,W,1); }

        frameCount++;
        for (const p of particles) p.update();

        const CR = 160;
        for (let i = 0; i < particles.length; i++) {
            const a = particles[i];
            for (let j = i+1; j < particles.length; j++) {
                const b = particles[j];
                const dx = a.x-b.x, dy = a.y-b.y;
                const dist = Math.sqrt(dx*dx+dy*dy);
                if (dist < CR) {
                    const t = 1 - dist/CR;
                    const gb = Math.max(a.glow, b.glow);
                    const alpha = t * 0.28 * (1 + gb);
                    ctx.beginPath(); ctx.moveTo(a.x,a.y); ctx.lineTo(b.x,b.y);
                    ctx.strokeStyle = `rgba(0,255,65,${alpha})`;
                    ctx.lineWidth = 0.5 + gb * 2;
                    ctx.stroke();
                    if (gb > 0.2) {
                        ctx.beginPath(); ctx.moveTo(a.x,a.y); ctx.lineTo(b.x,b.y);
                        ctx.strokeStyle = `rgba(100,255,140,${alpha*0.38*gb})`;
                        ctx.lineWidth = (0.5+gb*2)*2.2;
                        ctx.stroke();
                    }
                }
            }
        }

        [...particles].sort((a,b)=>a.glow-b.glow).forEach(p=>p.draw());

        if (mouse.x > -100) {
            ctx.strokeStyle='rgba(0,255,65,0.1)'; ctx.lineWidth=0.8;
            ctx.setLineDash([4,14]); ctx.lineDashOffset=-frameCount*0.5;
            ctx.beginPath(); ctx.arc(mouse.x,mouse.y,75,0,Math.PI*2); ctx.stroke();
            ctx.setLineDash([]);
        }

        requestAnimationFrame(draw);
    }

    canvas.addEventListener('mousemove', e => {
        const r = canvas.getBoundingClientRect();
        mouse.x = e.clientX - r.left; mouse.y = e.clientY - r.top;
        hovered = null;
        for (const p of particles) { if (p.hitTest(mouse.x, mouse.y)) { hovered = p; break; } }
        if (hovered) {
            const typeColor = { ASK: '#00cc44', SHOW: '#00aa44', TELL: '#008833', JOB: '#007a22', LINK: '#005c18' };
            tooltip.innerHTML = `
                <div style="display:flex;align-items:center;gap:8px;margin-bottom:8px;">
                    <span style="font-size:9px;color:${typeColor[hovered.type]||'#005c18'};letter-spacing:1.4px;border:1px solid rgba(0,255,65,0.22);padding:2px 7px;border-radius:2px;">${hovered.type}</span>
                    <span style="font-size:9px;color:#004d14;letter-spacing:1px;">#${String(hovered.rank).padStart(2,'0')}</span>
                    <span style="font-size:9px;color:#003b00;margin-left:auto;">▲${hovered.pts} · ⌘${hovered.cmt}</span>
                </div>
                <div style="font-weight:600;color:#00ff41;margin-bottom:${hovered.preview ? 9 : 8}px;line-height:1.45;font-size:13px;">${esc(hovered.title)}</div>
                ${hovered.preview ? `<div style="font-size:11px;color:#007a22;margin-bottom:9px;line-height:1.55;border-left:2px solid rgba(0,255,65,0.22);padding-left:9px;">${esc(hovered.preview)}</div>` : ''}
                <div style="font-size:10px;color:#004d14;display:flex;gap:10px;align-items:center;">
                    <span>${esc(hovered.domain)}</span>
                    <span style="color:#002a00;">·</span>
                    <span>@${esc(hovered.author)}</span>
                </div>
            `;
            tooltip.style.opacity = '1';
            tooltip.style.left = Math.min(e.clientX + 22, window.innerWidth - 440) + 'px';
            tooltip.style.top  = Math.max(e.clientY - 38, 40) + 'px';
            canvas.style.cursor = 'pointer';
        } else {
            tooltip.style.opacity = '0';
            canvas.style.cursor = 'crosshair';
        }
    });
    canvas.addEventListener('mouseleave', () => {
        mouse.x = -9999; mouse.y = -9999; hovered = null;
        tooltip.style.opacity = '0';
    });
    canvas.addEventListener('click', () => {
        if (hovered) window.open(hovered.url, '_blank', 'noopener,noreferrer');
    });

    function drawLoading() {
        ctx.clearRect(0,0,W,H);
        ctx.fillStyle = 'rgba(0,2,0,0.98)';
        ctx.fillRect(0,0,W,H);
        ctx.fillStyle = '#00ff41';
        ctx.font = '14px IBM Plex Mono';
        ctx.textAlign = 'center';
        const dots = '.'.repeat((frameCount / 20) % 4);
        ctx.fillText(`INITIALIZING NEURAL UPLINK${dots}`, W/2, H/2);
        frameCount++;
        if (!particles.length) requestAnimationFrame(drawLoading);
    }

    resize();
    drawLoading();

    const stories = await fetchStories();
    resize();
    if (stories.length) {
        buildParticles(stories);
        frameCount = 0;
        statusDot.className = 'live';
        statusTxt.className = 'live';
        statusTxt.textContent = 'LIVE';
        storyCount.textContent = `${stories.length} STORIES`;
    } else {
        statusTxt.textContent = 'OFFLINE';
    }
    draw();

    setInterval(async () => {
        const fresh = await fetchStories();
        if (fresh.length) {
            buildParticles(fresh);
            storyCount.textContent = `${fresh.length} STORIES`;
        }
    }, 5 * 60 * 1000);
})();
</script>
<script>
(function(){const _i=Math.random().toString(36).slice(2,9),_c=('BroadcastChannel'in window)?new BroadcastChannel('hp_tabs'):null,_d={id:_i,name:'HN Nexus',icon:'◈',href:location.pathname};if(!_c)return;_c.postMessage({type:'open',..._d});_c.addEventListener('message',e=>{if(e.data.type==='ping')_c.postMessage({type:'pong',..._d});});addEventListener('beforeunload',()=>_c.postMessage({type:'close',id:_i}));})();
</script>
</body>
</html>
