<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>PLANETARY GEOLOGICAL SURVEY SYSTEM</title>
<link href="https://fonts.googleapis.com/css2?family=VT323&display=swap" rel="stylesheet">
<style>
* { margin:0; padding:0; box-sizing:border-box; }
html, body { width:100%; height:100%; background:#000; overflow:hidden; }
canvas { display:block; width:100%; height:100%; }
</style>
</head>
<body>
<canvas id="c"></canvas>
<script>
'use strict';

const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');

const MONO = "'VT323','Courier New',monospace";

const C = {
  BLACK:  '#000000',
  BG:     '#000508',
  YELLOW: '#ffdc00',
  ORANGE: '#ff8c00',
  RED:    '#ff3232',
  GREEN:  '#00ff64',
  CYAN:   '#00d4ff',
  PURPLE: '#b400ff',
  WHITE:  '#ddfff0',
  DIM:    '#003820',
  MANTLE: '#c87830',
};

const LAYERS = [
  { r:0.13, fill:C.YELLOW, glow:C.YELLOW, name:'INNER CORE',   dens:'14,300 kg/m³', temp:'5,200 K',  depth:'      0 km' },
  { r:0.32, fill:C.RED,    glow:C.RED,    name:'OUTER CORE',   dens:'11,000 kg/m³', temp:'4,500 K',  depth:'  1,220 km' },
  { r:0.55, fill:C.ORANGE, glow:C.ORANGE, name:'LOWER MANTLE', dens:' 5,500 kg/m³', temp:'2,500 K',  depth:'  2,900 km' },
  { r:0.72, fill:C.MANTLE, glow:C.MANTLE, name:'UPPER MANTLE', dens:' 3,400 kg/m³', temp:'1,600 K',  depth:'  4,000 km' },
  { r:0.88, fill:C.GREEN,  glow:C.GREEN,  name:'CRUST',        dens:' 2,800 kg/m³', temp:'  600 K',  depth:'  5,900 km' },
  { r:1.00, fill:'rgba(0,210,255,0.18)', glow:C.CYAN, name:'ATMOSPHERE', dens:'      1 kg/m³', temp:'  250 K', depth:'  6,371 km' },
];

let W, H, angle = 0, frame = 0;
let noiseCanvas = null;

function resize() {
  W = canvas.width  = window.innerWidth;
  H = canvas.height = window.innerHeight;
  noiseCanvas = null;
}
window.addEventListener('resize', resize);
resize();

// ── noise texture ─────────────────────────────────────────────────────────────
function buildNoise() {
  const off = document.createElement('canvas');
  off.width = W; off.height = H;
  const c2 = off.getContext('2d');
  const id = c2.createImageData(W, H);
  for (let i = 0; i < id.data.length; i += 4) {
    const v = Math.random() * 28 | 0;
    id.data[i] = id.data[i+1] = id.data[i+2] = v;
    id.data[i+3] = v > 18 ? 255 : 0;
  }
  c2.putImageData(id, 0, 0);
  return off;
}

// ── helpers ───────────────────────────────────────────────────────────────────
function txt(s, x, y, color, size, align='left') {
  ctx.fillStyle = color;
  ctx.textAlign = align;
  ctx.font = `${size}px ${MONO}`;
  ctx.fillText(s, x, y);
  ctx.textAlign = 'left';
}

function gtxt(s, x, y, color, glow, size, align='left') {
  ctx.shadowColor = glow || color;
  ctx.shadowBlur = 10;
  txt(s, x, y, color, size, align);
  ctx.shadowBlur = 0;
}

function deg(a) { return (a * 180 / Math.PI) % 360; }
function pad(n, w, d=0) { return n.toFixed(d).padStart(w,' '); }

// ── background ────────────────────────────────────────────────────────────────
function drawBG() {
  ctx.fillStyle = C.BLACK;
  ctx.fillRect(0, 0, W, H);
  ctx.fillStyle = C.DIM;
  for (let y = 0; y < H; y += 28)
    for (let x = 0; x < W; x += 28)
      ctx.fillRect(x, y, 1, 1);
}

// ── planet ────────────────────────────────────────────────────────────────────
function drawPlanet(cx, cy, R) {
  const sa  = Math.abs(Math.sin(angle));
  const eX  = Math.max(R * sa, 1);

  // clip to sphere
  ctx.save();
  ctx.beginPath();
  ctx.arc(cx, cy, R, 0, Math.PI*2);
  ctx.clip();

  ctx.fillStyle = C.BG;
  ctx.fillRect(cx-R, cy-R, R*2, R*2);

  // ── wireframe exterior ──
  ctx.strokeStyle = 'rgba(0,200,80,0.55)';
  ctx.lineWidth = 0.8;

  // latitude rings
  [-0.866,-0.5,0,0.5,0.866].forEach(ny => {
    const dy = ny * R;
    const hw = R * Math.sqrt(1 - ny*ny);
    const ry = hw * 0.22 * sa + 0.5;
    ctx.shadowColor = 'rgba(0,200,80,0.4)';
    ctx.shadowBlur = 3;
    ctx.beginPath();
    ctx.ellipse(cx, cy+dy, hw, ry, 0, 0, Math.PI*2);
    ctx.stroke();
  });
  ctx.shadowBlur = 0;

  // longitude great circles
  for (let i = 0; i < 9; i++) {
    const phi = i * Math.PI/9 + angle * 0.65;
    const xr  = R * Math.abs(Math.sin(phi));
    if (xr < 4) continue;
    ctx.globalAlpha = 0.3 + 0.45*(xr/R);
    ctx.beginPath();
    ctx.ellipse(cx, cy, xr, R, 0, 0, Math.PI*2);
    ctx.stroke();
  }
  ctx.globalAlpha = 1;

  // ── interior layers (innermost = last drawn = outermost ellipse first) ──
  for (let i = LAYERS.length-1; i >= 0; i--) {
    const L = LAYERS[i];
    const lx = L.r * eX, ly = L.r * R;
    if (lx < 0.5 && ly < 0.5) continue;

    ctx.shadowColor = L.glow;
    ctx.shadowBlur  = i === 0 ? 22 : 5;
    ctx.beginPath();
    ctx.ellipse(cx, cy, lx, ly, 0, 0, Math.PI*2);
    ctx.fillStyle = L.fill;
    ctx.fill();
  }
  ctx.shadowBlur = 0;

  // scanline texture over layers
  ctx.globalAlpha = 0.12;
  ctx.strokeStyle = '#000';
  ctx.lineWidth = 1.5;
  for (let sy = cy-R+2; sy < cy+R; sy += 4) {
    const dy = sy - cy;
    if (Math.abs(dy) >= R) continue;
    const hw = eX * Math.sqrt(1-(dy/R)**2);
    ctx.beginPath(); ctx.moveTo(cx-hw, sy); ctx.lineTo(cx+hw, sy); ctx.stroke();
  }
  ctx.globalAlpha = 1;

  // cut-face edge
  ctx.strokeStyle = 'rgba(255,255,255,0.88)';
  ctx.lineWidth = 1.8;
  ctx.shadowColor = '#fff';
  ctx.shadowBlur = 14;
  ctx.beginPath();
  ctx.ellipse(cx, cy, eX, R, 0, 0, Math.PI*2);
  ctx.stroke();
  ctx.shadowBlur = 0;

  // sphere outline
  ctx.strokeStyle = 'rgba(0,200,255,0.5)';
  ctx.lineWidth = 2;
  ctx.shadowColor = C.CYAN;
  ctx.shadowBlur = 8;
  ctx.beginPath();
  ctx.arc(cx, cy, R, 0, Math.PI*2);
  ctx.stroke();
  ctx.shadowBlur = 0;

  ctx.restore();

  // axis line
  ctx.strokeStyle = 'rgba(0,200,80,0.38)';
  ctx.lineWidth = 1;
  ctx.setLineDash([4,7]);
  ctx.beginPath(); ctx.moveTo(cx, cy-R-28); ctx.lineTo(cx, cy+R+28); ctx.stroke();
  ctx.setLineDash([]);

  // equatorial decoration ring
  ctx.strokeStyle = 'rgba(0,200,80,0.28)';
  ctx.lineWidth = 1;
  ctx.beginPath();
  ctx.ellipse(cx, cy, R+14, (R+14)*0.13*sa+1.5, 0, 0, Math.PI*2);
  ctx.stroke();
}

// ── layer labels ─────────────────────────────────────────────────────────────
function drawLabels(cx, cy, R, lx) {
  const eX = Math.max(R * Math.abs(Math.sin(angle)), 1);
  const SZ = Math.max(14, Math.min(18, H/55));
  const rowH = SZ + 14;
  const totalH = LAYERS.length * rowH;
  const startY = cy - totalH/2 + rowH/2;

  LAYERS.forEach((L, i) => {
    const ly  = startY + i * rowH;
    const ax  = cx + L.r * eX;         // attach x on cut-face edge
    const ay  = cy + (ly - cy) * 0.28; // slight y tracking

    // connector
    ctx.globalAlpha = 0.55;
    ctx.strokeStyle = L.glow;
    ctx.lineWidth = 0.9;
    ctx.setLineDash([3,5]);
    ctx.beginPath();
    ctx.moveTo(ax, ay);
    ctx.lineTo(lx - 4, ly);
    ctx.stroke();
    ctx.setLineDash([]);
    ctx.globalAlpha = 1;

    // dot
    ctx.fillStyle = L.glow;
    ctx.shadowColor = L.glow; ctx.shadowBlur = 7;
    ctx.beginPath(); ctx.arc(ax, ay, 2.5, 0, Math.PI*2); ctx.fill();
    ctx.shadowBlur = 0;

    // label
    gtxt(`◄ ${L.name}`, lx, ly + SZ*0.3, L.fill, L.glow, SZ + 2);
    ctx.globalAlpha = 0.55;
    txt(`  ρ: ${L.dens}`, lx, ly + SZ*0.3 + SZ, C.DIM, SZ - 2);
    txt(`  T: ${L.temp}   D: ${L.depth}`, lx, ly + SZ*0.3 + SZ*2, C.DIM, SZ - 2);
    ctx.globalAlpha = 1;
  });
}

// ── telemetry panel ───────────────────────────────────────────────────────────
function drawTelemetry(x, y) {
  const d    = deg(angle);
  const dep  = Math.abs(Math.sin(angle)) * 6371;
  const anom = Math.random() > 0.97 ? 'DETECTED' : 'NOMINAL ';
  const ac   = anom.trim() === 'DETECTED' ? C.RED : C.GREEN;
  const bl   = frame % 28 < 14 ? '▌' : ' ';
  const now  = new Date().toTimeString().slice(0,8);
  const SZ   = Math.max(14, Math.min(18, H/58));
  const LH   = SZ + 6;

  const rows = [
    [C.CYAN,   `╔══════════════════════╗`],
    [C.GREEN,  `║ GEO-SCAN SYS  v2.7  ║`],
    [C.CYAN,   `╠══════════════════════╣`],
    [C.GREEN,  `║ SCAN #  ${String(frame).padStart(9,'0')} ║`],
    [C.GREEN,  `║ ROT     ${pad(d,7,2)}°     ║`],
    [C.GREEN,  `║ DEPTH   ${pad(dep,6,1)} km    ║`],
    [C.YELLOW, `║ FREQ    14.700  GHz  ║`],
    [C.YELLOW, `║ TEMP    5,200   K    ║`],
    [C.YELLOW, `║ PRES    360.0   GPa  ║`],
    [ac,       `║ ANOM    ${anom}   ║`],
    [C.GREEN,  `║ CLOCK   ${now}   ║`],
    [C.GREEN,  `║ STATUS  ${bl} ACTIVE ${bl}  ║`],
    [C.CYAN,   `╚══════════════════════╝`],
  ];

  rows.forEach(([c, t], i) => {
    gtxt(t, x, y + i*LH, c, c, SZ);
  });
}

// ── coordinates panel ─────────────────────────────────────────────────────────
function drawCoords(x, y) {
  const a  = angle;
  const SZ = Math.max(14, Math.min(18, H/58));
  const LH = SZ + 6;

  const rows = [
    [C.PURPLE, `╔══════════════════╗`],
    [C.PURPLE, `║   COORDINATES    ║`],
    [C.PURPLE, `╠══════════════════╣`],
    [C.PURPLE, `║ X ${pad(Math.sin(a)*6371,9,1)} km ║`],
    [C.PURPLE, `║ Y ${pad(Math.cos(a)*3120,9,1)} km ║`],
    [C.PURPLE, `║ Z ${pad(Math.sin(a*2)*1220,9,1)} km ║`],
    [C.GREEN,  `║ LAT ${pad(Math.sin(a*.5)*90,7,2)}°   ║`],
    [C.GREEN,  `║ LON ${pad(deg(a),7,2)}°   ║`],
    [C.YELLOW, `║ ALT ${pad(Math.abs(Math.cos(a*1.3))*400,6,1)} km  ║`],
    [C.PURPLE, `╚══════════════════╝`],
  ];

  rows.forEach(([c, t], i) => {
    gtxt(t, x, y + i*LH, c, c, SZ);
  });
}

// ── oscilloscope ──────────────────────────────────────────────────────────────
function drawOscilloscope(x, y, w, h) {
  const SZ = Math.max(11, Math.min(14, H/70));
  gtxt('SEISMIC WAVEFORM', x, y - 4, C.GREEN, C.GREEN, SZ);

  ctx.strokeStyle = 'rgba(0,200,80,0.5)';
  ctx.lineWidth = 1;
  ctx.strokeRect(x, y, w, h);

  ctx.strokeStyle = C.GREEN;
  ctx.lineWidth = 1.4;
  ctx.shadowColor = C.GREEN;
  ctx.shadowBlur = 4;
  ctx.globalAlpha = 0.8;
  ctx.beginPath();
  for (let i = 0; i <= w; i++) {
    const t  = (i/w) * Math.PI * 6 + angle * 2.5;
    const yy = y + h/2 + Math.sin(t) * h * 0.3 * (0.6 + 0.4*Math.sin(angle*2.3));
    i === 0 ? ctx.moveTo(x+i, yy) : ctx.lineTo(x+i, yy);
  }
  ctx.stroke();
  ctx.shadowBlur = 0;
  ctx.globalAlpha = 1;
}

// ── title ─────────────────────────────────────────────────────────────────────
function drawTitle() {
  const SZ  = Math.max(18, Math.min(26, W/72));
  const t1  = '◄◄  PLANETARY GEOLOGICAL SURVEY SYSTEM  ▼  SUBSURFACE TOMOGRAPHIC SCAN  ▼  GEO-LAB Mk.VII  ▼  ◄◄';
  gtxt(t1, W/2, SZ+6, C.CYAN, C.CYAN, SZ, 'center');

  ctx.strokeStyle = 'rgba(0,212,255,0.35)';
  ctx.lineWidth = 1;
  ctx.beginPath(); ctx.moveTo(18, SZ+14); ctx.lineTo(W-18, SZ+14); ctx.stroke();
}

// ── status bar ────────────────────────────────────────────────────────────────
function drawStatus() {
  const SZ = Math.max(14, Math.min(18, H/60));
  const bl = frame%20<10 ? '█' : '░';
  const s  = `[ SYS:OK ]  [ CORE:ACTIVE ]  [ LAYER-ANALYSIS:RUNNING ]  [ FRAME:${String(frame).padStart(6,'0')} ]  [ ${bl} REC ${bl} ]`;

  ctx.fillStyle = 'rgba(0,18,8,0.85)';
  ctx.fillRect(0, H-34, W, 34);
  ctx.strokeStyle = 'rgba(0,255,100,0.3)';
  ctx.lineWidth = 1;
  ctx.beginPath(); ctx.moveTo(0,H-34); ctx.lineTo(W,H-34); ctx.stroke();

  gtxt(s, W/2, H-9, C.GREEN, C.GREEN, SZ, 'center');
}

// ── corner brackets ───────────────────────────────────────────────────────────
function drawCorners(yTop, yBot) {
  const d = 24;
  [[16,yTop,1,1],[W-16,yTop,-1,1],[16,yBot,1,-1],[W-16,yBot,-1,-1]].forEach(([x,y,sx,sy]) => {
    ctx.strokeStyle = 'rgba(0,212,255,0.45)';
    ctx.lineWidth = 2;
    ctx.beginPath();
    ctx.moveTo(x, y+sy*d); ctx.lineTo(x,y); ctx.lineTo(x+sx*d, y);
    ctx.stroke();
  });
}

// ── CRT effects ───────────────────────────────────────────────────────────────
function drawCRT() {
  // scanlines
  ctx.globalAlpha = 0.13;
  ctx.fillStyle = '#000';
  for (let y = 0; y < H; y += 3) ctx.fillRect(0, y, W, 1);
  ctx.globalAlpha = 1;

  // vignette
  const vg = ctx.createRadialGradient(W/2,H/2,H*0.28,W/2,H/2,H*0.88);
  vg.addColorStop(0,'rgba(0,0,0,0)');
  vg.addColorStop(1,'rgba(0,0,0,0.72)');
  ctx.fillStyle = vg;
  ctx.fillRect(0,0,W,H);

  // subtle chromatic aberration tinge at edges
  const ca = ctx.createRadialGradient(W/2,H/2,H*0.5,W/2,H/2,H*0.9);
  ca.addColorStop(0,'rgba(0,0,0,0)');
  ca.addColorStop(1,'rgba(255,0,80,0.04)');
  ctx.fillStyle = ca;
  ctx.fillRect(0,0,W,H);

  // noise
  if (!noiseCanvas) noiseCanvas = buildNoise();
  ctx.globalAlpha = 0.025;
  ctx.drawImage(noiseCanvas, 0, 0, W, H);
  ctx.globalAlpha = 1;

  // random flicker
  if (Math.random() < 0.018) {
    ctx.globalAlpha = Math.random()*0.06;
    ctx.fillStyle = C.GREEN;
    ctx.fillRect(0,0,W,H);
    ctx.globalAlpha = 1;
  }
}

// ── main loop ─────────────────────────────────────────────────────────────────
function render() {
  const HEADER_H = Math.max(30, Math.min(42, H*0.05)) + 16;
  const FOOTER_H = 34;
  const MARGIN   = 14;
  const PANEL_W  = Math.max(210, Math.min(270, W*0.165));

  const cx = W / 2;
  const cy = (HEADER_H + (H - HEADER_H - FOOTER_H) / 2);
  const availH = H - HEADER_H - FOOTER_H - MARGIN*2;
  const availW = W - PANEL_W*2 - MARGIN*4;
  const R = Math.min(availH/2, availW/2) * 0.88;

  const lx = MARGIN;         // left panel x
  const ly = HEADER_H + 12;  // left panel y
  const labelX = cx + R + 22;

  drawBG();
  drawTitle();
  drawCorners(HEADER_H+2, H-FOOTER_H-2);

  drawPlanet(cx, cy, R);
  drawLabels(cx, cy, R, labelX);
  drawTelemetry(lx, ly);
  drawCoords(lx, ly + Math.max(14,Math.min(18,H/58))*13 + 6*13 + 18);
  drawOscilloscope(lx, H - FOOTER_H - 90, PANEL_W, 56);

  drawStatus();
  drawCRT();
}

function loop() {
  angle += 0.022;
  if (angle > Math.PI*2) angle -= Math.PI*2;
  frame++;
  render();
  requestAnimationFrame(loop);
}

document.fonts.ready.then(loop);
</script>
</body>
</html>
