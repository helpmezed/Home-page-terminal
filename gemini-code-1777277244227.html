<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>bug@matrix: ~/spatial_board</title>
    <link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=VT323&family=IBM+Plex+Mono:wght@400;500;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-main: #000000;
            --bg-card: rgba(0, 5, 0, 0.9);
            
            --text-primary: #00ff00;
            --text-bright: #33ff33;
            --text-dim: #008800;
            --text-muted: #004400;
            
            --border-bright: #00ff00;
            --border-dim: #003300;
            
            --font-mono: 'IBM Plex Mono', 'Share Tech Mono', monospace;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body, html {
            width: 100vw;
            height: 100vh;
            background: var(--bg-main);
            color: var(--text-primary);
            font-family: var(--font-mono);
            overflow: hidden; /* No scrolling, pure spatial canvas */
            cursor: crosshair;
        }

        /* Plain black background */
        #canvas-board {
            width: 100vw;
            height: 100vh;
            position: relative;
            background-color: var(--bg-main);
            transform-origin: center center; /* Ensure zoom scales from the center */
        }

        /* Glowing Post Cards */
        .node-card {
            position: absolute;
            background: var(--bg-card);
            border: 1px solid var(--border-bright);
            padding: 12px;
            min-width: 150px;
            max-width: 300px;
            backdrop-filter: blur(4px);
            transform: translate(-50%, -50%); /* Center on click */
            transition: border-color 0.2s, box-shadow 0.2s, z-index 0s;
            box-shadow: 0 0 20px 2px rgba(0, 255, 0, 0.4), inset 0 0 10px rgba(0, 255, 0, 0.15);
            cursor: move;
        }

        .node-card:hover {
            border-color: #ffffff;
            box-shadow: 0 0 35px 5px rgba(0, 255, 0, 0.8), inset 0 0 15px rgba(0, 255, 0, 0.4);
            z-index: 100 !important; /* Bring to front on hover */
        }

        .node-header {
            display: flex;
            justify-content: space-between;
            font-size: 0.75rem;
            color: var(--text-dim);
            margin-bottom: 6px;
            border-bottom: 1px dashed var(--border-dim);
            padding-bottom: 4px;
        }

        .node-body {
            font-size: 0.9rem;
            word-break: break-word;
            white-space: pre-wrap;
            line-height: 1.4;
        }

        .node-image {
            width: 100%;
            height: auto;
            max-height: 200px;
            object-fit: contain;
            margin-bottom: 8px;
            border: 1px solid var(--border-dim);
            filter: grayscale(100%) sepia(100%) hue-rotate(70deg) brightness(1.2) contrast(1.2);
        }

        .delete-btn {
            color: var(--text-muted);
            cursor: pointer;
            transition: color 0.2s;
        }

        .delete-btn:hover {
            color: #ff3333;
        }

        .back-btn {
            position: fixed; top: 10px; left: 12px; z-index: 1001;
            color: #005c18; text-decoration: none;
            border: 1px solid rgba(0,255,65,0.2);
            padding: 2px 9px; border-radius: 3px; font-size: 10px;
            font-family: 'IBM Plex Mono', 'Share Tech Mono', monospace;
            letter-spacing: 0.5px; transition: all 0.2s;
        }
        .back-btn:hover {
            color: #00ff00; border-color: rgba(0,255,65,0.6);
            background: rgba(0,255,65,0.05);
            box-shadow: 0 0 8px rgba(0,255,65,0.25);
        }

        /* Composer Popover */
        #composer {
            position: absolute;
            background: rgba(0, 0, 0, 0.95);
            border: 1px solid var(--text-primary);
            padding: 12px;
            width: 280px;
            display: none;
            flex-direction: column;
            gap: 8px;
            box-shadow: 0 0 20px rgba(0, 255, 0, 0.3);
            z-index: 1000;
            transform: translate(-50%, -50%);
            cursor: default;
        }

        .composer-header {
            font-size: 0.8rem;
            color: var(--text-bright);
            font-weight: bold;
        }

        .composer-input {
            background: transparent;
            border: 1px solid var(--border-dim);
            color: var(--text-primary);
            font-family: var(--font-mono);
            font-size: 0.9rem;
            padding: 6px;
            outline: none;
            resize: none;
        }

        .composer-input:focus {
            border-color: var(--text-dim);
        }

        .composer-actions {
            display: flex;
            gap: 8px;
            justify-content: space-between;
        }

        .btn {
            background: transparent;
            border: 1px solid var(--border-dim);
            color: var(--text-dim);
            padding: 4px 8px;
            cursor: pointer;
            font-family: var(--font-mono);
            font-size: 0.8rem;
            flex: 1;
            transition: all 0.2s;
        }

        .btn:hover {
            color: var(--text-bright);
            border-color: var(--text-bright);
        }

        .btn-primary {
            color: var(--text-primary);
            border-color: var(--text-dim);
        }

        .btn-primary:hover {
            background: rgba(0, 255, 0, 0.1);
        }

        .help-overlay {
            position: absolute;
            bottom: 16px;
            right: 16px;
            color: var(--text-dim);
            font-size: 0.8rem;
            pointer-events: none;
            text-align: right;
            z-index: 50;
            opacity: 0.6;
        }
    </style>
</head>
<body>

    <a class="back-btn" href="index.html">← back</a>
    <div id="canvas-board">
        </div>

    <div id="composer">
        <div class="composer-header">▶ INIT_NODE [x: <span id="compX"></span>, y: <span id="compY"></span>]</div>
        <textarea id="nodeInput" class="composer-input" rows="3" placeholder="Enter transmission or paste image..."></textarea>
        <div style="font-size: 0.7rem; color: var(--text-dim); display: flex; justify-content: space-between;">
            <span id="uploadStatus">Ready</span>
            <span id="attachBtn" style="cursor:pointer; text-decoration: underline;">[ATTACH_MEDIA]</span>
        </div>
        <input type="file" id="fileInput" accept="image/*" style="display:none;">
        <div class="composer-actions">
            <button class="btn btn-primary" id="saveBtn">TRANSMIT</button>
            <button class="btn" id="cancelBtn">ABORT</button>
        </div>
    </div>

    <div class="help-overlay">
        CLICK TO SPAWN NODE<br>
        DRAG TO REPOSITION<br>
        SCROLL TO ZOOM<br>
        CTRL+V TO PASTE IMAGE
    </div>

    <script>
        (function() {
            const board = document.getElementById('canvas-board');
            const composer = document.getElementById('composer');
            const nodeInput = document.getElementById('nodeInput');
            const saveBtn = document.getElementById('saveBtn');
            const cancelBtn = document.getElementById('cancelBtn');
            const attachBtn = document.getElementById('attachBtn');
            const fileInput = document.getElementById('fileInput');
            const uploadStatus = document.getElementById('uploadStatus');
            const compX = document.getElementById('compX');
            const compY = document.getElementById('compY');

            const STORAGE_KEY = 'matrix_spatial_board_data';
            let posts = [];
            let pendingImageData = null;
            let currentSpawn = { x: 50, y: 50 }; // Percentages

            // Zoom & Spatial variables
            let scale = 1;
            let isDragging = false;
            let dragTarget = null;

            function loadData() {
                try {
                    const raw = localStorage.getItem(STORAGE_KEY);
                    posts = raw ? JSON.parse(raw) : [];
                    
                    // Fallback to assign spatial coordinates if missing
                    posts.forEach(p => {
                        if (p.x === undefined || p.y === undefined) {
                            p.x = 10 + Math.random() * 80;
                            p.y = 10 + Math.random() * 80;
                        }
                    });
                } catch (e) {
                    posts = [];
                }
            }

            function savePosts() {
                try {
                    localStorage.setItem(STORAGE_KEY, JSON.stringify(posts));
                } catch (e) {
                    alert('SYS_ERR: Database full.');
                }
            }

            function renderBoard() {
                board.innerHTML = '';
                posts.forEach((post, index) => {
                    const el = createNodeElement(post, index);
                    board.appendChild(el);
                });
            }

            function createNodeElement(post, zIndexBase) {
                const div = document.createElement('div');
                div.className = 'node-card';
                div.style.left = `${post.x}%`;
                div.style.top = `${post.y}%`;
                div.style.zIndex = zIndexBase;
                div.dataset.id = post.id;

                const timeStr = post.timestamp ? new Date(post.timestamp).toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'}) : '00:00';

                let mediaHtml = '';
                if (post.type === 'image' && (post.imageData || post.imageUrl)) {
                    mediaHtml = `<img src="${escapeHTML(post.imageData || post.imageUrl)}" class="node-image" draggable="false">`;
                }

                div.innerHTML = `
                    <div class="node-header">
                        <span>#${post.id.slice(-4)}</span>
                        <span>${timeStr}</span>
                        <span class="delete-btn" title="PURGE">✕</span>
                    </div>
                    ${mediaHtml}
                    <div class="node-body">${escapeHTML(post.body || '')}</div>
                `;

                // Deletion
                div.querySelector('.delete-btn').addEventListener('click', (e) => {
                    e.stopPropagation();
                    posts = posts.filter(p => p.id !== post.id);
                    savePosts();
                    renderBoard();
                });

                // Dragging Logic (Accounting for zoom scale)
                div.addEventListener('mousedown', (e) => {
                    if(e.target.classList.contains('delete-btn')) return;
                    isDragging = true;
                    
                    const rect = board.getBoundingClientRect();
                    const bw = board.offsetWidth;
                    const bh = board.offsetHeight;

                    // Convert mouse screen coordinates to scaled board coordinates
                    const mouseTrueX = (e.clientX - rect.left) / scale;
                    const mouseTrueY = (e.clientY - rect.top) / scale;
                    
                    // Node's true position in board coordinates
                    const nodeTrueX = (post.x / 100) * bw;
                    const nodeTrueY = (post.y / 100) * bh;

                    dragTarget = {
                        element: div,
                        post: post,
                        offsetX: mouseTrueX - nodeTrueX,
                        offsetY: mouseTrueY - nodeTrueY
                    };
                    
                    // Bring to front temporarily
                    div.style.zIndex = 999; 
                });

                return div;
            }

            function escapeHTML(str) {
                const div = document.createElement('div');
                div.textContent = str;
                return div.innerHTML;
            }

            // Canvas Zoom (Scroll wheel)
            window.addEventListener('wheel', (e) => {
                // Ignore zooming if inside the composer textarea
                if (e.target.tagName === 'TEXTAREA') return; 

                e.preventDefault();

                // Close composer if zooming to prevent it from detaching from coordinates
                if (composer.style.display === 'flex') {
                    closeComposer();
                }

                const zoomSensitivity = 0.001;
                scale += e.deltaY * -zoomSensitivity;
                scale = Math.min(Math.max(0.2, scale), 4); // clamp zoom between 0.2x and 4x
                
                board.style.transform = `scale(${scale})`;
            }, { passive: false });

            // Canvas Click to Spawn Composer
            board.addEventListener('mousedown', (e) => {
                // Ignore if clicking on an existing node or the composer itself
                if (e.target.closest('.node-card') || e.target.closest('#composer')) {
                    return;
                }

                // Calculate spawn percentages accounting for zoom
                const rect = board.getBoundingClientRect();
                const trueX = (e.clientX - rect.left) / scale;
                const trueY = (e.clientY - rect.top) / scale;

                const pctX = (trueX / board.offsetWidth) * 100;
                const pctY = (trueY / board.offsetHeight) * 100;
                
                // Clamp to avoid going completely off-screen
                currentSpawn.x = Math.max(5, Math.min(95, pctX));
                currentSpawn.y = Math.max(5, Math.min(95, pctY));

                // Position composer on the screen so its size is independent of zoom
                composer.style.left = `${e.clientX}px`;
                composer.style.top = `${e.clientY}px`;
                composer.style.display = 'flex';
                
                compX.textContent = Math.round(currentSpawn.x);
                compY.textContent = Math.round(currentSpawn.y);

                nodeInput.value = '';
                pendingImageData = null;
                uploadStatus.textContent = 'Ready';
                
                setTimeout(() => nodeInput.focus(), 50);
            });

            // Global Mouse Move for Dragging Nodes
            window.addEventListener('mousemove', (e) => {
                if (!isDragging || !dragTarget) return;

                const rect = board.getBoundingClientRect();
                const bw = board.offsetWidth;
                const bh = board.offsetHeight;

                // Adjust the current mouse pos for the zoom level
                const mouseTrueX = (e.clientX - rect.left) / scale;
                const mouseTrueY = (e.clientY - rect.top) / scale;
                
                const newPctX = ((mouseTrueX - dragTarget.offsetX) / bw) * 100;
                const newPctY = ((mouseTrueY - dragTarget.offsetY) / bh) * 100;
                
                dragTarget.element.style.left = `${newPctX}%`;
                dragTarget.element.style.top = `${newPctY}%`;
            });

            // Global Mouse Up to Drop Nodes
            window.addEventListener('mouseup', (e) => {
                if (isDragging && dragTarget) {
                    // Update the underlying data model
                    const pctX = (parseFloat(dragTarget.element.style.left));
                    const pctY = (parseFloat(dragTarget.element.style.top));
                    
                    dragTarget.post.x = pctX;
                    dragTarget.post.y = pctY;
                    savePosts();
                    
                    dragTarget.element.style.zIndex = ''; // reset z-index
                }
                isDragging = false;
                dragTarget = null;
            });

            // Composer Logic
            function closeComposer() {
                composer.style.display = 'none';
                nodeInput.value = '';
                pendingImageData = null;
            }

            function handleSave() {
                const body = nodeInput.value.trim();
                if (!body && !pendingImageData) {
                    closeComposer();
                    return;
                }

                const newPost = {
                    id: Date.now().toString(36) + Math.random().toString(36).slice(2, 7),
                    type: pendingImageData ? 'image' : 'text',
                    body: body,
                    imageData: pendingImageData || null,
                    x: currentSpawn.x,
                    y: currentSpawn.y,
                    timestamp: new Date().toISOString()
                };

                posts.push(newPost); // Add to end so it renders on top
                savePosts();
                renderBoard();
                closeComposer();
            }

            saveBtn.addEventListener('click', handleSave);
            cancelBtn.addEventListener('click', closeComposer);

            nodeInput.addEventListener('keydown', (e) => {
                if (e.key === 'Escape') closeComposer();
                if (e.key === 'Enter' && !e.shiftKey) {
                    e.preventDefault();
                    handleSave();
                }
            });

            // Media Attachment
            attachBtn.addEventListener('click', () => fileInput.click());

            fileInput.addEventListener('change', async function() {
                const file = this.files[0];
                if (!file || !file.type.startsWith('image/')) return;
                
                try {
                    uploadStatus.textContent = 'Processing...';
                    pendingImageData = await resizeImage(file);
                    uploadStatus.textContent = '[MEDIA_LOADED]';
                } catch (e) {
                    uploadStatus.textContent = 'ERR_LOAD';
                }
                this.value = '';
            });

            nodeInput.addEventListener('paste', e => {
                const item = Array.from(e.clipboardData.items).find(i => i.type.startsWith('image/'));
                if (item) {
                    e.preventDefault();
                    resizeImage(item.getAsFile()).then(dataUrl => {
                        pendingImageData = dataUrl;
                        uploadStatus.textContent = '[MEDIA_PASTED]';
                    });
                }
            });

            function resizeImage(file) {
                return new Promise((resolve, reject) => {
                    const reader = new FileReader();
                    reader.onload = e => {
                        const img = new Image();
                        img.onload = () => {
                            const canvas = document.createElement('canvas');
                            const ratio = Math.min(400 / img.width, 400 / img.height, 1);
                            canvas.width = img.width * ratio;
                            canvas.height = img.height * ratio;
                            canvas.getContext('2d').drawImage(img, 0, 0, canvas.width, canvas.height);
                            resolve(canvas.toDataURL('image/jpeg', 0.6));
                        };
                        img.onerror = reject;
                        img.src = e.target.result;
                    };
                    reader.onerror = reject;
                    reader.readAsDataURL(file);
                });
            }

            // INIT
            loadData();
            renderBoard();

        })();
    </script>
</body>
</html>
