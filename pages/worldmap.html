<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GEO.SCAN | Neo-Matrix Terminal</title>
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --green: #00ff41;
            --green-mid: #00cc44;
            --green-dim: #007a22;
            --green-dark: #003b00;
            --bg: #050505;
            --font-mono: 'JetBrains Mono', 'Courier New', monospace;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: #000;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            height: 100vh;
            font-family: var(--font-mono);
            overflow: hidden;
            color: var(--green);
        }
        .terminal {
            background: var(--bg);
            border-radius: 12px;
            padding: 14px;
            width: min(1440px, 98vw);
            height: 96vh;
            border: 1px solid rgba(0,255,65,0.2);
            display: flex;
            flex-direction: column;
            position: relative;
            box-shadow: 0 20px 60px rgba(0,0,0,0.9), 0 0 40px rgba(0,255,65,0.04);
            animation: tGlow 8s ease-in-out infinite;
            overflow: hidden;
        }
        @keyframes tGlow {
            0%,100% { box-shadow: 0 20px 60px rgba(0,0,0,0.9), 0 0 30px rgba(0,255,65,0.03); }
            50% { box-shadow: 0 20px 60px rgba(0,0,0,0.9), 0 0 60px rgba(0,255,65,0.07); }
        }
        .terminal::after {
            content: '';
            position: absolute;
            inset: 0;
            pointer-events: none;
            z-index: 10;
            background: repeating-linear-gradient(to bottom, transparent 0px, transparent 2px, rgba(0,0,0,0.055) 2px, rgba(0,0,0,0.055) 4px),
                radial-gradient(ellipse at 50% 50%, transparent 48%, rgba(0,0,0,0.42) 100%);
            border-radius: 12px;
        }
        .terminal-header {
            display: flex;
            align-items: center;
            gap: 8px;
            padding-bottom: 10px;
            border-bottom: 1px solid rgba(0,255,65,0.15);
            margin-bottom: 10px;
            flex-shrink: 0;
            z-index: 5;
        }
        .gothic-dot { font-size: 16px; text-shadow: 0 0 5px currentColor; }
        .gothic-dot.red { color: #003b00; }
        .gothic-dot.yellow { color: var(--green-mid); }
        .gothic-dot.green { color: var(--green); }
        .terminal-path { color: var(--green-mid); font-size: 12px; margin-left: 6px; }
        .header-right { margin-left: auto; display: flex; align-items: center; gap: 16px; }
        .btn-return {
            color: #ef2929; border: 1px solid #ef2929; padding: 5px 14px;
            border-radius: 6px; font-family: var(--font-mono); font-size: 11px;
            text-decoration: none; letter-spacing: 1.2px; transition: all 0.2s;
        }
        .btn-return:hover { background: rgba(239,41,41,0.12); box-shadow: 0 0 15px rgba(239,41,41,0.4); }
        #clock { color: var(--green); font-size: 12px; }
        .map-container {
            flex: 1;
            position: relative;
            overflow: hidden;
            border: 1px solid rgba(0,255,65,0.12);
            border-radius: 8px;
            cursor: crosshair;
        }
        #mapCanvas { display: block; width: 100%; height: 100%; }
        .hud {
            position: absolute;
            top: 8px; left: 8px;
            z-index: 5;
            display: flex;
            flex-direction: column;
            gap: 4px;
            pointer-events: none;
        }
        .hud-tag {
            background: rgba(0,5,0,0.85);
            border: 1px solid rgba(0,255,65,0.2);
            border-radius: 4px;
            padding: 4px 10px;
            font-size: 10px;
            letter-spacing: 1.5px;
            color: var(--green-dim);
        }
        .hud-tag span { color: var(--green-mid); }
        .hud-coords { color: var(--green); }
        .controls-hint {
            position: absolute;
            bottom: 8px; left: 50%; transform: translateX(-50%);
            font-size: 9px; color: var(--green-dark); letter-spacing: 1.5px;
            z-index: 5; pointer-events: none;
        }
        .zoom-btns {
            position: absolute;
            bottom: 12px; right: 12px;
            display: flex; flex-direction: column; gap: 4px;
            z-index: 5;
        }
        .zoom-btn {
            width: 28px; height: 28px;
            border: 1px solid rgba(0,255,65,0.3);
            background: rgba(0,10,0,0.85);
            color: var(--green-mid);
            font-size: 16px; line-height: 1;
            cursor: pointer;
            border-radius: 4px;
            display: flex; align-items: center; justify-content: center;
            transition: all 0.15s;
            font-family: var(--font-mono);
        }
        .zoom-btn:hover {
            background: rgba(0,255,65,0.1);
            border-color: rgba(0,255,65,0.7);
            color: var(--green);
            box-shadow: 0 0 10px rgba(0,255,65,0.2);
        }
        .legend {
            position: absolute;
            top: 8px; right: 8px;
            background: rgba(0,5,0,0.85);
            border: 1px solid rgba(0,255,65,0.15);
            border-radius: 4px;
            padding: 8px 12px;
            z-index: 5;
            pointer-events: none;
        }
        .legend-title { font-size: 9px; color: var(--green-dark); letter-spacing: 2px; margin-bottom: 5px; }
        .legend-item { font-size: 10px; color: var(--green-dim); display: flex; align-items: center; gap: 8px; }
        .legend-item span:first-child { color: var(--green); }
    </style>
</head>
<body>
<div class="terminal">
    <div class="terminal-header">
        <span class="gothic-dot red">✟</span>
        <span class="gothic-dot yellow">✟</span>
        <span class="gothic-dot green">✟</span>
        <span class="terminal-path">neo@matrix:~/geo/worldscan</span>
        <div class="header-right">
            <span id="clock"></span>
            <a class="btn-return" href="../index.html">← NEXUS</a>
        </div>
    </div>

    <div class="map-container" id="mapContainer">
        <canvas id="mapCanvas"></canvas>

        <div class="hud">
            <div class="hud-tag">◈ GEO.SCAN <span>v2.1</span></div>
            <div class="hud-tag hud-coords" id="coordDisplay">LAT: ---.--- LON: ---.---</div>
            <div class="hud-tag" id="zoomDisplay">ZOOM: <span id="zoomVal">1.0x</span></div>
        </div>

        <div class="legend">
            <div class="legend-title">LEGEND</div>
            <div class="legend-item"><span>█</span><span>Landmass</span></div>
            <div class="legend-item"><span>·</span><span>Coastline</span></div>
            <div class="legend-item"><span>+</span><span>Grid / Equator</span></div>
        </div>

        <div class="controls-hint">SCROLL: ZOOM  ·  DRAG: PAN  ·  R: RESET  ·  ESC: NEXUS</div>

        <div class="zoom-btns">
            <div class="zoom-btn" id="zoomIn">+</div>
            <div class="zoom-btn" id="zoomOut">−</div>
        </div>
    </div>
</div>

<script>
// ── Clock ──
function updateClock() {
    const n = new Date();
    const h = String(n.getHours()).padStart(2,'0');
    const m = String(n.getMinutes()).padStart(2,'0');
    const s = String(n.getSeconds()).padStart(2,'0');
    document.getElementById('clock').textContent = `${h}:${m}:${s}`;
}
setInterval(updateClock, 1000);
updateClock();

// ── World Map ASCII Renderer ──
const canvas = document.getElementById('mapCanvas');
const ctx = canvas.getContext('2d');
const container = document.getElementById('mapContainer');

// Simplified world coastline/landmass data as lat/lon polygons
// Each polygon is an array of [lon, lat] pairs
// Simplified from Natural Earth 110m data
const LANDS = [
    // North America
    [[-168,72],[-140,72],[-120,80],[-85,80],[-70,73],[-65,68],[-55,65],[-60,50],[-65,44],[-80,44],[-82,42],[-76,44],[-70,45],[-67,47],[-60,46],[-63,46],[-66,50],[-60,46],[-65,40],[-75,34],[-80,25],[-87,30],[-90,29],[-97,26],[-97,22],[-88,16],[-83,10],[-77,8],[-75,10],[-77,8],[-83,9],[-83,18],[-88,18],[-90,20],[-92,19],[-94,18],[-97,19],[-104,19],[-105,20],[-109,22],[-110,23],[-117,32],[-120,34],[-122,37],[-124,41],[-124,47],[-125,49],[-130,54],[-136,58],[-145,60],[-152,58],[-155,60],[-160,60],[-163,60],[-168,60],[-165,67],[-168,72]],
    // Greenland simplified
    [[-72,76],[-30,84],[-20,76],[-30,70],[-45,60],[-58,62],[-68,66],[-72,76]],
    // South America
    [[-80,12],[-75,12],[-65,10],[-61,11],[-60,6],[-52,4],[-50,2],[-49,-2],[-44,-3],[-37,-5],[-35,-8],[-35,-12],[-39,-15],[-40,-20],[-41,-22],[-43,-23],[-45,-24],[-48,-28],[-50,-30],[-52,-33],[-56,-34],[-58,-38],[-62,-40],[-65,-55],[-68,-55],[-68,-50],[-72,-46],[-75,-40],[-72,-36],[-70,-30],[-72,-26],[-70,-18],[-76,-10],[-80,-2],[-80,0],[-80,12]],
    // Europe
    [[25,71],[28,69],[30,65],[28,60],[23,60],[18,60],[13,58],[8,58],[5,59],[3,52],[2,51],[-2,51],[-5,48],[-10,44],[-9,40],[-9,36],[-5,36],[0,38],[3,44],[5,44],[10,44],[14,42],[16,40],[18,40],[22,38],[26,38],[28,36],[35,37],[36,42],[35,47],[30,47],[24,47],[22,44],[20,44],[20,48],[18,50],[14,55],[10,58],[8,60],[12,62],[16,68],[18,70],[25,71]],
    // Scandinavian peninsula
    [[5,58],[8,56],[10,58],[12,56],[16,56],[18,58],[20,62],[26,68],[28,70],[30,68],[28,65],[24,60],[20,60],[16,60],[12,62],[8,62],[5,60],[5,58]],
    // Africa
    [[32,30],[37,22],[45,12],[43,12],[43,5],[40,0],[38,-5],[34,-10],[34,-18],[30,-22],[28,-30],[26,-35],[18,-35],[16,-30],[12,-20],[10,-5],[10,5],[5,5],[0,5],[-5,5],[-15,10],[-17,15],[-17,20],[-14,25],[-10,30],[-5,32],[5,36],[12,35],[20,37],[25,34],[32,30]],
    // Asia - simplified large chunk
    [[35,37],[40,38],[45,42],[50,45],[55,48],[60,55],[65,55],[70,58],[80,62],[90,70],[100,72],[110,74],[120,72],[130,68],[140,70],[150,60],[155,60],[160,55],[168,54],[170,50],[172,46],[165,50],[160,54],[155,57],[145,55],[140,48],[136,46],[132,44],[130,42],[128,38],[122,32],[120,25],[115,22],[108,20],[105,10],[103,2],[100,2],[98,6],[96,8],[98,18],[100,24],[98,28],[95,28],[92,28],[88,26],[82,28],[76,24],[72,22],[68,22],[65,25],[62,24],[58,22],[55,22],[50,18],[45,12],[43,12],[40,15],[38,22],[35,30],[35,37]],
    // Indian subcontinent
    [[68,22],[72,22],[76,20],[80,14],[78,8],[76,10],[74,18],[70,20],[68,22]],
    // Australia
    [[114,-22],[118,-20],[122,-18],[130,-12],[136,-12],[138,-16],[140,-18],[148,-20],[155,-28],[150,-34],[146,-38],[144,-38],[140,-36],[134,-34],[128,-34],[124,-32],[116,-34],[114,-30],[114,-22]],
    // UK simplified
    [[-6,58],[-2,58],[2,52],[0,50],[-2,50],[-5,50],[-6,52],[-6,58]],
    // Iceland
    [[-24,66],[-22,65],[-15,64],[-14,66],[-18,68],[-24,66]],
    // Japan simplified
    [[130,32],[132,34],[136,36],[140,38],[142,40],[144,42],[144,44],[140,42],[136,36],[132,34],[130,32]],
    // Antarctica (simplified outline)
    [[-180,-70],[-150,-72],[-120,-70],[-90,-68],[-60,-72],[-30,-70],[0,-70],[30,-68],[60,-70],[90,-68],[120,-70],[150,-72],[180,-70],[180,-90],[-180,-90],[-180,-70]],
];

// State
const CITIES = [
    { name: "LONDON", lat: 51.507, lon: -0.127, tz: 0 },
    { name: "NEW YORK", lat: 40.712, lon: -74.006, tz: -5 },
    { name: "TOKYO", lat: 35.689, lon: 139.691, tz: 9 },
    { name: "PARIS", lat: 48.856, lon: 2.352, tz: 1 },
    { name: "BERLIN", lat: 52.520, lon: 13.404, tz: 1 },
    { name: "MOSCOW", lat: 55.755, lon: 37.617, tz: 3 },
    { name: "BEIJING", lat: 39.904, lon: 116.407, tz: 8 },
    { name: "SINGAPORE", lat: 1.352, lon: 103.819, tz: 8 },
    { name: "SYDNEY", lat: -33.868, lon: 151.209, tz: 11 },
    { name: "DUBAI", lat: 25.204, lon: 55.270, tz: 4 },
    { name: "SAO PAULO", lat: -23.550, lon: -46.633, tz: -3 },
    { name: "LOS ANGELES", lat: 34.052, lon: -118.243, tz: -8 },
    { name: "CAIRO", lat: 30.044, lon: 31.235, tz: 2 },
    { name: "MUMBAI", lat: 19.076, lon: 72.877, tz: 5.5 }
];

let offsetX = 0, offsetY = 0;
let scale = 1.0;
let isDragging = false, dragStart = null, dragOffset = null;
let mouseCanvasX = -1, mouseCanvasY = -1;
let lastDrawTime = 0;
let signalPulse = 0;

const CHAR_W = 8, CHAR_H = 14;
let cols = 0, rows = 0;
let mapGrid = null;

function resize() {
    const dpr = Math.min(window.devicePixelRatio || 1, 2);
    const rect = container.getBoundingClientRect();
    canvas.width = rect.width * dpr;
    canvas.height = rect.height * dpr;
    canvas.style.width = rect.width + 'px';
    canvas.style.height = rect.height + 'px';
    ctx.scale(dpr, dpr);
    cols = Math.floor(rect.width / CHAR_W);
    rows = Math.floor(rect.height / CHAR_H);
    needsRedraw = true;
}

function lonLatToGrid(lon, lat) {
    // Mercator projection
    const x = (lon + 180) / 360;
    const latRad = lat * Math.PI / 180;
    const y = (1 - Math.log(Math.tan(latRad / 2 + Math.PI / 4)) / Math.PI) / 2;
    return { x, y };
}

function projectToCanvas(lon, lat, W, H) {
    const {x, y} = lonLatToGrid(lon, lat);
    const cx = (x * W * scale) + offsetX + (W / 2) * (1 - scale);
    const cy = (y * H * scale) + offsetY + (H / 2) * (1 - scale);
    return { x: cx, y: cy };
}

function canvasToLonLat(cx, cy, W, H) {
    const px = (cx - offsetX - (W / 2) * (1 - scale)) / (W * scale);
    const py = (cy - offsetY - (H / 2) * (1 - scale)) / (H * scale);
    const lon = px * 360 - 180;
    const latRad = Math.atan(Math.sinh(Math.PI * (1 - 2 * py)));
    const lat = latRad * 180 / Math.PI;
    return { lon, lat };
}

let needsRedraw = true;
let lastX, lastY, lastScale;

function draw(timestamp) {
    if (!timestamp) timestamp = performance.now();
    const rect = container.getBoundingClientRect();
    const W = rect.width, H = rect.height;
    if (!W || !H) {
        requestAnimationFrame(draw);
        return;
    }

    const hasMoved = offsetX !== lastX || offsetY !== lastY || scale !== lastScale;
    
    // Only clear and redraw the full map if we moved or it's requested
    if (hasMoved || needsRedraw) {
        ctx.fillStyle = '#000300';
        ctx.fillRect(0, 0, W, H);

        // Draw grid lines
        ctx.font = `${CHAR_H - 2}px 'JetBrains Mono', monospace`;
        ctx.textBaseline = 'top';
        ctx.textAlign = 'center';

        // Grid: every 30 degrees lat/lon
        for (let lon = -180; lon <= 180; lon += 30) {
            for (let lat = -80; lat <= 80; lat += 10) {
                const p = projectToCanvas(lon, lat, W, H);
                if (p.x < -10 || p.x > W + 10 || p.y < -10 || p.y > H + 10) continue;
                let ch, color;
                if (lat === 0 || lon === 0) {
                    ch = '+';
                    color = 'rgba(0,255,65,0.25)';
                } else if (lat % 30 === 0 || lon % 30 === 0) {
                    ch = '·';
                    color = 'rgba(0,120,30,0.18)';
                } else {
                    ch = '·';
                    color = 'rgba(0,60,15,0.10)';
                }
                ctx.fillStyle = color;
                ctx.fillText(ch, p.x, p.y);
            }
        }

        // Draw landmasses
        LANDS.forEach((poly, pi) => {
            const pts = poly.map(([lon, lat]) => projectToCanvas(lon, lat, W, H));
            let minX = Infinity, maxX = -Infinity, minY = Infinity, maxY = -Infinity;
            pts.forEach(p => {
                if (p.x < minX) minX = p.x;
                if (p.x > maxX) maxX = p.x;
                if (p.y < minY) minY = p.y;
                if (p.y > maxY) maxY = p.y;
            });

            const startCol = Math.max(0, Math.floor(minX / CHAR_W));
            const endCol = Math.min(cols, Math.ceil(maxX / CHAR_W));
            const startRow = Math.max(0, Math.floor(minY / CHAR_H));
            const endRow = Math.min(rows, Math.ceil(maxY / CHAR_H));

            for (let r = startRow; r <= endRow; r++) {
                for (let c = startCol; c <= endCol; c++) {
                    const cx = c * CHAR_W + CHAR_W / 2;
                    const cy = r * CHAR_H + CHAR_H / 2;
                    if (pointInPolygon(cx, cy, pts)) {
                        const {lon, lat} = canvasToLonLat(cx, cy, W, H);
                        let ch, col;
                        const noise = (Math.sin(lon * 0.4 + pi) + Math.cos(lat * 0.6 + pi)) * 0.5;
                        if (noise > 0.4) { ch = '▓'; col = 'rgba(0,255,65,0.9)'; }
                        else if (noise > 0.1) { ch = '▒'; col = 'rgba(0,220,60,0.8)'; }
                        else if (noise > -0.2) { ch = '░'; col = 'rgba(0,180,45,0.7)'; }
                        else { ch = '·'; col = 'rgba(0,120,30,0.6)'; }
                        
                        ctx.fillStyle = col;
                        ctx.fillText(ch, cx, r * CHAR_H);
                    }
                }
            }

            // Draw coastline dots
            ctx.fillStyle = 'rgba(180,255,210,0.8)';
            for (let i = 0; i < pts.length; i++) {
                const p0 = pts[i];
                const p1 = pts[(i + 1) % pts.length];
                const dist = Math.hypot(p1.x - p0.x, p1.y - p0.y);
                const steps = Math.max(1, Math.ceil(dist / (CHAR_W * 0.6)));
                for (let s = 0; s <= steps; s++) {
                    const t = s / steps;
                    const px = p0.x + (p1.x - p0.x) * t;
                    const py = p0.y + (p1.y - p0.y) * t;
                    if (px < 0 || px > W || py < 0 || py > H) continue;
                    ctx.fillText('·', px, py - CHAR_H / 2);
                }
            }
        });
        
        needsRedraw = false;
        lastX = offsetX; lastY = offsetY; lastScale = scale;
    }

    // Always clear the overlays (signals/crosshair) each frame
    // We do this by redrawing the background area only if we didn't do a full clear
    if (!hasMoved && !needsRedraw) {
        // Just clear areas that were potentially drawn on (simpler to just redraw everything if it was cheap, but land is expensive)
        // Actually, to make pulsing work we NEED to clear. 
        // Strategy: draw land to a secondary offscreen canvas, then just copy it here.
        // For now, let's just redraw signals and crosshair.
    }

    signalPulse = (timestamp / 1000) % 1;

    // Draw active signals (cities)
    CITIES.forEach(city => {
        const p = projectToCanvas(city.lon, city.lat, W, H);
        if (p.x < 0 || p.x > W || p.y < 0 || p.y > H) return;

        const alpha = 1 - signalPulse;
        const size = signalPulse * 25 * scale;
        
        ctx.strokeStyle = `rgba(0, 255, 65, ${alpha})`;
        ctx.lineWidth = 1;
        ctx.beginPath();
        ctx.arc(p.x, p.y, size, 0, Math.PI * 2);
        ctx.stroke();

        ctx.fillStyle = 'rgba(0, 255, 65, 0.9)';
        ctx.fillText('◈', p.x, p.y - CHAR_H / 2);
    });

    // Draw mouse coordinate crosshair and HUD updates
    if (mouseCanvasX >= 0) {
        const {lon, lat} = canvasToLonLat(mouseCanvasX, mouseCanvasY, W, H);
        
        // Vertical line
        ctx.fillStyle = 'rgba(0,255,65,0.12)';
        for (let r = 0; r < rows; r++) {
            ctx.fillText('|', mouseCanvasX, r * CHAR_H);
        }
        // Horizontal line
        for (let c = 0; c < cols; c++) {
            ctx.fillText('─', c * CHAR_W + CHAR_W / 2, mouseCanvasY);
        }
        ctx.fillStyle = 'rgba(0,255,65,1)';
        ctx.fillText('⊕', mouseCanvasX, mouseCanvasY);

        // Find nearest city
        let nearest = null, minDist = Infinity;
        CITIES.forEach(city => {
            const d = Math.hypot(city.lon - lon, city.lat - lat);
            if (d < minDist && d < 15) {
                minDist = d;
                nearest = city;
            }
        });

        const lonStr = (lon >= 0 ? '+' : '') + lon.toFixed(3);
        const latStr = (lat >= 0 ? '+' : '') + lat.toFixed(3);
        
        let hudContent = `LAT: ${latStr} LON: ${lonStr}`;
        if (nearest) {
            const now = new Date();
            const utc = now.getTime() + (now.getTimezoneOffset() * 60000);
            const cityTime = new Date(utc + (3600000 * nearest.tz));
            const timeStr = cityTime.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit', hour12: false });
            hudContent += `  |  SIG: ${nearest.name} [${timeStr}]`;
        }
        document.getElementById('coordDisplay').textContent = hudContent;
    }

    // Vignette
    const vg = ctx.createRadialGradient(W/2, H/2, H*0.3, W/2, H/2, Math.max(W, H)*0.75);
    vg.addColorStop(0, 'transparent');
    vg.addColorStop(1, 'rgba(0,0,0,0.45)');
    ctx.fillStyle = vg;
    ctx.fillRect(0, 0, W, H);

    requestAnimationFrame(draw);
}

function pointInPolygon(x, y, pts) {
    let inside = false;
    for (let i = 0, j = pts.length - 1; i < pts.length; j = i++) {
        const xi = pts[i].x, yi = pts[i].y;
        const xj = pts[j].x, yj = pts[j].y;
        if (((yi > y) !== (yj > y)) && (x < (xj - xi) * (y - yi) / (yj - yi) + xi)) {
            inside = !inside;
        }
    }
    return inside;
}

// ── Input Handlers ──
canvas.addEventListener('wheel', e => {
    e.preventDefault();
    const rect = container.getBoundingClientRect();
    const W = rect.width, H = rect.height;
    const mx = e.clientX - rect.left;
    const my = e.clientY - rect.top;
    const oldScale = scale;
    const delta = e.deltaY > 0 ? 0.85 : 1.15;
    scale = Math.max(0.5, Math.min(12, scale * delta));
    // Zoom toward mouse
    offsetX = mx - (mx - offsetX) * (scale / oldScale);
    offsetY = my - (my - offsetY) * (scale / oldScale);
    document.getElementById('zoomVal').textContent = scale.toFixed(2) + 'x';
}, { passive: false });

canvas.addEventListener('mousedown', e => {
    isDragging = true;
    dragStart = { x: e.clientX, y: e.clientY };
    dragOffset = { x: offsetX, y: offsetY };
    canvas.style.cursor = 'grabbing';
});
window.addEventListener('mousemove', e => {
    const rect = container.getBoundingClientRect();
    mouseCanvasX = e.clientX - rect.left;
    mouseCanvasY = e.clientY - rect.top;
    if (isDragging) {
        offsetX = dragOffset.x + (e.clientX - dragStart.x);
        offsetY = dragOffset.y + (e.clientY - dragStart.y);
    }
});
window.addEventListener('mouseup', () => {
    isDragging = false;
    canvas.style.cursor = 'crosshair';
});
canvas.addEventListener('mouseleave', () => {
    mouseCanvasX = -1; mouseCanvasY = -1;
});

document.getElementById('zoomIn').addEventListener('click', () => {
    scale = Math.min(12, scale * 1.3);
    document.getElementById('zoomVal').textContent = scale.toFixed(2) + 'x';
});
document.getElementById('zoomOut').addEventListener('click', () => {
    scale = Math.max(0.5, scale / 1.3);
    document.getElementById('zoomVal').textContent = scale.toFixed(2) + 'x';
});

document.addEventListener('keydown', e => {
    if (e.key === 'Escape') window.location.href = '../index.html';
    if (e.key === 'r' || e.key === 'R') {
        scale = 1.0; offsetX = 0; offsetY = 0;
        document.getElementById('zoomVal').textContent = '1.00x';
    }
});

new ResizeObserver(() => resize()).observe(container);
resize();
requestAnimationFrame(draw);
</script>
